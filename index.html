<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Newmera</title>
<style>
:root { --y:#ffd60a; --sb:env(safe-area-inset-bottom); --st:env(safe-area-inset-top); }

/* ── RESET ── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; background:#000; }
body {
height:100%; width:100%;
background:#000; color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
-webkit-text-size-adjust:none;
overflow:hidden;
}
button { border:none; background:none; color:inherit; font:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; }
img, video { display:block; }

/* ── SCREEN SYSTEM ── */
.pg { position:fixed; inset:0; background:#000; display:none; flex-direction:column; }
.pg.on { display:flex; }

/* ══════════════════
CAMERA PAGE
══════════════════ */
#camPg { overflow:hidden; }

/* topbar */
#topBar {
flex-shrink:0;
width:100%;
padding-top:80px;
padding-left:18px;
padding-right:18px;
padding-bottom:12px;
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
}
#flashBtn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; }
#bothBtn {
font-size:12px; font-weight:700; letter-spacing:.05em;
color:rgba(255,255,255,.75);
border:1px solid rgba(255,255,255,.25);
border-radius:6px;
padding:4px 10px;
min-width:60px;
text-align:center;
}
#bothBtn.on { background:var(–y); color:#000; border-color:var(–y); }

/* viewfinder */
#vf {
flex:1;
width:100%;
position:relative;
background:#000;
overflow:hidden;
min-height:0;
display:flex;
align-items:center;
justify-content:center;
}
#vfInner {
position:relative;
width:100%; height:100%;
overflow:hidden;
}
#vfInner.landscape {
height:auto;
aspect-ratio:16/9;
border-radius:16px;
overflow:hidden;
}
#mainVid {
position:absolute; inset:0;
width:100%; height:100%;
object-fit:cover;
opacity:0; transition:opacity .15s;
}
#mainVid.on { opacity:1; }

/* overlay elements inside vf */
#flashFx { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:5; }
#focusRing {
position:absolute; width:58px; height:58px;
border:1.5px solid var(–y); border-radius:5px;
transform:translate(-50%,-50%);
display:none; pointer-events:none; z-index:6;
}
#cdOverlay {
position:absolute; inset:0;
background:rgba(0,0,0,.4);
display:none; align-items:center; justify-content:center;
z-index:8;
}
#cdNum { font-size:96px; font-weight:900; color:#fff; }
#pipWrap {
position:absolute; bottom:16px; left:14px;
width:76px; aspect-ratio:3/4;
border-radius:12px; overflow:hidden;
border:2px solid #fff;
display:none; z-index:7;
}
#pipWrap.on { display:block; }
#pipImg { width:100%; height:100%; object-fit:cover; }

/* bottom bar */
#botBar {
flex-shrink:0;
width:100%;
background:#000;
padding-top:10px;
padding-bottom:max(var(–sb), 22px);
}
#modeRow {
display:flex; justify-content:center; gap:32px;
margin-bottom:14px;
}
.mBtn {
font-size:13px; letter-spacing:1.4px; font-weight:500;
color:rgba(255,255,255,.38);
}
.mBtn.on { color:var(–y); font-weight:700; }
#ctrlRow {
display:flex; align-items:center; justify-content:space-between;
padding:0 32px;
}
#thumbBtn {
width:50px; height:50px;
border-radius:8px; overflow:hidden;
background:#1a1a1a;
flex-shrink:0;
}
#thumbBtn img { width:100%; height:100%; object-fit:cover; display:none; }
#shutter {
width:70px; height:70px; border-radius:50%;
border:3px solid #fff;
display:flex; align-items:center; justify-content:center;
flex-shrink:0;
}
#shutter:active { transform:scale(.93); }
#sInner {
width:56px; height:56px; border-radius:50%; background:#fff;
transition:all .18s;
}
#shutter.vid #sInner { background:#ff3b30; }
#shutter.rec #sInner { width:26px; height:26px; border-radius:6px; background:#ff3b30; }
#flipBtn {
width:46px; height:46px; border-radius:50%;
background:rgba(255,255,255,.14);
display:flex; align-items:center; justify-content:center;
flex-shrink:0;
}

/* ══════════════════
GALLERY PAGE
══════════════════ */
#galPg { z-index:40; }
#galHead {
flex-shrink:0; width:100%;
padding: max(var(–st),14px) 16px 10px;
display:flex; justify-content:space-between; align-items:center;
border-bottom:1px solid rgba(255,255,255,.07);
}
#galHead span { font-size:18px; font-weight:700; }
#galHeadR { display:flex; gap:8px; }
.ghBtn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.12); border-radius:9px; padding:6px 13px; font-size:13px; font-weight:600; }
.ghBtn.pri { background:#fff; color:#000; border-color:#fff; }
.ghBtn.del { background:rgba(255,59,48,.12); color:#ff3b30; border-color:rgba(255,59,48,.3); }

#galGrid {
flex:1; min-height:0;
display:grid; grid-template-columns:repeat(3,1fr); gap:2px;
overflow-y:scroll;
scrollbar-width:none;
}
#galGrid::-webkit-scrollbar { display:none; }

#galEmpty {
flex:1; display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:10px; color:rgba(255,255,255,.3); font-size:14px;
}
.gItem { position:relative; aspect-ratio:1; background:#111; overflow:hidden; cursor:pointer; }
.gItem img { width:100%; height:100%; object-fit:cover; }
.gItem.sel img { opacity:.65; }
.gChk {
position:absolute; top:6px; right:6px;
width:22px; height:22px; border-radius:50%;
border:2px solid #fff; background:transparent;
display:none; align-items:center; justify-content:center;
font-size:12px;
}
.gItem.selMode .gChk { display:flex; }
.gItem.sel .gChk { background:var(–y); border-color:var(–y); color:#000; }
.gPip {
position:absolute; top:5px; left:5px;
width:28%; aspect-ratio:3/4;
border-radius:5px; overflow:hidden;
border:1.5px solid rgba(255,255,255,.9);
}
.gPip img { width:100%; height:100%; object-fit:cover; }

#selBar {
flex-shrink:0; display:none;
align-items:center; justify-content:space-between;
padding:10px 16px; padding-bottom:max(var(–sb),10px);
border-top:1px solid rgba(255,255,255,.07);
}
#selBar.on { display:flex; }
#selN { font-size:14px; font-weight:600; }

/* ══════════════════
VIEWER
══════════════════ */
#viewer { position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:60; }
#viewer.on { display:flex; }
#vwHead {
flex-shrink:0;
padding: max(var(–st),14px) 16px 10px;
display:flex; justify-content:space-between; align-items:center;
}
.vwBtn { font-size:16px; font-weight:600; color:#fff; }
.vwBtn.del { color:#ff3b30; }
#vwBody { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:12px; overflow:hidden; }
#vwWrap { position:relative; max-width:100%; max-height:100%; }
#vwImg { max-width:100%; max-height:70vh; border-radius:14px; object-fit:contain; display:block; }
#vwSub {
position:absolute; top:12px; left:12px;
width:30%; aspect-ratio:3/4;
border-radius:12px; overflow:hidden;
border:2px solid #fff; display:none;
}
#vwSub img { width:100%; height:100%; object-fit:cover; }
#vwFoot {
flex-shrink:0;
padding:12px 20px; padding-bottom:max(var(–sb),16px);
display:flex; justify-content:center;
}

/* ══════════════════
TOAST
══════════════════ */
#toast {
position:fixed; z-index:99;
bottom:200px;
left:50%; transform:translateX(-50%) translateY(6px);
background:#fff; color:#111;
padding:8px 18px; border-radius:999px;
font-size:13px; font-weight:800;
opacity:0; pointer-events:none;
transition:opacity .2s, transform .2s;
white-space:nowrap;
max-width:90vw;
overflow:hidden;
text-overflow:ellipsis;
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

</head>
<body>

<!-- CAMERA -->

<div class="pg on" id="camPg">
  <div id="topBar">
    <button id="flashBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path id="flashPath" d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13Z" fill="rgba(255,255,255,0.85)"/>
      </svg>
    </button>
    <button id="bothBtn">BOTH</button>
  </div>

  <div id="vf">
    <div id="vfInner">
    <video id="mainVid" autoplay playsinline muted disablepictureinpicture></video>
    <div id="flashFx"></div>
    <div id="focusRing"></div>
    <div id="cdOverlay"><div id="cdNum">3</div></div>
    <div id="pipWrap"><img id="pipImg"></div>
    </div>
  </div>

  <div id="botBar">
    <div id="modeRow">
      <button class="mBtn" data-m="video">VIDEO</button>
      <button class="mBtn on" data-m="photo">PHOTO</button>
    </div>
    <div id="ctrlRow">
      <button id="thumbBtn"><img id="thumbImg" alt=""></button>
      <button id="shutter"><div id="sInner"></div></button>
      <button id="flipBtn">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M16 5l4 4-4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 9h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M10 17l-4 4 4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 21H6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- GALLERY -->

<div class="pg" id="galPg">
  <div id="galHead">
    <span>갤러리</span>
    <div id="galHeadR">
      <button class="ghBtn" id="selBtn">선택</button>
      <button class="ghBtn" id="galClose">닫기</button>
    </div>
  </div>
  <div id="galGrid"></div>
  <div id="galEmpty"><span style="font-size:44px;opacity:.25">📷</span><span>사진이 없어요</span></div>
  <div id="selBar">
    <span id="selN">0장 선택됨</span>
    <div style="display:flex;gap:8px">
      <button class="ghBtn del" id="delSelBtn">삭제</button>
      <button class="ghBtn pri" id="dlSelBtn">저장</button>
    </div>
  </div>
</div>

<!-- VIEWER -->

<div id="viewer">
  <div id="vwHead">
    <button class="vwBtn" id="vwBack">← 뒤로</button>
    <span id="vwIdx" style="color:rgba(255,255,255,.4);font-size:13px"></span>
    <button class="vwBtn" id="vwDl">저장</button>
  </div>
  <div id="vwBody" id="vwBodyEl">
    <div id="vwWrap">
      <img id="vwImg">
      <div id="vwSub"><img id="vwSubImg"></div>
    </div>
  </div>
  <div id="vwFoot">
    <button class="vwBtn del" id="vwDel">삭제</button>
  </div>
</div>

<div id="toast"></div>
<canvas id="cv" style="display:none"></canvas>

<script>
(() => {
  /* STATE */
  let cam=null, camTrack=null, facing='back';

  /* ── Safe Area 동적 적용 (홈화면 앱 대응) ── */
  (function fixSafeArea() {
    const el = document.getElementById('topBar');
    // CSS env() 값을 읽기 위해 임시 엘리먼트 사용
    const probe = document.createElement('div');
    probe.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);width:1px;height:1px;pointer-events:none;visibility:hidden;';
    document.body.appendChild(probe);
    const sat = probe.getBoundingClientRect().top;
    document.body.removeChild(probe);
    const pad = Math.max(sat + 14, 80);
    el.style.paddingTop = pad + 'px';
  })();
  let mode='photo', bothMode=false, flashMode='off';
  let processing=false, recording=false;
  let recorder=null, recChunks=[];
  let db=null, items=[], selMode=false, selIds=new Set(), vwIdx=0;
  let pvSwapped=false, pvTapTimer=null;
  let bFirstURL=null, bFirstFacing=null;

  /* DOM */
  const $ = id => document.getElementById(id);
  const camPg=$('camPg'), galPg=$('galPg'), viewer=$('viewer');
  const mainVid=$('mainVid'), flashFx=$('flashFx'), focusRing=$('focusRing');
  const cdOverlay=$('cdOverlay'), cdNum=$('cdNum');
  const pipWrap=$('pipWrap'), pipImg=$('pipImg');
  const shutter=$('shutter'), sInner=$('sInner');
  const thumbImg=$('thumbImg'), thumbBtn=$('thumbBtn');
  const flashBtn=$('flashBtn'), flashPath=$('flashPath'), bothBtn=$('bothBtn');
  const flipBtn=$('flipBtn'), vf=$('vf');
  const galGrid=$('galGrid'), galEmpty=$('galEmpty'), selBar=$('selBar'), selN=$('selN');
  const vwImg=$('vwImg'), vwSubImg=$('vwSubImg'), vwSub=$('vwSub'), vwIdxEl=$('vwIdx');
  const toast=$('toast'), cv=$('cv');

  /* DB */
  const req = indexedDB.open('newmera_v3', 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore('media',{keyPath:'id'});
  req.onsuccess = e => { db=e.target.result; loadItems(); startCam(); };
  req.onerror = () => showToast('DB 오류');

  /* CAMERA */
  async function startCam() {
    try {
      if (cam) cam.getTracks().forEach(t=>t.stop());
      mainVid.classList.remove('on');
      cam = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode: facing==='back'?'environment':'user' },
        audio:false
      });
      camTrack = cam.getVideoTracks()[0]||null;
      mainVid.srcObject = cam;
      mainVid.style.transform = facing==='front'?'scaleX(-1)':'none';
      mainVid.addEventListener('canplay',()=>mainVid.classList.add('on'),{once:true});
      mainVid.play().catch(()=>{});
    } catch(e) { showToast('카메라 권한을 허용해주세요'); }
  }

  function stopCam() {
    if(cam){ cam.getTracks().forEach(t=>t.stop()); cam=null; camTrack=null; }
    mainVid.srcObject=null; mainVid.classList.remove('on');
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (recording) stopRec();
      stopCam();
    } else {
      startCam();
    }
  });
  window.addEventListener('pagehide', stopCam);

  /* FOCUS TAP */
  vf.addEventListener('click', e=>{
    focusRing.style.left=e.clientX+'px'; focusRing.style.top=e.clientY+'px';
    focusRing.style.display='block';
    setTimeout(()=>focusRing.style.display='none',1000);
  });

  /* FLASH */
  flashBtn.onclick = async()=>{
    flashMode = flashMode==='off'?'on':'off';
    flashPath.setAttribute('fill', flashMode==='on'?'#ffd60a':'rgba(255,255,255,0.85)');
    if(flashMode==='off') try{ await setTorch(false); }catch{}
  };
  async function setTorch(on){
    if(!camTrack||facing!=='back') return false;
    const caps=camTrack.getCapabilities?.()??{};
    if(!caps.torch) return false;
    await camTrack.applyConstraints({advanced:[{torch:on}]});
    return true;
  }
  async function doFlash(){
    if(flashMode!=='on') return;
    const ok=await setTorch(true);
    if(!ok){ flashFx.style.opacity='1'; setTimeout(()=>flashFx.style.opacity='0',100); return; }
    setTimeout(()=>setTorch(false).catch(()=>{}),130);
  }

  /* BOTH */
  bothBtn.onclick=()=>{
    if(mode!=='photo'){ showToast('PHOTO 모드에서만 가능해요'); return; }
    bothMode=!bothMode;
    bothBtn.classList.toggle('on',bothMode);
    bothBtn.innerHTML=bothMode?'BOTH&nbsp;ON':'BOTH';
    showToast(bothMode?'BOTH ON':'BOTH OFF');
  };

  /* FLIP */
  flipBtn.onclick=async()=>{
    if(recording) return;
    facing=facing==='back'?'front':'back';
    await startCam();
  };

  /* MODE */
  /* ── 스와이프로 모드 전환 ── */
  const modes = ['video','photo'];
  let swipeStartX = 0;

  function switchToMode(m) {
    const btn = document.querySelector(`.mBtn[data-m="${m}"]`);
    if (btn) btn.click();
  }

  document.getElementById('botBar').addEventListener('touchstart', e => {
    swipeStartX = e.touches[0].clientX;
  }, { passive:true });

  document.getElementById('botBar').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeStartX;
    if (Math.abs(dx) < 40) return; // 너무 짧은 건 무시
    const cur = modes.indexOf(mode);
    if (dx < 0 && cur < modes.length-1) switchToMode(modes[cur+1]); // 왼쪽 → 다음
    if (dx > 0 && cur > 0) switchToMode(modes[cur-1]); // 오른쪽 → 이전
  }, { passive:true });

  // 뷰파인더에서도 스와이프 가능
  document.getElementById('vf').addEventListener('touchstart', e => {
    swipeStartX = e.touches[0].clientX;
  }, { passive:true });

  document.getElementById('vf').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeStartX;
    if (Math.abs(dx) < 60) return;
    const cur = modes.indexOf(mode);
    if (dx < 0 && cur < modes.length-1) switchToMode(modes[cur+1]);
    if (dx > 0 && cur > 0) switchToMode(modes[cur-1]);
  }, { passive:true });

  document.querySelectorAll('.mBtn').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.mBtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); mode=b.dataset.m;
      const inner=document.getElementById('vfInner');
      shutter.classList.remove('vid','rec');
      if(mode==='video'){
        shutter.classList.add('vid');
        inner.classList.add('landscape');
        flashBtn.style.visibility='hidden';
        bothBtn.style.visibility='hidden';
      } else {
        inner.classList.remove('landscape');
        flashBtn.style.visibility='visible';
        bothBtn.style.visibility='visible';
      }
    };
  });

  /* SHUTTER */
  shutter.onclick=()=>{ mode==='video'?(recording?stopRec():startRec()):handlePhoto(); };

  /* PHOTO */
  async function handlePhoto(){
    if(processing) return; processing=true;
    try{ bothMode?await doBoth():await doSnap(); }
    finally{ setTimeout(()=>processing=false,300); }
  }

  async function doSnap(){
    await doFlash(); flashFx.style.opacity='0.6';
    setTimeout(()=>flashFx.style.opacity='0',80);
    saveItem({type:'photo',main:grab()});
    showToast('저장됨 ✓');
  }

  async function doBoth(){
    bFirstURL=grab(); bFirstFacing=facing;
    pipImg.src=bFirstURL; pipWrap.classList.add('on');
    let c=3; cdNum.textContent=c; cdOverlay.style.display='flex';
    await new Promise(res=>{
      const iv=setInterval(()=>{
        c--; if(c>0) cdNum.textContent=c;
        else{ clearInterval(iv); cdOverlay.style.display='none'; res(); }
      },1000);
    });
    facing=bFirstFacing==='back'?'front':'back';
    await startCam(); await new Promise(r=>setTimeout(r,400));
    const second=grab();
    pipWrap.classList.remove('on');
    composeBoth(bFirstURL,second);
    facing=bFirstFacing; await startCam();
  }

  function grab(){
    const vw=mainVid.videoWidth||1280, vh=mainVid.videoHeight||720;
    cv.width=vw; cv.height=vh;
    const ctx=cv.getContext('2d');
    if(facing==='front'){ ctx.translate(vw,0); ctx.scale(-1,1); }
    ctx.drawImage(mainVid,0,0,vw,vh);
    if(facing==='front') ctx.setTransform(1,0,0,1,0,0);
    return cv.toDataURL('image/jpeg',.92);
  }

  function composeBoth(url1,url2){
    const i1=new Image(),i2=new Image();
    i1.onload=()=>{ i2.onload=()=>{
      const W=i1.width,H=i1.height;
      cv.width=W; cv.height=H;
      const ctx=cv.getContext('2d');
      ctx.drawImage(i1,0,0,W,H);
      // PIP: 왼쪽 상단 (BeReal 스타일)
      const pw=W*.32, ph=pw*(i2.height/i2.width), mg=W*.05, rx=mg, ry=mg, r=18;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(rx+r,ry); ctx.lineTo(rx+pw-r,ry); ctx.quadraticCurveTo(rx+pw,ry,rx+pw,ry+r);
      ctx.lineTo(rx+pw,ry+ph-r); ctx.quadraticCurveTo(rx+pw,ry+ph,rx+pw-r,ry+ph);
      ctx.lineTo(rx+r,ry+ph); ctx.quadraticCurveTo(rx,ry+ph,rx,ry+ph-r);
      ctx.lineTo(rx,ry+r); ctx.quadraticCurveTo(rx,ry,rx+r,ry);
      ctx.closePath(); ctx.clip();
      ctx.drawImage(i2,rx,ry,pw,ph);
      ctx.restore();
      // 테두리
      ctx.strokeStyle='#fff'; ctx.lineWidth=Math.round(W*0.005);
      ctx.beginPath();
      ctx.moveTo(rx+r,ry); ctx.lineTo(rx+pw-r,ry); ctx.quadraticCurveTo(rx+pw,ry,rx+pw,ry+r);
      ctx.lineTo(rx+pw,ry+ph-r); ctx.quadraticCurveTo(rx+pw,ry+ph,rx+pw-r,ry+ph);
      ctx.lineTo(rx+r,ry+ph); ctx.quadraticCurveTo(rx,ry+ph,rx,ry+ph-r);
      ctx.lineTo(rx,ry+r); ctx.quadraticCurveTo(rx,ry,rx+r,ry);
      ctx.closePath(); ctx.stroke();
      saveItem({type:'photo',main:cv.toDataURL('image/jpeg',.92),sub:url2});
      showToast('BOTH 저장됨 ✓');
    }; i2.src=url2; }; i1.src=url1;
  }

  /* VIDEO */
  function startRec(){
    if(!cam||recording) return; recChunks=[];
    const mime=['video/mp4','video/webm;codecs=h264','video/webm'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    try{ recorder=new MediaRecorder(cam,mime?{mimeType:mime}:undefined); }
    catch(e){ recorder=new MediaRecorder(cam); }
    recorder.ondataavailable=e=>{ if(e.data?.size>0) recChunks.push(e.data); };
    recorder.onstop=()=>{
      const blob=new Blob(recChunks,{type:recorder.mimeType||'video/webm'});
      saveItem({type:'video',blob});
      recording=false; shutter.classList.remove('rec'); shutter.classList.add('vid');
      showToast('영상 저장됨 ✓');
    };
    recorder.start(200); recording=true;
    shutter.classList.add('rec'); showToast('● REC');
  }
  function stopRec(){ if(recorder&&recording) recorder.stop(); }

  async function sharePhoto(dataURL, filename) {
    try {
      // dataURL → Blob → File
      const res = await fetch(dataURL);
      const blob = await res.blob();
      const file = new File([blob], filename, { type: 'image/jpeg' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
      } else {
        // fallback: 새 탭
        const w = window.open();
        if (w) w.document.write('<img src="'+dataURL+'" style="max-width:100%"><p style="font-family:sans-serif;text-align:center;color:#888;padding:12px">꾹 눌러서 저장</p>');
      }
    } catch(e) {
      if (e.name !== 'AbortError') showToast('저장 실패');
    }
  }
  function saveItem(item){
    item.id=Date.now()+Math.floor(Math.random()*999);
    const tx=db.transaction('media','readwrite');
    tx.objectStore('media').add(item);
    tx.oncomplete=loadItems;
  }
  function loadItems(){
    if(!db) return;
    db.transaction('media','readonly').objectStore('media').getAll().onsuccess=e=>{
      items=e.target.result.sort((a,b)=>b.id-a.id);
      updateThumb(); renderGallery();
    };
  }
  function updateThumb(){
    if(!items.length){ thumbImg.style.display='none'; return; }
    const p=items[0];
    if(p.type==='photo'&&p.main){ thumbImg.src=p.main; thumbImg.style.display='block'; }
  }

  /* GALLERY */
  thumbBtn.onclick=()=>openGallery();
  $('galClose').onclick=()=>closeGallery();

  function openGallery(){
    selMode=false; selIds.clear(); renderGallery();
    camPg.classList.remove('on'); galPg.classList.add('on');
  }
  function closeGallery(){
    galPg.classList.remove('on'); camPg.classList.add('on'); updateThumb();
  }

  $('selBtn').onclick=()=>{
    selMode=!selMode; selIds.clear();
    $('selBtn').textContent=selMode?'취소':'선택';
    renderGallery();
  };

  function renderGallery(){
    galGrid.innerHTML='';
    selBar.classList.toggle('on', selMode&&selIds.size>0);
    selN.textContent=selIds.size+'장 선택됨';
    if(!items.length){ galGrid.style.display='none'; galEmpty.style.display='flex'; return; }
    galGrid.style.display='grid'; galEmpty.style.display='none';
    items.forEach((p,i)=>{
      const div=document.createElement('div');
      div.className='gItem'+(selMode?' selMode':'')+(selIds.has(p.id)?' sel':'');
      if(p.type==='video'&&p.blob){
        const v=document.createElement('video');
        v.src=URL.createObjectURL(p.blob); v.muted=true; v.playsInline=true; v.preload='metadata';
        div.appendChild(v);
      } else {
        const img=document.createElement('img'); img.src=p.main; div.appendChild(img);
        if(p.sub){ const pip=document.createElement('div'); pip.className='gPip';
          const si=document.createElement('img'); si.src=p.sub; pip.appendChild(si); div.appendChild(pip); }
      }
      const chk=document.createElement('div'); chk.className='gChk'; chk.textContent='✓'; div.appendChild(chk);
      div.onclick=()=>{ if(selMode){ selIds.has(p.id)?selIds.delete(p.id):selIds.add(p.id); renderGallery(); } else openViewer(i); };
      galGrid.appendChild(div);
    });
  }

  $('delSelBtn').onclick=()=>{
    if(!selIds.size) return;
    if(!confirm(selIds.size+'장을 삭제할까요?')) return;
    const tx=db.transaction('media','readwrite'), store=tx.objectStore('media');
    selIds.forEach(id=>store.delete(id));
    tx.oncomplete=()=>{ selIds.clear(); selMode=false; loadItems(); showToast('삭제됨'); };
  };
  $('dlSelBtn').onclick=async()=>{
    if(!selIds.size){ showToast('사진을 선택해주세요'); return; }
    const sel=items.filter(p=>selIds.has(p.id)&&p.type==='photo');
    if(!sel.length){ showToast('사진만 저장 가능해요'); return; }
    for(const p of sel) await sharePhoto(p.main,'newmera_'+p.id+'.jpg');
  };

  /* VIEWER */
  function openViewer(idx){
    vwIdx=idx; pvSwapped=false;
    const p=items[idx]; if(!p) return;
    vwImg.src=p.main||'';
    vwIdxEl.textContent=(idx+1)+' / '+items.length;
    if(p.sub){ vwSubImg.src=p.sub; vwSub.style.display='block'; }
    else vwSub.style.display='none';
    viewer.classList.add('on');
    if(p.sub) showToast('더블탭으로 전환 👆');
  }
  $('vwBack').onclick=()=>{ viewer.classList.remove('on'); pvSwapped=false; };
  $('vwDl').onclick=async()=>{
    const p=items[vwIdx]; if(!p||p.type==='video') return;
    await sharePhoto(p.main,'newmera_'+p.id+'.jpg');
  };
  $('vwDel').onclick=()=>{
    const p=items[vwIdx]; if(!p||!confirm('삭제할까요?')) return;
    const tx=db.transaction('media','readwrite'); tx.objectStore('media').delete(p.id);
    tx.oncomplete=()=>{ viewer.classList.remove('on'); loadItems(); showToast('삭제됨'); };
  };

  /* double tap swap */
  $('vwBody')||document.getElementById('vwBody');
  document.getElementById('vwBodyEl')?.addEventListener('click',()=>{
    const p=items[vwIdx]; if(!p?.sub) return;
    if(pvTapTimer){ clearTimeout(pvTapTimer); pvTapTimer=null;
      pvSwapped=!pvSwapped;
      vwImg.style.opacity='0';
      setTimeout(()=>{ vwImg.src=pvSwapped?p.sub:p.main; vwSubImg.src=pvSwapped?p.main:p.sub; vwImg.style.opacity='1'; },150);
    } else pvTapTimer=setTimeout(()=>pvTapTimer=null,280);
  });

  /* TOAST */
  let toastT;
  function showToast(msg,ms=1400){
    toast.textContent=msg; toast.classList.add('on');
    clearTimeout(toastT); toastT=setTimeout(()=>toast.classList.remove('on'),ms);
  }
})();
</script>

</body>
