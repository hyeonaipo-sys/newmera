<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Newmera</title>

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --yellow:#ffd60a;
  --white:rgba(255,255,255,.96);
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
button{
  border:none;
  background:none;
  color:inherit;
  font:inherit;
  outline:none;
}
.screen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  background:#000;
}
.screen.active{display:flex;}

#camScreen{overflow:hidden;}

#topBar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:20;
  padding:max(var(--safe-top), 8px) 18px 0;
}
#topRow{
  height:32px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:center;
}
.topCtl{
  display:flex;
  align-items:center;
  color:var(--white);
  font-size:14px;
  font-weight:500;
}
.topCtl.center{justify-content:center;}
.topCtl.right{justify-content:flex-end;}
.topCtl button{
  min-height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  color:inherit;
}
#flashBtn .bolt{
  color:var(--yellow);
  font-size:22px;
  line-height:1;
}
#ratioWrap{position:relative;}
#ratioMenu{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  flex-direction:column;
  min-width:78px;
  overflow:hidden;
  border-radius:12px;
  background:rgba(28,28,30,.96);
  border:1px solid rgba(255,255,255,.08);
}
#ratioMenu.show{display:flex;}
.ratioOpt{
  padding:10px 12px;
  text-align:center;
  font-size:13px;
  font-weight:700;
  color:#fff;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.ratioOpt:last-child{border-bottom:none;}
.ratioOpt.selected{color:var(--yellow);}

#vfWrap{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:54px 18px 0;
}
#vf{
  position:relative;
  width:100%;
  max-width:430px;
  aspect-ratio:3/4;
  overflow:hidden;
  border-radius:34px;
  background:#111;
}
#mainVid{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#111;
  pointer-events:none;
}
#mainVid::-webkit-media-controls,
#mainVid::-webkit-media-controls-panel,
#mainVid::-webkit-media-controls-play-button,
#mainVid::-webkit-media-controls-start-playback-button{
  display:none !important;
  -webkit-appearance:none;
}
#touchShield{
  position:absolute;
  inset:0;
  z-index:5;
  background:transparent;
  touch-action:none;
}
#centerOverlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:10;
}
#countdownBubble{
  min-width:104px;
  height:104px;
  padding:0 18px;
  border-radius:52px;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(70,70,70,.68);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#fff;
  font-size:44px;
  font-weight:900;
}

#bottomUI{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  z-index:20;
  background:linear-gradient(to top,#000 68%,rgba(0,0,0,0));
  padding:20px 18px max(var(--safe-bottom), 26px);
}
#modeRail{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:46px;
  margin-bottom:18px;
}
.mode{
  font-size:17px;
  letter-spacing:1.2px;
  font-weight:400;
  color:rgba(255,255,255,.7);
}
.mode.active{
  color:var(--yellow);
}
#controlsRow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}
.sideCtl{
  display:flex;
  align-items:center;
}
.sideCtl.left{justify-content:flex-start;}
.sideCtl.right{justify-content:flex-end;}

#thumbBtn{
  width:54px;
  height:54px;
  border-radius:12px;
  overflow:hidden;
  background:#101010;
  border:1px solid rgba(255,255,255,.16);
  display:flex;
  align-items:center;
  justify-content:center;
}
#thumbBtn img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
#thumbPlaceholder{font-size:24px;}

#flipBtn{
  width:54px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  line-height:1;
}

#shutter{
  width:92px;
  height:92px;
  border-radius:50%;
  border:5px solid #fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
#shutterInner{
  width:72px;
  height:72px;
  border-radius:50%;
  background:#fff;
}
#shutter:active{transform:scale(.97);}

#galleryScreen{z-index:40;}
#galleryHeader{
  padding:max(var(--safe-top), 10px) 14px 12px;
  background:#000;
}
#galleryClose{
  width:100%;
  height:40px;
  border-radius:20px;
  background:#e9e9eb;
  color:#111;
  font-size:16px;
  font-weight:700;
}
#galleryGrid{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  background:#000;
}
.gItem{
  position:relative;
  aspect-ratio:1;
  background:#111;
  overflow:hidden;
}
.gItem > img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.gPip{
  position:absolute;
  top:6px;
  left:6px;
  width:30%;
  aspect-ratio:3/4;
  border-radius:7px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.9);
}
.gPip img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

#viewer{
  position:fixed;
  inset:0;
  z-index:60;
  background:#000;
  display:none;
  flex-direction:column;
}
#viewer.active{display:flex;}
#viewerHeader{
  padding:max(var(--safe-top), 10px) 16px 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.viewerBtn{
  color:#fff;
  font-size:17px;
  font-weight:700;
}
#viewerBody{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
#viewerBox{
  position:relative;
  width:100%;
  max-width:430px;
  aspect-ratio:3/4;
  border-radius:26px;
  overflow:hidden;
  background:#111;
}
#viewerMain{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
#viewerSubWrap{
  position:absolute;
  top:12px;
  left:12px;
  width:30%;
  aspect-ratio:3/4;
  border-radius:12px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.96);
  background:#111;
}
#viewerSub{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

#toast{
  position:fixed;
  top:86px;
  left:50%;
  transform:translateX(-50%);
  z-index:90;
  background:#fff;
  color:#111;
  padding:10px 18px;
  border-radius:999px;
  font-size:14px;
  font-weight:800;
  opacity:0;
  pointer-events:none;
  transition:.22s;
  white-space:nowrap;
}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div class="screen active" id="camScreen">
  <div id="topBar">
    <div id="topRow">
      <div class="topCtl">
        <button id="flashBtn" type="button">
          <span class="bolt">⚡</span>
          <span id="flashLabel">OFF</span>
        </button>
      </div>

      <div class="topCtl center" id="ratioWrap">
        <button id="ratioBtn" type="button">3:4</button>
        <div id="ratioMenu">
          <button class="ratioOpt" type="button" data-ratio="1:1">1:1</button>
          <button class="ratioOpt selected" type="button" data-ratio="3:4">3:4</button>
          <button class="ratioOpt" type="button" data-ratio="9:16">9:16</button>
        </div>
      </div>

      <div class="topCtl right">
        <button id="bothBtn" type="button">BOTH OFF</button>
      </div>
    </div>
  </div>

  <div id="vfWrap">
    <div id="vf">
      <video
        id="mainVid"
        autoplay
        playsinline
        webkit-playsinline
        muted
        preload="none"
        disablepictureinpicture
        disableremoteplayback
        x-webkit-airplay="deny"
        controlslist="nodownload nofullscreen noremoteplayback"
      ></video>

      <div id="touchShield"></div>

      <div id="centerOverlay">
        <div id="countdownBubble"></div>
      </div>
    </div>
  </div>

  <div id="bottomUI">
    <div id="modeRail">
      <button class="mode" id="videoMode" type="button">VIDEO</button>
      <button class="mode active" id="photoMode" type="button">PHOTO</button>
    </div>

    <div id="controlsRow">
      <div class="sideCtl left">
        <button id="thumbBtn" type="button" aria-label="gallery">
          <img id="thumbImg" alt="thumbnail">
          <div id="thumbPlaceholder">🖼️</div>
        </button>
      </div>

      <button id="shutter" type="button" aria-label="shutter">
        <div id="shutterInner"></div>
      </button>

      <div class="sideCtl right">
        <button id="flipBtn" type="button" aria-label="flip">🔄</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="galleryScreen">
  <div id="galleryHeader">
    <button id="galleryClose" type="button">닫기</button>
  </div>
  <div id="galleryGrid"></div>
</div>

<div id="viewer">
  <div id="viewerHeader">
    <button class="viewerBtn" id="viewerDone" type="button">Done</button>
    <button class="viewerBtn" id="viewerDelete" type="button">Delete</button>
  </div>
  <div id="viewerBody">
    <div id="viewerBox">
      <img id="viewerMain" alt="photo">
      <div id="viewerSubWrap" style="display:none;">
        <img id="viewerSub" alt="sub photo">
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(() => {
  let stream = null;
  let track = null;
  let facing = 'back';
  let bothMode = false;
  let mode = 'photo';
  let db = null;
  let items = [];
  let isProcessing = false;
  let currentRatio = '3:4';
  let viewerIndex = -1;
  let flashMode = 'off';

  const camScreen = document.getElementById('camScreen');
  const galleryScreen = document.getElementById('galleryScreen');
  const mainVid = document.getElementById('mainVid');
  const vf = document.getElementById('vf');
  const ratioBtn = document.getElementById('ratioBtn');
  const ratioMenu = document.getElementById('ratioMenu');
  const bothBtn = document.getElementById('bothBtn');
  const flashBtn = document.getElementById('flashBtn');
  const flashLabel = document.getElementById('flashLabel');
  const shutter = document.getElementById('shutter');
  const thumbBtn = document.getElementById('thumbBtn');
  const thumbImg = document.getElementById('thumbImg');
  const thumbPlaceholder = document.getElementById('thumbPlaceholder');
  const flipBtn = document.getElementById('flipBtn');
  const galleryClose = document.getElementById('galleryClose');
  const galleryGrid = document.getElementById('galleryGrid');
  const canvas = document.getElementById('canvas');
  const toast = document.getElementById('toast');
  const countdownBubble = document.getElementById('countdownBubble');
  const touchShield = document.getElementById('touchShield');
  const videoMode = document.getElementById('videoMode');
  const photoMode = document.getElementById('photoMode');

  const viewer = document.getElementById('viewer');
  const viewerMain = document.getElementById('viewerMain');
  const viewerSub = document.getElementById('viewerSub');
  const viewerSubWrap = document.getElementById('viewerSubWrap');
  const viewerDone = document.getElementById('viewerDone');
  const viewerDelete = document.getElementById('viewerDelete');
  const viewerBox = document.getElementById('viewerBox');

  mainVid.controls = false;
  mainVid.removeAttribute('controls');

  ['touchstart','touchend','click'].forEach(type => {
    touchShield.addEventListener(type, (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive:false });
  });

  const req = indexedDB.open('newmera_local_db_v7', 1);
  req.onupgradeneeded = (e) => {
    db = e.target.result;
    if (!db.objectStoreNames.contains('photos')) {
      db.createObjectStore('photos', { keyPath: 'id' });
    }
  };
  req.onsuccess = (e) => {
    db = e.target.result;
    loadItems();
    startCam();
  };
  req.onerror = () => showToast('DB ERROR');

  async function startCam() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());

      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: facing === 'back' ? 'environment' : 'user',
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });

      track = stream.getVideoTracks()[0] || null;

      mainVid.srcObject = stream;
      mainVid.setAttribute('playsinline', 'true');
      mainVid.setAttribute('webkit-playsinline', 'true');
      mainVid.muted = true;
      mainVid.playsInline = true;
      mainVid.disablePictureInPicture = true;
      mainVid.style.transform = facing === 'front' ? 'scaleX(-1)' : 'scaleX(1)';

      if (flashMode === 'on') {
        const ok = await setTorch(true);
        if (!ok) {
          flashMode = 'off';
          updateFlashUI();
          showToast(facing === 'front' ? 'FRONT NO TORCH' : 'TORCH UNSUPPORTED', 1100);
        }
      } else {
        await setTorch(false);
      }

      const p = mainVid.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    } catch (err) {
      showToast('CAMERA ERROR');
    }
  }

  function getAspectValue(ratio) {
    if (ratio === '1:1') return '1 / 1';
    if (ratio === '9:16') return '9 / 16';
    return '3 / 4';
  }

  function setRatio(ratio) {
    currentRatio = ratio;
    ratioBtn.textContent = ratio;
    ratioMenu.classList.remove('show');
    vf.style.aspectRatio = getAspectValue(ratio);

    document.querySelectorAll('.ratioOpt').forEach(el => {
      el.classList.toggle('selected', el.dataset.ratio === ratio);
    });
  }

  function showToast(text, duration = 1100) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), duration);
  }

  function showCenterText(text) {
    countdownBubble.textContent = text;
    countdownBubble.style.display = 'flex';
  }

  function hideCenterText() {
    countdownBubble.style.display = 'none';
  }

  function updateFlashUI() {
    flashLabel.textContent = flashMode.toUpperCase();
    flashBtn.classList.toggle('active', flashMode === 'on');
  }

  async function setTorch(on) {
    try {
      if (!track || facing !== 'back') return false;
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (!caps.torch) return false;
      await track.applyConstraints({ advanced: [{ torch: on }] });
      return true;
    } catch {
      return false;
    }
  }

  function grab() {
    const ctx = canvas.getContext('2d');

    if (currentRatio === '1:1') {
      canvas.width = 1080;
      canvas.height = 1080;
    } else if (currentRatio === '9:16') {
      canvas.width = 1080;
      canvas.height = 1920;
    } else {
      canvas.width = 1080;
      canvas.height = 1440;
    }

    const vW = mainVid.videoWidth || 1080;
    const vH = mainVid.videoHeight || 1440;
    const vAspect = vW / vH;
    const tAspect = canvas.width / canvas.height;

    let sW, sH, sX, sY;
    if (vAspect > tAspect) {
      sH = vH;
      sW = vH * tAspect;
      sX = (vW - sW) / 2;
      sY = 0;
    } else {
      sW = vW;
      sH = vW / tAspect;
      sX = 0;
      sY = (vH - sH) / 2;
    }

    ctx.save();
    if (facing === 'front') {
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(mainVid, sX, sY, sW, sH, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    return canvas.toDataURL('image/jpeg', 0.84);
  }

  function saveItem(item) {
    item.id = Date.now() + Math.floor(Math.random() * 1000);
    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').add(item);
    tx.oncomplete = loadItems;
    tx.onerror = () => showToast('SAVE ERROR');
  }

  function loadItems() {
    if (!db) return;
    const tx = db.transaction('photos', 'readonly');
    tx.objectStore('photos').getAll().onsuccess = (e) => {
      items = e.target.result.sort((a, b) => b.id - a.id);
      renderThumb();
      renderGallery();
    };
  }

  function renderThumb() {
    if (items.length > 0 && items[0].main) {
      thumbImg.src = items[0].main;
      thumbImg.style.display = 'block';
      thumbPlaceholder.style.display = 'none';
    } else {
      thumbImg.removeAttribute('src');
      thumbImg.style.display = 'none';
      thumbPlaceholder.style.display = 'block';
    }
  }

  function renderGallery() {
    galleryGrid.innerHTML = '';

    items.forEach((item, index) => {
      const div = document.createElement('button');
      div.className = 'gItem';
      div.type = 'button';

      const main = document.createElement('img');
      main.src = item.main;
      div.appendChild(main);

      if (item.sub) {
        const pip = document.createElement('div');
        pip.className = 'gPip';
        const sub = document.createElement('img');
        sub.src = item.sub;
        pip.appendChild(sub);
        div.appendChild(pip);
      }

      div.addEventListener('click', () => openViewer(index));
      galleryGrid.appendChild(div);
    });
  }

  function openGallery() {
    camScreen.classList.remove('active');
    galleryScreen.classList.add('active');
  }

  function closeGallery() {
    galleryScreen.classList.remove('active');
    camScreen.classList.add('active');
  }

  function openViewer(index) {
    viewerIndex = index;
    const item = items[index];
    if (!item) return;

    viewerMain.src = item.main;
    viewerBox.style.aspectRatio = getAspectValue(item.ratio || '3:4');

    if (item.sub) {
      viewerSub.src = item.sub;
      viewerSubWrap.style.display = 'block';
    } else {
      viewerSubWrap.style.display = 'none';
      viewerSub.removeAttribute('src');
    }

    viewer.classList.add('active');
  }

  function closeViewer() {
    viewer.classList.remove('active');
  }

  function deleteViewerItem() {
    const item = items[viewerIndex];
    if (!item) return;

    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').delete(item.id);
    tx.oncomplete = () => {
      closeViewer();
      loadItems();
      showToast('DELETED');
    };
  }

  function setMode(nextMode) {
    mode = nextMode;
    videoMode.classList.toggle('active', mode === 'video');
    photoMode.classList.toggle('active', mode === 'photo');
  }

  async function handleBothShot() {
    const first = grab();

    showToast('CHANGE', 700);
    facing = facing === 'back' ? 'front' : 'back';
    await startCam();

    let count = 3;
    showCenterText(count);

    await new Promise(resolve => {
      const timer = setInterval(() => {
        count -= 1;
        if (count > 0) showCenterText(count);
        else {
          clearInterval(timer);
          hideCenterText();
          resolve();
        }
      }, 1000);
    });

    const second = grab();

    saveItem({
      type:'photo',
      main:first,
      sub:second,
      ratio:currentRatio
    });

    showToast('DONE ✓', 1300);
  }

  async function handleShot() {
    if (isProcessing || mode !== 'photo') return;
    isProcessing = true;

    if (bothMode) {
      await handleBothShot();
    } else {
      const shot = grab();
      saveItem({
        type:'photo',
        main:shot,
        ratio:currentRatio
      });
      showToast('DONE ✓', 1100);
    }

    setTimeout(() => {
      isProcessing = false;
    }, 260);
  }

  flashBtn.addEventListener('click', async () => {
    if (facing !== 'back') {
      flashMode = 'off';
      updateFlashUI();
      showToast('FRONT NO TORCH', 1100);
      return;
    }

    if (flashMode === 'off') {
      flashMode = 'on';
      updateFlashUI();
      const ok = await setTorch(true);
      if (!ok) {
        flashMode = 'off';
        updateFlashUI();
        showToast('TORCH UNSUPPORTED', 1100);
      }
    } else {
      flashMode = 'off';
      updateFlashUI();
      await setTorch(false);
    }
  });

  ratioBtn.addEventListener('click', () => {
    ratioMenu.classList.toggle('show');
  });

  document.querySelectorAll('.ratioOpt').forEach(btn => {
    btn.addEventListener('click', () => setRatio(btn.dataset.ratio));
  });

  bothBtn.addEventListener('click', () => {
    bothMode = !bothMode;
    bothBtn.textContent = bothMode ? 'BOTH ON' : 'BOTH OFF';
  });

  shutter.addEventListener('click', handleShot);
  thumbBtn.addEventListener('click', openGallery);
  galleryClose.addEventListener('click', closeGallery);

  flipBtn.addEventListener('click', async () => {
    if (flashMode === 'on') {
      await setTorch(false);
      flashMode = 'off';
      updateFlashUI();
    }
    facing = facing === 'back' ? 'front' : 'back';
    await startCam();
  });

  viewerDone.addEventListener('click', closeViewer);
  viewerDelete.addEventListener('click', deleteViewerItem);

  videoMode.addEventListener('click', () => {
    setMode('video');
    showToast('VIDEO 준비중', 800);
  });
  photoMode.addEventListener('click', () => {
    setMode('photo');
  });

  document.addEventListener('click', (e) => {
    const insideRatio = ratioBtn.contains(e.target) || ratioMenu.contains(e.target);
    if (!insideRatio) ratioMenu.classList.remove('show');
  });

  updateFlashUI();
  setRatio('3:4');
})();
</script>
</body>
</html>
