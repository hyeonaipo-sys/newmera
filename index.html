<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera Pro BeReal</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-red: #ff3b30;
  --ios-yellow: #ffd60a;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }

.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* TOP BAR - Seamless integration like Image 1 */
#topBar { 
  height: 60px;
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 0 20px; 
  margin-top: max(var(--safe-top), 10px);
  z-index: 100;
  position: absolute;
  top: 0; left: 0; right: 0;
}
.top-btn { 
  background: rgba(0,0,0,0.4); 
  border: none;
  color: #fff; 
  min-width: 44px;
  height: 44px; 
  border-radius: 22px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 16px; 
  backdrop-filter: blur(15px); 
  padding: 0 15px;
  font-weight: 600;
}
.top-btn.active { background: var(--ios-yellow); color: #000; }

/* VIEWPORT - Fills from top to the control area */
#vfContainer { 
  position: relative; 
  width: 100%;
  height: 100%;
  display: flex; 
  flex-direction: column;
}
#vf { 
  position: relative; 
  width: 100%; 
  flex: 1;
  overflow: hidden; 
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom-left-radius: 40px;
  border-bottom-right-radius: 40px;
}
#mainVid { width: 100%; height: 100%; object-fit: cover; }
#mainVid.mirror { transform: scaleX(-1); }

/* COUNTDOWN & CHANGE Overlay */
#overlayMsg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: 900;
  color: #fff;
  z-index: 150;
  display: none;
  text-align: center;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
}

/* FLASH SCREEN EFFECT */
#flashScreen {
  position: fixed; inset: 0; background: #fff; z-index: 2000; display: none;
}

/* BOTTOM CONTROLS */
#cameraBottom { 
  background: #000; 
  padding: 20px 0 calc(var(--safe-bottom) + 20px); 
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
#modesWrapper { 
  display: flex; 
  gap: 30px; 
  font-size: 14px; 
  font-weight: 800; 
}
.mode { color: rgba(255,255,255,0.4); }
.mode.active { color: var(--ios-yellow); }

#shutterRow { 
  width: 100%;
  display: flex; 
  align-items: center; 
  justify-content: space-evenly; 
}
#thumb { 
  width: 50px; height: 50px; border-radius: 50%; background: #222; overflow: hidden; border: 2px solid rgba(255,255,255,0.2); 
}
#thumb img { width: 100%; height: 100%; object-fit: cover; }
#shutter { 
  width: 76px; height: 76px; border-radius: 50%; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; 
}
#shutterInner { 
  width: 58px; height: 58px; border-radius: 50%; background: #fff; transition: 0.2s; 
}
#shutter.recording #shutterInner { background: var(--ios-red); border-radius: 10px; transform: scale(0.6); }

/* LIBRARY & VIEWER */
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
.gItem { width: 100%; aspect-ratio: 1; background: #1c1c1e; position: relative; }
.gItem img.main { width: 100%; height: 100%; object-fit: cover; }
.gItem img.sub { position: absolute; top: 4px; left: 4px; width: 30%; border: 1px solid #fff; border-radius: 4px; }

#photoViewer { position: fixed; inset: 0; background: #000; display: none; z-index: 500; flex-direction: column; }
#photoViewer.active { display: flex; }
#pvHeader { padding: max(var(--safe-top), 20px) 20px 10px; display: flex; justify-content: space-between; }
#pvContainer { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
#pvMainImg { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }
#pvSubImg { position: absolute; top: 20px; left: 20px; width: 28%; border: 2px solid #fff; border-radius: 12px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

#toast { position: fixed; top: 130px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 25px; border-radius: 25px; font-size: 14px; font-weight: 800; z-index: 1000; opacity: 0; transition: 0.3s; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="flashScreen"></div>

<div class="screen active" id="cameraScreen">
  <div id="vfContainer">
    <div id="vf">
      <video id="mainVid" autoplay playsinline muted></video>
      <div id="overlayMsg">3</div>
    </div>
  </div>

  <div id="topBar">
    <button class="top-btn" onclick="toggleFlash()" id="flashBtn">⚡️ OFF</button>
    <button class="top-btn" onclick="toggleBoth()" id="bothBtn">BOTH OFF</button>
  </div>

  <div id="cameraBottom">
    <div id="modesWrapper">
      <div class="mode" id="mode-video">VIDEO</div>
      <div class="mode active" id="mode-photo">PHOTO</div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLib()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCam()" style="font-size:26px">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header style="padding: 40px 20px 20px;">
    <h1 style="font-size:32px; font-weight:800;">Library</h1>
  </header>
  <div id="galleryGrid"></div>
  <button onclick="closeLib()" style="position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:15px 40px; border-radius:30px; font-weight:800; border:none; z-index:250;">Back</button>
</div>

<div id="photoViewer">
  <div id="pvHeader">
    <button onclick="closeViewer()" style="color:var(--ios-blue); font-size:18px; background:none; border:none">Done</button>
    <button onclick="deleteItem()" style="color:var(--ios-red); font-size:18px; background:none; border:none">Delete</button>
  </div>
  <div id="pvContainer">
    <img id="pvMainImg">
    <img id="pvSubImg">
    <video id="pvMainVid" controls style="display:none; width:100%; height:100%; object-fit:contain"></video>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, facing='back', items=[], db=null;
  let flash=false, bothMode=false, isProcessing=false;
  
  const mainVid = document.getElementById('mainVid');
  const canvas = document.getElementById('canvas');
  const overlayMsg = document.getElementById('overlayMsg');
  const flashScreen = document.getElementById('flashScreen');
  const thumbImg = document.getElementById('thumbImg');

  const req = indexedDB.open("Newmera_BeReal_Final_DB", 3);
  req.onupgradeneeded = e => { 
    db = e.target.result; 
    if(!db.objectStoreNames.contains("media")) db.createObjectStore("media", {keyPath:"id"}); 
  };
  req.onsuccess = e => { db = e.target.result; loadItems(); startCam(); };

  async function startCam() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: facing==='back'?'environment':'user', width:{ideal:1920}, height:{ideal:1080} } 
      });
      mainVid.srcObject = stream;
      mainVid.className = facing=='front'?'mirror':'';
    } catch(e) { console.error(e); }
  }

  window.toggleFlash = () => {
    flash = !flash;
    const btn = document.getElementById('flashBtn');
    btn.textContent = flash ? '⚡️ ON' : '⚡️ OFF';
    btn.classList.toggle('active', flash);
  };

  window.toggleBoth = () => {
    bothMode = !bothMode;
    const btn = document.getElementById('bothBtn');
    btn.textContent = bothMode ? 'BOTH ON' : 'BOTH OFF';
    btn.classList.toggle('active', bothMode);
  };

  window.handleShutter = async () => {
    if(isProcessing) return;
    isProcessing = true;

    if(bothMode) {
        await executeBeRealFlow();
    } else {
        await triggerFlashEffect();
        const data = grab(1.0);
        saveItem({ type:'photo', main: data });
        msg('SAVED');
        isProcessing = false;
    }
  };

  async function triggerFlashEffect() {
    if(!flash) return;
    const track = stream.getVideoTracks()[0];
    try {
        await track.applyConstraints({ advanced: [{ torch: true }] });
        flashScreen.style.display = 'block';
        setTimeout(async () => {
            flashScreen.style.display = 'none';
            await track.applyConstraints({ advanced: [{ torch: false }] });
        }, 100);
    } catch(e) {
        flashScreen.style.display = 'block';
        setTimeout(() => flashScreen.style.display = 'none', 100);
    }
  }

  async function executeBeRealFlow() {
    // 1. First Side (Usually Back)
    await triggerFlashEffect();
    const firstSide = grab(1.0);
    
    // 2. Change!
    overlayMsg.textContent = "CHANGE!";
    overlayMsg.style.display = "block";
    facing = facing === 'back' ? 'front' : 'back';
    await startCam();
    
    setTimeout(() => {
        // 3. Countdown 3s
        let count = 3;
        overlayMsg.textContent = count;
        const cdInt = setInterval(async () => {
            count--;
            if(count > 0) {
                overlayMsg.textContent = count;
            } else {
                clearInterval(cdInt);
                overlayMsg.style.display = 'none';
                // 4. Second Side
                await triggerFlashEffect();
                const secondSide = grab(1.0);
                saveItem({ type:'photo', main: firstSide, sub: secondSide });
                msg('BEREAL SAVED');
                isProcessing = false;
            }
        }, 1000);
    }, 1000);
  }

  function grab(q) {
    const ctx = canvas.getContext('2d');
    const vW = mainVid.videoWidth, vH = mainVid.videoHeight;
    canvas.width = 1080; canvas.height = 1440; // Fixed 3:4 for high quality
    
    const vAspect = vW / vH, tAspect = canvas.width / canvas.height;
    let sW, sH, sX, sY;
    if (vAspect > tAspect) { sH = vH; sW = vH * tAspect; sX = (vW - sW) / 2; sY = 0; } 
    else { sW = vW; sH = vW / tAspect; sX = 0; sY = (vH - sH) / 2; }

    ctx.save();
    if(facing==='front') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(mainVid, sX, sY, sW, sH, 0, 0, canvas.width, canvas.height);
    ctx.restore();
    return canvas.toDataURL('image/jpeg', q);
  }

  function saveItem(item) {
    item.id = Date.now();
    const tx = db.transaction("media", "readwrite");
    tx.objectStore("media").add(item).onsuccess = () => loadItems();
  }

  function loadItems() {
    db.transaction("media", "readonly").objectStore("media").getAll().onsuccess = e => {
      items = e.target.result.sort((a,b)=>b.id-a.id);
      if(items.length>0) { thumbImg.src = items[0].main; thumbImg.parentElement.style.display = 'block'; }
      renderGrid();
    };
  }

  window.openLib = () => { document.getElementById('libraryScreen').classList.add('active'); renderGrid(); };
  window.closeLib = () => document.getElementById('libraryScreen').classList.remove('active');

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    items.forEach((it, i) => {
      const div = document.createElement('div');
      div.className = 'gItem';
      div.innerHTML = `<img src="${it.main}" class="main">${it.sub ? `<img src="${it.sub}" class="sub">` : ''}`;
      div.onclick = () => openViewer(i);
      grid.appendChild(div);
    });
  }

  let vIdx = 0;
  window.openViewer = i => {
    vIdx = i; const it = items[i];
    document.getElementById('photoViewer').classList.add('active');
    document.getElementById('pvMainImg').src = it.main;
    if(it.sub) {
        document.getElementById('pvSubImg').src = it.sub;
        document.getElementById('pvSubImg').style.display = 'block';
    } else {
        document.getElementById('pvSubImg').style.display = 'none';
    }
  };
  window.closeViewer = () => document.getElementById('photoViewer').classList.remove('active');
  window.deleteItem = () => {
    db.transaction("media", "readwrite").objectStore("media").delete(items[vIdx].id).oncomplete = () => {
        loadItems(); closeViewer();
    };
  };
  window.flipCam = () => { facing=facing==='back'?'front':'back'; startCam(); };
  function msg(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
})();
</script>
</body>
</html>
