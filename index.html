<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Newmera</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;font-family:-apple-system,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:#000;z-index:10}
.screen.active{display:flex}

/* ══════════════════════════════
CAMERA SCREEN
══════════════════════════════ */
#vf{position:relative;flex:1;background:#111;overflow:hidden;min-height:0}
#mainVid{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#mainVid.mirror{transform:scaleX(-1)}

/* topbar */
#topbar{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);z-index:20}
.tbtn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:background .2s;flex-shrink:0}
.tbtn.on{background:#ffd60a;color:#000;border-color:#ffd60a}
#appTitle{color:#fff;font-size:17px;font-weight:700;letter-spacing:-.02em}

/* countdown */
#countdownOverlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:30;pointer-events:none}
#countdownOverlay.show{display:flex}
#countdownNum{font-size:120px;font-weight:700;color:#fff;line-height:1;animation:pop .3s ease;text-shadow: 0 4px 20px rgba(0,0,0,0.5)}

/* pip preview (촬영 중) */
#capturePreview{position:absolute;top:70px;right:16px;width:96px;height:128px;border-radius:12px;overflow:hidden;border:2px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,.6);z-index:40;display:none}
#capturePreview.show{display:block}
#capturePreviewImg{width:100%;height:100%;object-fit:cover}

/* focus / flash */
#focus{position:absolute;width:60px;height:60px;border:2px solid #ffd60a;border-radius:8px;pointer-events:none;display:none;z-index:15;transform:translate(-50%,-50%)}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50;transition:opacity .05s}

/* zoom */
#zoomRow{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.zbtn{min-width:36px;height:34px;border-radius:17px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.75);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0 10px}
.zbtn.on{background:rgba(255,214,10,0.18);border-color:#ffd60a;color:#ffd60a}

/* bottom */
#bottom{background:#000;flex-shrink:0;padding-bottom:max(env(safe-area-inset-bottom),16px)}
#modes{display:flex;justify-content:center;gap:20px;padding:10px 8px 4px;overflow-x:auto;scrollbar-width:none}
#modes::-webkit-scrollbar{display:none}
.mode{background:none;border:none;color:rgba(255,255,255,0.45);font-size:11px;font-weight:600;letter-spacing:0.07em;cursor:pointer;padding:4px 0;white-space:nowrap;flex-shrink:0}
.mode.on{color:#ffd60a;transform:scale(1.1)}
#controls{display:flex;align-items:center;justify-content:space-around;padding:8px 28px 4px}
#thumb{width:50px;height:50px;border-radius:10px;border:2.5px solid #fff;background:#1a1a1a;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative}
#thumb img{width:100%;height:100%;object-fit:cover;display:none}
#thumbCount{position:absolute;bottom:2px;right:4px;color:#fff;font-size:9px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
#shutter{width:70px;height:70px;border-radius:50%;border:4px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#shutterInner{width:56px;height:56px;border-radius:50%;background:#fff}
#shutter.disabled{opacity:0.3;pointer-events:none}
#flipBtn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:20px}

/* ══════════════════════════════
GALLERY & VIEWER
══════════════════════════════ */
#galleryGrid{flex:1;overflow-y:auto;padding:2px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.gItem{aspect-ratio:1;background:#1a1a1a;position:relative}
.gItem img{width:100%;height:100%;object-fit:cover}

#photoViewer{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:100}
#photoViewer.show{display:flex}
#pvContainer{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
#pvMainImg{width:100%;height:100%;object-fit:contain}
#pvToast{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.3s}

#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none}
#toast.show{opacity:1}

@keyframes pop{0%{transform:scale(1.3)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div id="permScreen" style="position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:#fff">
  <h2>Newmera</h2>
  <p style="margin:20px 0;opacity:0.7">카메라 권한을 허용해줘!</p>
  <button onclick="startCamera()" style="padding:12px 30px;border-radius:10px;border:none;font-weight:600">시작하기</button>
</div>

<div class="screen active" id="cameraScreen">
  <div id="vf" onclick="handleVfClick(event)">
    <video id="mainVid" autoplay playsinline muted></video>
    <div id="countdownOverlay"><div id="countdownNum">3</div></div>
    <div id="capturePreview"><img id="capturePreviewImg"></div>
    <div id="topbar">
      <div class="tbtn" onclick="toggleFlash()">⚡</div>
      <div id="appTitle">newmera</div>
      <div class="tbtn" id="bothBtn" onclick="toggleBoth()" style="width:auto;padding:0 12px;border-radius:12px;font-weight:800;font-size:11px">Both</div>
    </div>
    <div id="focus" style="position:absolute;border:1px solid #ffd60a;display:none"></div>
    <div id="flash" style="position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none"></div>
  </div>

  <div id="bottom">
    <div id="modes">
      <div class="mode on">FOTO</div>
    </div>
    <div id="controls">
      <div id="thumb" onclick="openGallery()"><img id="thumbImg"><span id="thumbCount"></span></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCamera()">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="galleryScreen">
  <div style="padding:16px;display:flex;justify-content:space-between;align-items:center;color:#fff">
    <div style="font-weight:700">갤러리</div>
    <button onclick="closeGallery()" style="background:none;border:none;color:#fff;font-size:20px">✕</button>
  </div>
  <div id="galleryGrid"></div>
</div>

<div id="photoViewer">
  <div style="padding:14px;display:flex;justify-content:space-between;z-index:101">
    <button onclick="closePhotoViewer()" style="color:#fff;background:none;border:none">← 뒤로</button>
    <button onclick="deleteCurrent()" style="color:#ff3b30;background:none;border:none">삭제</button>
  </div>
  <div id="pvContainer" ontouchstart="handlePvTouch(event)">
    <img id="pvMainImg">
    <div id="pvToast">더블 탭하여 화면 전환</div>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
let camStream=null, facing='back', bothMode=false, bothPhase=0, bothFirstURL=null, photos=[];
let lastTap = 0, viewerIdx = 0, isSwapped = false;

const mainVid = document.getElementById('mainVid');
const canvas = document.getElementById('canvas');

window.onload = () => {
  photos = JSON.parse(localStorage.getItem('newmera_v2') || '[]');
  updateThumb();
};

async function startCamera() {
  document.getElementById('permScreen').style.display='none';
  await openCamera(facing);
}

async function openCamera(dir) {
  if(camStream) camStream.getTracks().forEach(t=>t.stop());
  const constraints = { video: { facingMode: dir==='back'?'environment':'user' } };
  try {
    camStream = await navigator.mediaDevices.getUserMedia(constraints);
    mainVid.srcObject = camStream;
    mainVid.className = dir==='front'?'mirror':'';
    facing = dir;
  } catch(e) { alert('카메라를 켤 수 없어!'); }
}

function handleShutter() {
  if(bothMode) startBothCapture();
  else {
    const url = grabFrame();
    addPhoto({ main: url, isBoth: false });
    showToast('📸 저장됨');
  }
}

function startBothCapture() {
  if(bothPhase !== 0) return;
  bothPhase = 1;
  bothFirstURL = grabFrame();
  document.getElementById('capturePreviewImg').src = bothFirstURL;
  document.getElementById('capturePreview').classList.add('show');
  document.getElementById('shutter').classList.add('disabled');

  let count = 3;
  const overlay = document.getElementById('countdownOverlay');
  const num = document.getElementById('countdownNum');
  overlay.classList.add('show');
  num.textContent = count;

  // 반대편 미리 켜기
  openCamera(facing === 'back' ? 'front' : 'back');

  const iv = setInterval(() => {
    count--;
    if(count > 0) {
      num.textContent = count;
    } else {
      clearInterval(iv);
      overlay.classList.remove('show');
      document.getElementById('capturePreview').classList.remove('show');
      setTimeout(() => {
        const secondURL = grabFrame();
        // Both 사진은 두 장의 원본을 모두 저장 (스왑을 위해)
        addPhoto({ main: bothFirstURL, sub: secondURL, isBoth: true });
        bothPhase = 0;
        document.getElementById('shutter').classList.remove('disabled');
        showToast('📸 Both 촬영 완료!');
      }, 300);
    }
  }, 1000);
}

function grabFrame() {
  canvas.width = mainVid.videoWidth;
  canvas.height = mainVid.videoHeight;
  const ctx = canvas.getContext('2d');
  if(facing==='front') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(mainVid, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.8);
}

function addPhoto(data) {
  photos.unshift({ id: Date.now(), ...data });
  localStorage.setItem('newmera_v2', JSON.stringify(photos));
  updateThumb();
}

function updateThumb() {
  const thumb = document.getElementById('thumbImg');
  if(photos.length > 0) {
    // 썸네일은 항상 합성된 결과물로 표시
    renderToCanvas(photos[0], false, (url) => {
      thumb.src = url;
      thumb.style.display = 'block';
    });
  }
}

// 사진 합성 로직 (isSwapped 상태에 따라 메인/서브 교체)
function renderToCanvas(photo, swapped, callback) {
  if(!photo.isBoth) { callback(photo.main); return; }
  
  const imgMain = new Image();
  const imgSub = new Image();
  imgMain.onload = () => {
    imgSub.onload = () => {
      canvas.width = imgMain.width;
      canvas.height = imgMain.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imgMain, 0, 0);
      
      const pw = canvas.width * 0.3;
      const ph = pw * (imgSub.height / imgSub.width);
      // 우측 상단 배치 (margin 4%)
      const margin = canvas.width * 0.04;
      const rx = canvas.width - pw - margin;
      const ry = margin;
      
      ctx.save();
      ctx.beginPath(); ctx.roundRect(rx, ry, pw, ph, 15); ctx.clip();
      ctx.drawImage(imgSub, rx, ry, pw, ph);
      ctx.restore();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.roundRect(rx, ry, pw, ph, 15); ctx.stroke();
      
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    imgSub.src = swapped ? photo.main : photo.sub;
  };
  imgMain.src = swapped ? photo.sub : photo.main;
}

function openGallery() {
  document.getElementById('cameraScreen').classList.remove('active');
  document.getElementById('galleryScreen').classList.add('active');
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'gItem';
    const img = document.createElement('img');
    renderToCanvas(p, false, (url) => img.src = url);
    div.onclick = () => openViewer(i);
    div.appendChild(img);
    grid.appendChild(div);
  });
}

function openViewer(idx) {
  viewerIdx = idx;
  isSwapped = false;
  document.getElementById('photoViewer').classList.add('show');
  updateViewerImg();
  
  const vt = document.getElementById('pvToast');
  if(photos[idx].isBoth) {
    vt.style.opacity = '1';
    setTimeout(() => vt.style.opacity = '0', 2000);
  }
}

function updateViewerImg() {
  renderToCanvas(photos[viewerIdx], isSwapped, (url) => {
    document.getElementById('pvMainImg').src = url;
  });
}

function handlePvTouch(e) {
  const now = Date.now();
  if(now - lastTap < 300) {
    if(photos[viewerIdx].isBoth) {
      isSwapped = !isSwapped;
      updateViewerImg();
    }
  }
  lastTap = now;
}

function closePhotoViewer() { document.getElementById('photoViewer').classList.remove('show'); }
function closeGallery() { document.getElementById('galleryScreen').classList.remove('active'); document.getElementById('cameraScreen').classList.add('active'); }
function deleteCurrent() { if(confirm('이 사진을 지울까?')) { photos.splice(viewerIdx, 1); localStorage.setItem('newmera_v2', JSON.stringify(photos)); closePhotoViewer(); openGallery(); updateThumb(); } }
function toggleBoth() { bothMode = !bothMode; document.getElementById('bothBtn').classList.toggle('on', bothMode); showToast(bothMode?'Both ON':'Both OFF'); }
function flipCamera() { facing = (facing==='back'?'front':'back'); openCamera(facing); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
function toggleFlash() { showToast('플래시 기능은 준비 중이야!'); }
function handleVfClick(e) { /* 초점 UI 로직 생략 가능 */ }
</script>
</body>
</html>
