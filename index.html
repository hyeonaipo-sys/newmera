<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera Pro Cinematic</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-red: #ff3b30;
  --ios-yellow: #ffd60a;
  --safe-top: env(safe-area-inset-top);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }

.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* CAMERA VIEWPORT */
#vfContainer { position: relative; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#vf { position: relative; width: 100%; height: 100%; border-radius: 0 0 40px 40px; overflow: hidden; }
#mainVid { width: 100%; height: 100%; object-fit: cover; }
#subVid { position: absolute; top: 20px; right: 20px; width: 120px; height: 160px; border: 2px solid #fff; border-radius: 12px; object-fit: cover; display: none; z-index: 50; }
#mainVid.mirror { transform: scaleX(-1); }

/* TOP CONTROLS */
#topBar { position: absolute; top: max(var(--safe-top), 20px); left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 100; }
.top-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 700; backdrop-filter: blur(10px); }
.top-btn.active { background: var(--ios-yellow); color: #000; }

/* Recording UI */
#recUI { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(255, 59, 48, 0.9); padding: 5px 15px; border-radius: 20px; display: none; align-items: center; gap: 8px; z-index: 110; }
#recUI.active { display: flex; }
#recDot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

/* BOTTOM UI */
#cameraBottom { background: #000; padding: 15px 0 calc(env(safe-area-inset-bottom) + 10px); }
#modesWrapper { position: relative; width: 100%; height: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
#modesTrack { display: flex; position: absolute; gap: 40px; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); }
.mode { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.3); }
.mode.active { color: var(--ios-yellow); }

#shutterRow { display: flex; align-items: center; justify-content: space-between; padding: 0 45px; }
#thumb { width: 56px; height: 56px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); background: #111; overflow: hidden; }
#thumb img { width: 100%; height: 100%; object-fit: cover; }
#shutter { width: 74px; height: 74px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
#shutterInner { width: 58px; height: 58px; border-radius: 50%; background: #fff; transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
#shutter.recording #shutterInner { background: var(--ios-red); border-radius: 10px; transform: scale(0.5); }

/* LIBRARY */
#libraryScreen { background: #000; }
#libHeader { padding: max(var(--safe-top), 40px) 20px 10px; }
#libActions { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 10px; }
.action-link { color: var(--ios-blue); font-size: 17px; font-weight: 600; background: none; border: none; }
#libTitle { font-size: 34px; font-weight: 800; }
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding-bottom: 100px; }
.gItem { aspect-ratio: 1; background: #1c1c1e; position: relative; }
.gItem img { width: 100%; height: 100%; object-fit: cover; }
.vBadge { position: absolute; bottom: 5px; right: 5px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; }

#backToCam { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 25px; border-radius: 30px; font-weight: 800; z-index: 200; }

/* VIEWER */
#photoViewer { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 300; }
#pvHeader { padding: max(var(--safe-top), 20px) 20px; display: flex; justify-content: space-between; }

#toast { position: fixed; top: 110px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="screen active" id="cameraScreen">
  <div id="vfContainer">
    <div id="vf" ontouchstart="handleCamStart(event)" ontouchend="handleCamEnd(event)">
      <video id="mainVid" autoplay playsinline muted></video>
      <video id="subVid" autoplay playsinline muted></video>
      <div id="recUI"><div id="recDot"></div><div id="recTimer">00:00</div></div>
      <div id="topBar">
        <button class="top-btn" onclick="toggleFlash()" id="flashBtn">Flash OFF</button>
        <button class="top-btn" onclick="toggleBoth()" id="bothBtn">Both OFF</button>
      </div>
    </div>
  </div>
  <div id="cameraBottom">
    <div id="modesWrapper" ontouchstart="handleCamStart(event)" ontouchend="handleCamEnd(event)">
      <div id="modesTrack">
        <div class="mode" onclick="setMode(0)">VIDEO</div>
        <div class="mode active" onclick="setMode(1)">PHOTO</div>
      </div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLib()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCam()" style="font-size:26px">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header id="libHeader">
    <div id="libActions">
      <button class="action-link">Play</button>
      <button class="action-link">Select</button>
    </div>
    <h1 id="libTitle">Library</h1>
    <div id="libCount" style="color:#8e8e93">0 Items</div>
  </header>
  <div id="galleryGrid"></div>
  <button id="backToCam" onclick="closeLib()">카메라</button>
</div>

<div id="photoViewer">
  <div id="pvHeader">
    <button onclick="closeViewer()" style="color:var(--ios-blue); background:none; border:none; font-size:17px; font-weight:700">Done</button>
    <button onclick="delItem()" style="color:var(--ios-red); background:none; border:none; font-size:17px">Delete</button>
  </div>
  <div style="flex:1; display:flex; align-items:center; justify-content:center;">
    <img id="pvImg" style="max-width:100%; max-height:100%; display:none">
    <video id="pvVid" controls style="max-width:100%; max-height:100%; display:none"></video>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, subStream=null, facing='back', currentMode='PHOTO', items=[];
  let isRec=false, recStart=0, recInt=null, drawInt=null, mediaRec=null, chunks=[];
  let db=null, flash=false, both=false;

  const mainVid = document.getElementById('mainVid');
  const subVid = document.getElementById('subVid');
  const canvas = document.getElementById('canvas');
  const thumbImg = document.getElementById('thumbImg');

  // IndexedDB Init
  const req = indexedDB.open("NewmeraProCinematic", 1);
  req.onupgradeneeded = e => { db = e.target.result; if(!db.objectStoreNames.contains("media")) db.createObjectStore("media", {keyPath:"id"}); };
  req.onsuccess = e => { db = e.target.result; loadItems(); startCam(); };

  async function startCam() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing==='back'?'environment':'user', width:{ideal:1920}, height:{ideal:1080} }
      });
      mainVid.srcObject = stream;
      mainVid.className = facing==='front'?'mirror':'';
      
      // Flash control
      const track = stream.getVideoTracks()[0];
      if(track.getCapabilities().torch) track.applyConstraints({advanced:[{torch:flash}]});
    } catch(e) { msg('Camera Error'); }
  }

  window.toggleFlash = async () => {
    flash = !flash;
    document.getElementById('flashBtn').textContent = flash ? 'Flash ON' : 'Flash OFF';
    document.getElementById('flashBtn').classList.toggle('active', flash);
    const track = stream.getVideoTracks()[0];
    try { await track.applyConstraints({advanced:[{torch:flash}]}); } catch(e){}
  };

  window.toggleBoth = async () => {
    both = !both;
    subVid.style.display = both ? 'block' : 'none';
    document.getElementById('bothBtn').textContent = both ? 'Both ON' : 'Both OFF';
    document.getElementById('bothBtn').classList.toggle('active', both);
    if(both && !subStream) {
        subStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 480 } });
        subVid.srcObject = subStream;
    } else if(!both && subStream) {
        subStream.getTracks().forEach(t=>t.stop()); subStream = null;
    }
  };

  // Swipe
  let startX=0, cIdx=1;
  window.handleCamStart = e => startX = e.touches[0].clientX;
  window.handleCamEnd = e => {
    if(isRec) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff)>50) {
        if(diff>0 && cIdx<1) setMode(cIdx+1);
        else if(diff<0 && cIdx>0) setMode(cIdx-1);
    }
  };
  window.setMode = idx => {
    cIdx = idx; currentMode = idx===0?'VIDEO':'PHOTO';
    document.getElementById('modesTrack').style.transform = `translateX(${idx===0?40:-40}px)`;
    document.querySelectorAll('.mode').forEach((m,i)=>m.classList.toggle('active', i===idx));
    document.getElementById('shutterInner').style.background = idx===0?'var(--ios-red)':'#fff';
  };

  window.handleShutter = () => currentMode==='PHOTO' ? takePhoto() : handleVideo();

  function takePhoto() {
    const data = grab(0.9);
    save({ type:'photo', thumb: data, main: data });
    msg('📸 Photo Saved');
  }

  function handleVideo() { if(!isRec) startVideo(); else stopVideo(); }

  function startVideo() {
    isRec=true; chunks=[];
    document.getElementById('shutter').classList.add('recording');
    document.getElementById('recUI').classList.add('active');
    recStart = Date.now();
    recInt = setInterval(()=>{
        const d = Math.floor((Date.now()-recStart)/1000);
        document.getElementById('recTimer').textContent = `${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
    }, 1000);

    // 16:9 Canvas Capture
    const cStream = canvas.captureStream(30);
    mediaRec = new MediaRecorder(cStream, { mimeType:'video/webm;codecs=vp8', videoBitsPerSecond:8000000 });
    mediaRec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    mediaRec.onstop = () => {
        const blob = new Blob(chunks, {type:'video/webm'});
        const thumb = canvas.toDataURL('image/jpeg', 0.5);
        const reader = new FileReader();
        reader.onloadend = () => { save({ type:'video', thumb, main: reader.result }); msg('🎥 Video Saved'); };
        reader.readAsDataURL(blob);
    };
    mediaRec.start();
    drawInt = setInterval(() => grab(0, true), 1000/30);
  }

  function stopVideo() {
    isRec=false;
    document.getElementById('shutter').classList.remove('recording');
    document.getElementById('recUI').classList.remove('active');
    clearInterval(recInt); clearInterval(drawInt);
    mediaRec.stop();
  }

  function grab(q, drawOnly=false) {
    // 16:9 억제 (가로 1920:1080)
    canvas.width = 1920; canvas.height = 1080;
    const ctx = canvas.getContext('2d');
    if(facing==='front') { ctx.translate(1920, 0); ctx.scale(-1, 1); }
    ctx.drawImage(mainVid, 0, 0, 1920, 1080);
    if(both && subVid.srcObject) {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
        ctx.strokeRect(1920-320-40, 40, 320, 420);
        ctx.drawImage(subVid, 1920-320-40, 40, 320, 420);
    }
    return drawOnly ? null : canvas.toDataURL('image/jpeg', q);
  }

  function save(item) {
    item.id = Date.now();
    const tx = db.transaction("media", "readwrite");
    tx.objectStore("media").add(item);
    tx.oncomplete = () => loadItems();
  }

  function loadItems() {
    const tx = db.transaction("media", "readonly");
    const req = tx.objectStore("media").getAll();
    req.onsuccess = () => {
        items = req.result.sort((a,b)=>b.id-a.id);
        if(items.length>0) { thumbImg.src = items[0].thumb; thumbImg.style.display='block'; }
        else thumbImg.style.display='none';
    };
  }

  window.openLib = () => { document.getElementById('libraryScreen').classList.add('active'); renderGrid(); };
  window.closeLib = () => document.getElementById('libraryScreen').classList.remove('active');

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    document.getElementById('libCount').textContent = items.length + ' Items';
    items.forEach((it, i) => {
        const d = document.createElement('div');
        d.className='gItem';
        d.innerHTML = `<img src="${it.thumb}">${it.type==='video'?'<div class="vBadge">▶ 16:9</div>':''}`;
        d.onclick = () => openViewer(i);
        grid.appendChild(d);
    });
  }

  let vIdx=0;
  window.openViewer = idx => { vIdx=idx; document.getElementById('photoViewer').classList.add('show'); updateViewer(); };
  function updateViewer() {
    const it = items[vIdx];
    const img=document.getElementById('pvImg'), vid=document.getElementById('pvVid');
    if(it.type==='video') { img.style.display='none'; vid.style.display='block'; vid.src=it.main; }
    else { vid.style.display='none'; img.style.display='block'; img.src=it.main; }
  }
  window.closeViewer = () => { document.getElementById('photoViewer').classList.remove('show'); document.getElementById('pvVid').pause(); };
  window.delItem = () => {
    if(confirm('Delete?')) {
        const tx = db.transaction("media", "readwrite");
        tx.objectStore("media").delete(items[vIdx].id);
        tx.oncomplete = () => { loadItems(); renderGrid(); if(items.length<=1) closeViewer(); else { vIdx=0; updateViewer(); } };
    }
  };

  window.flipCam = () => { facing=facing==='back'?'front':'back'; startCam(); };
  function msg(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
})();
</script>
</body>
</html>
