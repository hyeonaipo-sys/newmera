<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<title>Newmera</title>
<style>
:root{--y:#ffd60a;--sb:env(safe-area-inset-bottom);--st:env(safe-area-inset-top)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:#000}
body{height:100%;width:100%;background:#000;color:#fff;font-family:-apple-system,sans-serif;overflow:hidden;-webkit-text-size-adjust:none}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
img,video{display:block}

/* PAGES */
.pg{position:fixed;inset:0;background:#000;display:none;flex-direction:column}
.pg.on{display:flex}

/* ── CAMERA ── */
#camPg{overflow:hidden}

#topBar{
flex-shrink:0;width:100%;
padding:80px 18px 10px;
display:grid;
grid-template-columns:auto 1fr auto;
align-items:center;
gap:8px;
background:#000;
}
#ratioWrap{display:flex;justify-content:center;position:relative}
#flashBtn{width:32px;height:32px;display:flex;align-items:center;justify-content:center}
#bothWrap{display:flex;justify-content:flex-end}
#bothOff{font-size:12px;font-weight:700;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 14px;white-space:nowrap}
#bothOn{font-size:12px;font-weight:700;color:#000;background:var(–y);border:1px solid var(–y);border-radius:6px;padding:5px 14px;white-space:nowrap;display:none}
/* zoom */
#zoomRow{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.zBtn{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;backdrop-filter:blur(8px)}
.zBtn.active{color:#000;background:rgba(255,255,255,.9);border-color:transparent}
#ratioBtn{font-size:13px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 12px}
#ratioMenu{position:absolute;top:36px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.96);border:1px solid rgba(255,255,255,.1);border-radius:10px;overflow:hidden;display:none;flex-direction:column;min-width:70px;z-index:30}
#ratioMenu.on{display:flex}
#ratioMenu button{padding:10px 14px;font-size:13px;font-weight:700;color:#fff;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
#ratioMenu button:last-child{border-bottom:none}
#ratioMenu button.sel{color:var(–y)}

/* viewfinder */
#vf{flex:1;position:relative;background:#000;overflow:hidden;min-height:0;display:flex;align-items:center;justify-content:center}
#vfInner{position:relative;width:100%;height:100%;overflow:hidden}
#vfInner.land{height:auto;aspect-ratio:16/9;border-radius:16px;overflow:hidden}
#mainVid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .15s;pointer-events:none}
#mainVid.on{opacity:1}
#flashFx{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:5}
#focusRing{position:absolute;width:58px;height:58px;border:1.5px solid var(–y);border-radius:5px;transform:translate(-50%,-50%);display:none;pointer-events:none;z-index:6}
#cdOverlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:8}
#cdNum{font-size:100px;font-weight:900;color:#fff}
#pipWrap{position:absolute;bottom:16px;left:14px;width:76px;aspect-ratio:3/4;border-radius:12px;overflow:hidden;border:2px solid #fff;display:none;z-index:7}
#pipWrap.on{display:block}
#pipImg{width:100%;height:100%;object-fit:cover}

/* REC pill */
#recPill{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:5px 14px;border-radius:20px;display:none;align-items:center;gap:7px;font-size:14px;font-weight:600;z-index:20;white-space:nowrap}
#recPill.on{display:flex}
.reddot{width:8px;height:8px;border-radius:50%;background:#ff3b30;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* bottom */
#botBar{flex-shrink:0;width:100%;background:#000;padding-top:10px;padding-bottom:max(var(–sb),22px)}
#modeRow{display:flex;justify-content:center;gap:32px;margin-bottom:14px}
.mBtn{font-size:13px;letter-spacing:1.4px;font-weight:500;color:rgba(255,255,255,.38)}
.mBtn.on{color:var(–y);font-weight:700}
#ctrlRow{display:flex;align-items:center;justify-content:space-between;padding:0 32px}
#thumbBtn{width:50px;height:50px;border-radius:8px;overflow:hidden;background:#1a1a1a;flex-shrink:0}
#thumbBtn img{width:100%;height:100%;object-fit:cover;display:none}
#shutter{width:70px;height:70px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
#shutter:active{transform:scale(.93)}
#sInner{width:56px;height:56px;border-radius:50%;background:#fff;transition:all .18s}
#shutter.vid #sInner{background:#ff3b30}
#shutter.rec #sInner{width:26px;height:26px;border-radius:6px;background:#ff3b30}
#flipBtn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── GALLERY ── */
#galPg{z-index:40}
#galHead{flex-shrink:0;width:100%;padding:80px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.07)}
#galHead span{font-size:18px;font-weight:700}
#galHeadR{display:flex;gap:8px}
.ghBtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:6px 13px;font-size:13px;font-weight:600}
.ghBtn.pri{background:#fff;color:#000}
.ghBtn.del{background:rgba(255,59,48,.12);color:#ff3b30;border-color:rgba(255,59,48,.3)}
#galGrid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;overflow-y:scroll;scrollbar-width:none;align-content:start}
#galGrid::-webkit-scrollbar{display:none}
#galEmpty{display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:rgba(255,255,255,.3);font-size:14px;padding:60px 0}
#galEmpty.show{display:flex}
.gItem{position:relative;aspect-ratio:1;background:#111;overflow:hidden;cursor:pointer}
.gItem img{width:100%;height:100%;object-fit:cover}
.gItem.sel img{opacity:.65}
.gChk{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:transparent;display:none;align-items:center;justify-content:center;font-size:12px}
.gItem.selMode .gChk{display:flex}
.gItem.sel .gChk{background:var(–y);border-color:var(–y);color:#000}
.gPip{position:absolute;top:5px;left:5px;width:28%;aspect-ratio:3/4;border-radius:5px;overflow:hidden;border:1.5px solid rgba(255,255,255,.9)}
.gPip img{width:100%;height:100%;object-fit:cover}
#selBar{flex-shrink:0;display:none;align-items:center;justify-content:space-between;padding:10px 16px;padding-bottom:max(var(–sb),10px);border-top:1px solid rgba(255,255,255,.07)}
#selBar.on{display:flex}

/* ── VIEWER ── */
#viewer{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:60}
#viewer.on{display:flex}
#vwHead{flex-shrink:0;padding:80px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.vwBtn{font-size:16px;font-weight:600;color:#fff}
.vwBtn.del{color:#ff3b30}
#vwBody{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
#vwWrap{position:relative;max-width:100%;max-height:100%}
#vwImg{max-width:100%;max-height:70vh;border-radius:14px;object-fit:contain}
#vwFoot{flex-shrink:0;padding:12px 20px;padding-bottom:max(var(–sb),16px);display:flex;justify-content:center}

/* TOAST */
#toast{position:fixed;z-index:99;bottom:200px;left:50%;transform:translateX(-50%) translateY(6px);background:#fff;color:#111;padding:8px 18px;border-radius:999px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;max-width:90vw}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

</head>
<body>

<!-- CAMERA -->

<div class="pg on" id="camPg">
  <div id="topBar">
    <!-- 왼쪽: 플래시 -->
    <button id="flashBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path id="flashPath" d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13Z" fill="rgba(255,255,255,0.85)"/>
      </svg>
    </button>
    <!-- 가운데: 비율 -->
    <div id="ratioWrap">
      <button id="ratioBtn" onclick="toggleRatioMenu()">16:9↔</button>
      <div id="ratioMenu">
        <!-- PHOTO 모드 옵션 -->
        <button id="r34" onclick="setRatio('3:4')">3:4</button>
        <button id="r916" onclick="setRatio('9:16')">9:16</button>
        <!-- VIDEO 모드 옵션 -->
        <button id="r169h" onclick="setRatio('16:9h')" style="display:none">16:9 가로↔</button>
        <button id="r169v" onclick="setRatio('16:9v')" style="display:none">16:9 세로↕</button>
      </div>
    </div>
    <!-- 오른쪽: BOTH -->
    <div id="bothWrap">
      <button id="bothOff">BOTH</button>
      <button id="bothOn">BOTH ON</button>
    </div>
  </div>

  <div id="vf">
    <div id="vfInner">
      <video id="mainVid" autoplay playsinline muted disablepictureinpicture></video>
      <div id="flashFx"></div>
      <div id="focusRing"></div>
      <div id="cdOverlay"><div id="cdNum">3</div></div>
      <div id="pipWrap"><img id="pipImg"></div>
      <div id="recPill"><div class="reddot"></div><span id="recTime">00:00</span></div>
    </div>
    <!-- 줌 버튼 -->
    <div id="zoomRow">
      <button class="zBtn" data-zoom="0.5" onclick="setZoom(0.5)">0.5×</button>
      <button class="zBtn active" data-zoom="1" onclick="setZoom(1)">1×</button>
      <button class="zBtn" data-zoom="2" onclick="setZoom(2)">2×</button>
    </div>
  </div>

  <div id="botBar">
    <div id="modeRow">
      <button class="mBtn" data-m="photo">PHOTO</button>
      <button class="mBtn on" data-m="video">VIDEO</button>
    </div>
    <div id="ctrlRow">
      <button id="thumbBtn" onclick="openGallery()"><img id="thumbImg" alt=""></button>
      <button id="shutter" onclick="handleShutter()"><div id="sInner"></div></button>
      <button id="flipBtn" onclick="doFlip()">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M16 5l4 4-4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 9h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M10 17l-4 4 4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 21H6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- GALLERY -->

<div class="pg" id="galPg">
  <div id="galHead">
    <span>갤러리</span>
    <div id="galHeadR">
      <button class="ghBtn" id="selBtn" onclick="toggleSel()">선택</button>
      <button class="ghBtn" onclick="closeGallery()">닫기</button>
    </div>
  </div>
  <div id="galGrid"></div>
  <div id="galEmpty"><span style="font-size:44px;opacity:.25">📷</span><span>사진이 없어요</span></div>
  <div id="selBar">
    <span id="selN">0장 선택됨</span>
    <div style="display:flex;gap:8px">
      <button class="ghBtn del" onclick="deleteSelected()">삭제</button>
      <button class="ghBtn pri" onclick="downloadSelected()">저장</button>
    </div>
  </div>
</div>

<!-- VIEWER -->

<div id="viewer">
  <div id="vwHead">
    <button class="vwBtn" onclick="closeViewer()">← 뒤로</button>
    <span id="vwIdx" style="color:rgba(255,255,255,.4);font-size:13px"></span>
    <button class="vwBtn" onclick="downloadCurrent()">저장</button>
  </div>
  <div id="vwBody">
    <div id="vwWrap"><img id="vwImg"></div>
  </div>
  <div id="vwFoot">
    <button class="vwBtn del" onclick="deleteCurrent()">삭제</button>
  </div>
</div>

<div id="toast"></div>
<canvas id="cv" style="display:none"></canvas>

<script>
/* ── STATE ── */
let cam=null,camTrack=null,facing='back';
let mode='video',bothMode=false,flashMode='off';
let ratio='3:4'; // 기본 비율
let processing=false,recording=false;
let recorder=null,recChunks=[],recTimer=null,recSec=0;
let db=null,items=[],selMode=false,selIds=new Set(),vwIdx=0;
let bFirstURL=null,bFirstFacing=null;
let pvSwapped=false,pvTapTimer=null;

/* ── DOM ── */
const $=id=>document.getElementById(id);
const mainVid=$('mainVid'),flashFx=$('flashFx'),focusRing=$('focusRing');
const cdOverlay=$('cdOverlay'),cdNum=$('cdNum');
const pipWrap=$('pipWrap'),pipImg=$('pipImg');
const shutter=$('shutter'),sInner=$('sInner');
const thumbImg=$('thumbImg');
const flashPath=$('flashPath');
const bothOff=$('bothOff'),bothOn=$('bothOn');
const vfInner=$('vfInner');
const recPill=$('recPill'),recTimeEl=$('recTime');
const galGrid=$('galGrid'),galEmpty=$('galEmpty'),selBar=$('selBar'),selN=$('selN');
const vwImg=$('vwImg'),vwIdxEl=$('vwIdx');
const toast=$('toast'),cv=$('cv');

/* ── SAFE AREA ── */
(function(){
  const p=document.createElement('div');
  p.style.cssText='position:fixed;top:env(safe-area-inset-top,0px);width:1px;height:1px;visibility:hidden;';
  document.body.appendChild(p);
  const sat=p.getBoundingClientRect().top;
  document.body.removeChild(p);
  const pad=Math.max(sat+14,80)+'px';
  ['topBar','galHead','vwHead'].forEach(id=>$(id).style.paddingTop=pad);
})();

/* ── DB ── */
const req=indexedDB.open('newmera_v4',1);
req.onupgradeneeded=e=>e.target.result.createObjectStore('media',{keyPath:'id'});
req.onsuccess=e=>{
  db=e.target.result;
  loadItems();
  document.body.classList.add('videoMode');
  shutter.classList.add('vid');
  vfInner.classList.add('land');
  $('flashBtn').style.display='none';
  bothOff.style.display='';
  bothOn.style.display='none';
  $('bothWrap').style.display='none';
  $('r34').style.display='none'; $('r916').style.display='none';
  $('r169h').style.display=''; $('r169v').style.display='';
  ratio='16:9h';
  $('ratioBtn').textContent='16:9↔';
  startCam();
};
req.onerror=()=>showToast('DB 오류');

/* ── ZOOM ── */
let currentZoom=1;
function setZoom(z){
  currentZoom=z;
  document.querySelectorAll('.zBtn').forEach(b=>{
    b.classList.toggle('active',parseFloat(b.dataset.zoom)===z);
  });
  if(!camTrack) return;
  const caps=camTrack.getCapabilities?.()??{};
  if(caps.zoom){
    const min=caps.zoom.min||1,max=caps.zoom.max||1;
    camTrack.applyConstraints({advanced:[{zoom:Math.min(Math.max(z,min),max)}]}).catch(()=>{});
  }
}
window.setZoom=setZoom;

/* ── CAMERA ── */
async function startCam(){
  try{
    if(cam) cam.getTracks().forEach(t=>t.stop());
    mainVid.classList.remove('on');
    cam=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing==='back'?'environment':'user',width:{ideal:1920},height:{ideal:1080}},
      audio:true
    });
    camTrack=cam.getVideoTracks()[0]||null;
    mainVid.srcObject=cam;
    mainVid.style.transform=facing==='front'?'scaleX(-1)':'none';
    mainVid.addEventListener('canplay',()=>{
      mainVid.classList.add('on');
      // 줌 재적용
      if(currentZoom!==1) setZoom(currentZoom);
    },{once:true});
    mainVid.play().catch(()=>{});
  }catch(e){showToast('카메라 권한을 허용해주세요')}
}
function stopCam(){
  if(cam){cam.getTracks().forEach(t=>t.stop());cam=null;camTrack=null}
  mainVid.srcObject=null;mainVid.classList.remove('on');
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(recording)stopRec();stopCam()}else startCam();
});
window.addEventListener('pagehide',stopCam);

/* ── FOCUS ── */
$('vf').addEventListener('click',e=>{
  if(e.target.closest('#botBar')||e.target.closest('#topBar')) return;
  focusRing.style.left=e.clientX+'px';focusRing.style.top=e.clientY+'px';
  focusRing.style.display='block';
  setTimeout(()=>focusRing.style.display='none',1000);
});

/* ── FLASH ── */
$('flashBtn').onclick=async()=>{
  flashMode=flashMode==='off'?'on':'off';
  flashPath.setAttribute('fill',flashMode==='on'?'#ffd60a':'rgba(255,255,255,0.85)');
  if(flashMode==='off') try{await setTorch(false)}catch{}
};
async function setTorch(on){
  if(!camTrack||facing!=='back') return false;
  const caps=camTrack.getCapabilities?.()??{};
  if(!caps.torch) return false;
  await camTrack.applyConstraints({advanced:[{torch:on}]});
  return true;
}
async function doFlash(){
  if(flashMode!=='on') return;
  const ok=await setTorch(true);
  if(!ok){flashFx.style.opacity='1';setTimeout(()=>flashFx.style.opacity='0',100);return}
  setTimeout(()=>setTorch(false).catch(()=>{}),130);
}

/* ── BOTH ── */
bothOff.onclick=()=>{
  if(mode!=='photo'){showToast('PHOTO 모드에서만 가능해요');return}
  bothMode=true;
  bothOff.style.display='none';
  bothOn.style.display='inline-block';
  showToast('BOTH ON');
};
bothOn.onclick=()=>{
  bothMode=false;
  bothOn.style.display='none';
  bothOff.style.display='inline-block';
  showToast('BOTH OFF');
};

/* ── FLIP ── */
function doFlip(){
  if(recording) return;
  facing=facing==='back'?'front':'back';
  startCam();
}

/* ── MODE ── */
document.querySelectorAll('.mBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.mBtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');mode=b.dataset.m;
    shutter.classList.remove('vid','rec');
    if(mode==='video'){
      shutter.classList.add('vid');
      vfInner.classList.add('land');
      $('flashBtn').style.display='none';
      $('bothWrap').style.display='none';
      document.body.classList.add('videoMode');
      $('r34').style.display='none'; $('r916').style.display='none';
      $('r169h').style.display=''; $('r169v').style.display='';
      setRatio('16:9h');
    }else{
      vfInner.classList.remove('land');
      $('flashBtn').style.display='flex';
      $('bothWrap').style.display='flex';
      document.body.classList.remove('videoMode');
      $('r34').style.display=''; $('r916').style.display='';
      $('r169h').style.display='none'; $('r169v').style.display='none';
      setRatio('3:4');
    }
  };
});

/* ── SHUTTER ── */
function handleShutter(){
  if(mode==='video'){recording?stopRec():startRec();return}
  if(processing) return;
  processing=true;
  (bothMode?doBoth():doSnap()).finally(()=>setTimeout(()=>processing=false,300));
}

/* ── PHOTO ── */
async function doSnap(){
  await doFlash();
  flashFx.style.opacity='.6';setTimeout(()=>flashFx.style.opacity='0',80);
  saveItem({type:'photo',main:grab()});
  showToast('저장됨 ✓');
}

async function doBoth(){
  // 1. 첫번째 카메라로 찍기
  bFirstURL=grab();bFirstFacing=facing;
  pipImg.src=bFirstURL;pipWrap.classList.add('on');

  // 2. 반대 카메라로 먼저 전환 (카운트 중에 자기 얼굴 보기 위해)
  facing=bFirstFacing==='back'?'front':'back';
  await startCam();
  await new Promise(r=>setTimeout(r,300));

  // 3. 카운트다운
  let c=3;cdNum.textContent=c;cdOverlay.style.display='flex';
  await new Promise(res=>{
    const iv=setInterval(()=>{
      c--;
      if(c>0){cdNum.textContent=c}
      else{clearInterval(iv);cdOverlay.style.display='none';res()}
    },1000);
  });

  // 4. 두번째 찍기
  pipWrap.classList.remove('on');
  const second=grab();
  composeBoth(bFirstURL,second);

  // 5. 원래 카메라로 복귀
  facing=bFirstFacing;await startCam();
}

function toggleRatioMenu(){$('ratioMenu').classList.toggle('on')}

function setRatio(r){
  ratio=r;
  const labels={'3:4':'3:4','9:16':'9:16','16:9h':'16:9↔','16:9v':'16:9↕'};
  $('ratioBtn').textContent=labels[r]||r;
  $('ratioMenu').classList.remove('on');
  // 뷰파인더 비율 적용
  if(r==='16:9h'){
    vfInner.classList.add('land');
    vfInner.style.aspectRatio='';vfInner.style.height='';
  }else if(r==='16:9v'){
    vfInner.classList.remove('land');
    vfInner.style.aspectRatio='9/16';vfInner.style.width='100%';vfInner.style.height='auto';
  }else if(r==='3:4'){
    vfInner.classList.remove('land');
    vfInner.style.aspectRatio='';vfInner.style.height='100%';
  }else if(r==='9:16'){
    vfInner.classList.remove('land');
    vfInner.style.aspectRatio='';vfInner.style.height='100%';
  }
}
// 외부 탭 시 메뉴 닫기
document.addEventListener('click',e=>{
  if(!$('ratioWrap').contains(e.target)) $('ratioMenu').classList.remove('on');
});

function grab(){
  const vw=mainVid.videoWidth||1920,vh=mainVid.videoHeight||1080;
  // 비율에 따라 크롭
  let tw,th;
  if(ratio==='1:1'){ tw=th=Math.min(vw,vh); }
  else if(ratio==='3:4'){ th=vh; tw=Math.round(vh*3/4); if(tw>vw){tw=vw;th=Math.round(vw*4/3);} }
  else{ tw=vw; th=vh; } // 9:16 = 원본
  cv.width=tw;cv.height=th;
  const ctx=cv.getContext('2d');
  const sx=(vw-tw)/2,sy=(vh-th)/2;
  if(facing==='front'){ctx.translate(tw,0);ctx.scale(-1,1)}
  ctx.drawImage(mainVid,sx,sy,tw,th,0,0,tw,th);
  if(facing==='front') ctx.setTransform(1,0,0,1,0,0);
  return cv.toDataURL('image/jpeg',.95);
}

function composeBoth(url1,url2){
  const i1=new Image(),i2=new Image();
  i1.onload=()=>{i2.onload=()=>{
    const W=i1.width,H=i1.height;
    const c2=document.createElement('canvas');
    c2.width=W;c2.height=H;
    const ctx=c2.getContext('2d');
    ctx.drawImage(i1,0,0,W,H);
    const pw=Math.round(W*.28);
    const ph=Math.round(pw*(4/3)); // PIP 항상 3:4 고정
    const px=Math.round(W*.04),py=Math.round(H*.04);
    const pr=Math.round(W*.025),bd=Math.round(W*.004);
    // 검정 테두리
    ctx.fillStyle='#000';
    rr(ctx,px-bd,py-bd,pw+bd*2,ph+bd*2,pr+bd);ctx.fill();
    // PIP
    ctx.save();rr(ctx,px,py,pw,ph,pr);ctx.clip();
    ctx.drawImage(i2,px,py,pw,ph);ctx.restore();

    // 반대 버전 (더블탭용)
    const composed1=c2.toDataURL('image/jpeg',.95);
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(i2,0,0,W,H);
    ctx.fillStyle='#000';
    rr(ctx,px-bd,py-bd,pw+bd*2,ph+bd*2,pr+bd);ctx.fill();
    ctx.save();rr(ctx,px,py,pw,ph,pr);ctx.clip();
    ctx.drawImage(i1,px,py,pw,ph);ctx.restore();
    const composed2=c2.toDataURL('image/jpeg',.95);

    saveItem({type:'photo',main:composed1,sub:composed2});
    showToast('BOTH 저장됨 ✓');
  };i2.src=url2};i1.src=url1;
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ── VIDEO ── */
function startRec(){
  if(!cam||recording) return;
  recChunks=[];
  const mime=['video/mp4','video/webm;codecs=h264,opus','video/webm;codecs=vp9,opus','video/webm'].find(t=>MediaRecorder.isTypeSupported(t))||'';
  try{recorder=new MediaRecorder(cam,mime?{mimeType:mime}:undefined)}
  catch(e){recorder=new MediaRecorder(cam)}
  recorder.ondataavailable=e=>{if(e.data?.size>0) recChunks.push(e.data)};
  recorder.onstop=()=>{
    const blob=new Blob(recChunks,{type:recorder.mimeType||'video/webm'});
    saveItem({type:'video',blob,thumb:null});
    recording=false;
    shutter.classList.remove('rec');shutter.classList.add('vid');
    recPill.classList.remove('on');
    clearInterval(recTimer);
    showToast('영상 저장됨 ✓');
  };
  recorder.start(200);
  recording=true;recSec=0;
  shutter.classList.add('rec');
  recPill.classList.add('on');
  updateRecTime();
  recTimer=setInterval(()=>{recSec++;updateRecTime()},1000);
  showToast('● REC');
}
function stopRec(){if(recorder&&recording) recorder.stop()}
function updateRecTime(){
  const m=String(Math.floor(recSec/60)).padStart(2,'0');
  const s=String(recSec%60).padStart(2,'0');
  recTimeEl.textContent=m+':'+s;
}

/* ── STORAGE ── */
function saveItem(item){
  item.id=Date.now()+Math.floor(Math.random()*999);
  const tx=db.transaction('media','readwrite');
  tx.objectStore('media').add(item);
  tx.oncomplete=loadItems;
  tx.onerror=()=>showToast('저장 오류');
}
function loadItems(){
  if(!db) return;
  db.transaction('media','readonly').objectStore('media').getAll().onsuccess=e=>{
    items=e.target.result.sort((a,b)=>b.id-a.id);
    updateThumb();renderGallery();
  };
}
function updateThumb(){
  if(!items.length){thumbImg.style.display='none';return}
  const p=items[0];
  if(p.type==='photo'&&p.main){thumbImg.src=p.main;thumbImg.style.display='block'}
  else if(p.type==='video'){thumbImg.style.display='none'}
}

/* ── GALLERY ── */
function openGallery(){
  selMode=false;selIds.clear();renderGallery();
  $('camPg').classList.remove('on');$('galPg').classList.add('on');
}
function closeGallery(){
  $('galPg').classList.remove('on');$('camPg').classList.add('on');updateThumb();
}
function toggleSel(){
  selMode=!selMode;selIds.clear();
  $('selBtn').textContent=selMode?'취소':'선택';
  renderGallery();
}
function renderGallery(){
  galGrid.innerHTML='';
  selBar.classList.toggle('on',selMode&&selIds.size>0);
  selN.textContent=selIds.size+'장 선택됨';
  if(!items.length){
    galGrid.style.display='none';
    galEmpty.classList.add('show');
    return;
  }
  galGrid.style.display='grid';
  galEmpty.classList.remove('show');
  items.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='gItem'+(selMode?' selMode':'')+(selIds.has(p.id)?' sel':'');
    if(p.type==='video'&&p.blob){
      // 썸네일: video 엘리먼트로 첫 프레임 표시
      const vid=document.createElement('video');
      const blobUrl=URL.createObjectURL(p.blob);
      vid.src=blobUrl;
      vid.muted=true;vid.playsInline=true;vid.preload='metadata';
      vid.style.cssText='width:100%;height:100%;object-fit:cover;display:block';
      vid.addEventListener('loadedmetadata',()=>{vid.currentTime=0.5});
      div.appendChild(vid);
      const badge=document.createElement('div');
      badge.style.cssText='position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px';
      badge.textContent='VIDEO';div.appendChild(badge);
      // play icon overlay
      const icon=document.createElement('div');
      icon.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2)';
      icon.innerHTML='<svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="rgba(0,0,0,.5)"/><polygon points="13,10 24,16 13,22" fill="white"/></svg>';
      div.appendChild(icon);
    }else{
      const img=document.createElement('img');img.src=p.main;div.appendChild(img);
    }
    const chk=document.createElement('div');chk.className='gChk';chk.textContent='✓';div.appendChild(chk);
    div.onclick=()=>{
      if(selMode){selIds.has(p.id)?selIds.delete(p.id):selIds.add(p.id);renderGallery()}
      else openViewer(i);
    };
    galGrid.appendChild(div);
  });
}
function deleteSelected(){
  if(!selIds.size) return;
  if(!confirm(selIds.size+'장을 삭제할까요?')) return;
  const tx=db.transaction('media','readwrite'),store=tx.objectStore('media');
  selIds.forEach(id=>store.delete(id));
  tx.oncomplete=()=>{selIds.clear();selMode=false;loadItems();showToast('삭제됨')};
}
async function downloadSelected(){
  if(!selIds.size){showToast('사진을 선택해주세요');return}
  const sel=items.filter(p=>selIds.has(p.id)&&p.type==='photo');
  for(const p of sel) await sharePhoto(p.main,'newmera_'+p.id+'.jpg');
}

/* ── VIEWER ── */
function openViewer(idx){
  vwIdx=idx;pvSwapped=false;
  const p=items[idx];if(!p) return;

  // 기존 동적 video 제거
  const oldVid=$('vwWrap').querySelector('video');
  if(oldVid) oldVid.remove();

  if(p.type==='video'&&p.blob){
    const vid=document.createElement('video');
    vid.src=URL.createObjectURL(p.blob);
    vid.controls=true;vid.playsInline=true;
    vid.style.cssText='width:100%;aspect-ratio:16/9;border-radius:14px;display:block;object-fit:cover';
    $('vwWrap').appendChild(vid);
    vwImg.style.display='none';
  }else{
    vwImg.style.display='block';
    vwImg.style.opacity='1';
    vwImg.src=p.main||'';
  }
  vwIdxEl.textContent=(idx+1)+' / '+items.length;
  $('viewer').classList.add('on');
}
function closeViewer(){$('viewer').classList.remove('on');pvSwapped=false}
async function downloadCurrent(){
  const p=items[vwIdx];if(!p||p.type==='video') return;
  await sharePhoto(p.main,'newmera_'+p.id+'.jpg');
}
function deleteCurrent(){
  const p=items[vwIdx];if(!p||!confirm('삭제할까요?')) return;
  const tx=db.transaction('media','readwrite');
  tx.objectStore('media').delete(p.id);
  tx.oncomplete=()=>{closeViewer();loadItems();showToast('삭제됨')};
}

/* ── 카메라 스와이프로 모드 전환 ── */
const modeList=['photo','video'];
let camSwipeX=0;
[$('vf'),$('botBar')].forEach(el=>{
  el.addEventListener('touchstart',e=>{camSwipeX=e.touches[0].clientX},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-camSwipeX;
    if(Math.abs(dx)<50) return;
    const cur=modeList.indexOf(mode);
    const next=dx<0?cur+1:cur-1;
    if(next>=0&&next<modeList.length){
      document.querySelector(`.mBtn[data-m="${modeList[next]}"]`).click();
    }
  },{passive:true});
});

/* viewer swipe + double tap */
let vwSX=0;
const vwBody=$('vwBody');
vwBody.addEventListener('touchstart',e=>{vwSX=e.touches[0].clientX},{passive:true});
vwBody.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-vwSX;
  if(Math.abs(dx)>50){
    if(dx<0&&vwIdx<items.length-1) openViewer(vwIdx+1);
    else if(dx>0&&vwIdx>0) openViewer(vwIdx-1);
  }
},{passive:true});
vwBody.addEventListener('click',()=>{
  const p=items[vwIdx];if(!p?.sub) return;
  if(pvTapTimer){
    clearTimeout(pvTapTimer);pvTapTimer=null;
    pvSwapped=!pvSwapped;
    vwImg.style.opacity='0';
    setTimeout(()=>{vwImg.src=pvSwapped?p.sub:p.main;vwImg.style.opacity='1'},150);
  }else pvTapTimer=setTimeout(()=>pvTapTimer=null,280);
});

/* ── SHARE ── */
async function sharePhoto(dataURL,filename){
  try{
    const res=await fetch(dataURL);
    const blob=await res.blob();
    const file=new File([blob],filename,{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file]});
    }else{
      const w=window.open();
      if(w) w.document.write('<img src="'+dataURL+'" style="max-width:100%"><p style="font-family:sans-serif;text-align:center;color:#888;padding:12px">꾹 눌러서 저장</p>');
    }
  }catch(e){if(e.name!=='AbortError') showToast('저장 실패')}
}

/* ── TOAST ── */
let toastT;
function showToast(msg,ms=1400){
  toast.textContent=msg;toast.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>toast.classList.remove('on'),ms);
}

// inline onclick 함수들을 window에 노출
window.openGallery=openGallery;
window.closeGallery=closeGallery;
window.handleShutter=handleShutter;
window.doFlip=doFlip;
window.toggleSel=toggleSel;
window.deleteSelected=deleteSelected;
window.downloadSelected=downloadSelected;
window.closeViewer=closeViewer;
window.downloadCurrent=downloadCurrent;
window.deleteCurrent=deleteCurrent;
window.toggleRatioMenu=toggleRatioMenu;
window.setRatio=setRatio;
window.openViewer=openViewer;
</script>
