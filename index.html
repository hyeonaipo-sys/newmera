<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camera</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;font-family:-apple-system,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;background:#000}

/* viewfinder */
#vf{position:relative;flex:1;background:#000;overflow:hidden}
#mainVid{width:100%;height:100%;object-fit:cover;display:block}
#mainVid.mirror{transform:scaleX(-1)}

/* pip */
#pip{position:absolute;bottom:20px;left:16px;width:100px;height:133px;border-radius:16px;overflow:hidden;border:2.5px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,.65);z-index:10;display:none}
#pip.show{display:block}
#frontVid{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

/* top bar */
#topbar{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);z-index:20}
.tbtn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .2s}
.tbtn.on{background:#ffd60a}
#berealTag{background:#000;color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;display:none}
#berealTag.show{display:block}

/* hud pills */
#recPill,#landPill{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);color:#fff;padding:5px 14px;border-radius:20px;display:none;align-items:center;gap:7px;font-size:13px;font-weight:600;z-index:20;white-space:nowrap}
#recPill.show,#landPill.show{display:flex}
.reddot{width:8px;height:8px;border-radius:50%;background:#ff3b30;animation:blink 1s infinite}
.yellowdot{width:7px;height:7px;border-radius:50%;background:#ffd60a;animation:pulse 1.5s infinite}

/* focus ring */
#focus{position:absolute;width:62px;height:62px;border:2px solid #ffd60a;border-radius:8px;pointer-events:none;display:none;z-index:15;transform:translate(-50%,-50%)}

/* flash */
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50;transition:opacity .05s}

/* zoom row */
#zoomRow{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.zbtn{min-width:36px;height:34px;border-radius:17px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0 10px;transition:all .15s}
.zbtn.on{background:rgba(255,214,10,.18);border-color:#ffd60a;color:#ffd60a}

/* landscape toggle */
#landBtn{position:absolute;bottom:24px;right:14px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:none;align-items:center;justify-content:center;font-size:18px;cursor:pointer;z-index:15;transition:background .2s}
#landBtn.show{display:flex}
#landBtn.on{background:#ffd60a}

/* bottom ui */
#bottom{background:#000;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,10px)}
#modes{display:flex;justify-content:center;gap:20px;padding:10px 16px 4px;overflow-x:auto;scrollbar-width:none}
#modes::-webkit-scrollbar{display:none}
.mode{background:none;border:none;color:rgba(255,255,255,.45);font-size:11px;font-weight:600;letter-spacing:.07em;cursor:pointer;padding:4px 0;transition:all .2s;white-space:nowrap;flex-shrink:0}
.mode.on{color:#ffd60a;transform:scale(1.1)}
#controls{display:flex;align-items:center;justify-content:space-around;padding:6px 28px 10px}
#thumb{width:50px;height:50px;border-radius:10px;border:2.5px solid #fff;background:#1a1a1a;overflow:hidden;flex-shrink:0}
#thumb img{width:100%;height:100%;object-fit:cover;display:none}
#shutter{width:74px;height:74px;border-radius:50%;border:4px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color .2s}
#shutter.rec{border-color:#ff3b30}
#shutterInner{width:58px;height:58px;border-radius:50%;background:#fff;transition:all .18s ease}
#shutter.rec #shutterInner{width:28px;height:28px;border-radius:8px;background:#ff3b30}
#flipBtn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;flex-shrink:0;transition:transform .4s}

/* toast */
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(22,22,22,.93);backdrop-filter:blur(12px);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s ease;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* permission screen */
#permScreen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;z-index:999}
#permScreen .icon{font-size:54px}
#permScreen h2{color:#fff;font-size:21px;font-weight:600;text-align:center}
#permScreen p{color:rgba(255,255,255,.55);font-size:14px;text-align:center;line-height:1.6}
#startBtn{background:#fff;color:#000;border:none;border-radius:14px;padding:15px 40px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
</style>

</head>
<body>

<div id="permScreen">
  <div class="icon">📷</div>
  <h2>Camera</h2>
  <p>BeReal 이중 카메라와<br>가로 영상 촬영을 사용하려면<br>카메라 권한이 필요합니다</p>
  <button id="startBtn" onclick="startCamera()">시작하기</button>
</div>

<div id="app">
  <div id="vf" onclick="handleVfClick(event)">
    <video id="mainVid" autoplay playsinline muted></video>
    <div id="pip"><video id="frontVid" autoplay playsinline muted></video></div>

<div id="focus"></div>

<div id="zoomRow">
  <div class="zbtn on" onclick="event.stopPropagation();setZoom(1)">1×</div>
  <div class="zbtn" onclick="event.stopPropagation();setZoom(2)">2×</div>

  </div>

  <div id="bottom">
    <div id="modes">
      <button class="mode" onclick="setMode('SLO-MO')">SLO-MO</button>
      <button class="mode" onclick="setMode('VIDEO')">VIDEO</button>
      <button class="mode on" onclick="setMode('FOTO')">FOTO</button>
      <button class="mode" onclick="setMode('PORTRAIT')">PORTRAIT</button>
      <button class="mode" onclick="setMode('1:1')">1:1</button>
    </div>
    <div id="controls">
      <div id="thumb"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCamera()">🔄</div>
    </div>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>
<canvas id="vidCanvas" style="display:none"></canvas>

<script>
var backStream=null, frontStream=null, mode='FOTO', bereal=false, landscape=false;
var recording=false, mediaRec=null, chunks=[], recTimer=null, recSec=0;
var flashOn=false, currentZoom=1, facing='back';
var animFrame=null, canvasStream=null;

var mainVid=document.getElementById('mainVid');
var frontVid=document.getElementById('frontVid');
var pip=document.getElementById('pip');
var canvas=document.getElementById('canvas');
var vidCanvas=document.getElementById('vidCanvas');

async function startCamera(){
  document.getElementById('permScreen').style.display='none';
  try{
    // try back camera first
    try{
      backStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:true
      });
    }catch(e){
      // fallback: any camera
      backStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    }
    mainVid.srcObject=backStream;

    try{
      frontStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
      });
      frontVid.srcObject=frontStream;
    }catch(e){}

  }catch(e){
    document.getElementById('permScreen').style.display='flex';
    document.querySelector('#permScreen p').textContent='카메라 접근 실패: '+e.message;
    return;
  }
}

function handleVfClick(e){
  var rect=e.currentTarget.getBoundingClientRect();
  var f=document.getElementById('focus');
  f.style.left=e.clientX-rect.left+'px';
  f.style.top=e.clientY-rect.top+'px';
  f.style.display='block';
  setTimeout(function(){f.style.display='none';},1100);
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode').forEach(function(el){
    el.classList.toggle('on', el.textContent===m);
  });
  var lb=document.getElementById('landBtn');
  if(m==='VIDEO'||m==='SLO-MO') lb.classList.add('show');
  else{ lb.classList.remove('show'); if(landscape) toggleLandscape(); }
}

function handleShutter(){
  if(mode==='VIDEO'||mode==='SLO-MO'){ if(!recording) startRec(); else stopRec(); }
  else takePhoto();
}

function takePhoto(){
  // flash
  var fl=document.getElementById('flash');
  fl.style.opacity='0.7';
  setTimeout(function(){fl.style.opacity='0';},120);

  var vw=mainVid.videoWidth||1280, vh=mainVid.videoHeight||720;
  var cw=vw,ch=vh;
  if(mode==='1:1'){cw=Math.min(vw,vh);ch=cw;}
  canvas.width=cw; canvas.height=ch;
  var ctx=canvas.getContext('2d');
  var ox=(vw-cw)/2, oy=(vh-ch)/2;
  if(facing==='front'){ctx.translate(cw,0);ctx.scale(-1,1);}
  ctx.drawImage(mainVid,ox,oy,cw,ch,0,0,cw,ch);
  if(facing==='front') ctx.setTransform(1,0,0,1,0,0);

  if(bereal&&frontStream&&frontVid.videoWidth){
    var fw=frontVid.videoWidth||320,fh=frontVid.videoHeight||240;
    var ow=cw*.28,oh=ow*(fh/fw),mg=cw*.04,rx=mg,ry=ch-mg-oh,r=14;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(rx+r,ry);ctx.lineTo(rx+ow-r,ry);ctx.quadraticCurveTo(rx+ow,ry,rx+ow,ry+r);
    ctx.lineTo(rx+ow,ry+oh-r);ctx.quadraticCurveTo(rx+ow,ry+oh,rx+ow-r,ry+oh);
    ctx.lineTo(rx+r,ry+oh);ctx.quadraticCurveTo(rx,ry+oh,rx,ry+oh-r);
    ctx.lineTo(rx,ry+r);ctx.quadraticCurveTo(rx,ry,rx+r,ry);
    ctx.closePath();ctx.clip();
    ctx.translate(rx+ow,ry);ctx.scale(-1,1);
    ctx.drawImage(frontVid,0,0,ow,oh);
    ctx.restore();
    ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(rx+r,ry);ctx.lineTo(rx+ow-r,ry);ctx.quadraticCurveTo(rx+ow,ry,rx+ow,ry+r);
    ctx.lineTo(rx+ow,ry+oh-r);ctx.quadraticCurveTo(rx+ow,ry+oh,rx+ow-r,ry+oh);
    ctx.lineTo(rx+r,ry+oh);ctx.quadraticCurveTo(rx,ry+oh,rx,ry+oh-r);
    ctx.lineTo(rx,ry+r);ctx.quadraticCurveTo(rx,ry,rx+r,ry);
    ctx.closePath();ctx.stroke();
  }

  var url=canvas.toDataURL('image/jpeg',.92);
  var a=document.createElement('a');a.href=url;a.download='photo_'+Date.now()+'.jpg';a.click();
  var img=document.getElementById('thumbImg');
  img.src=url;img.style.display='block';
  showToast('📸 사진 저장됨');
}

function startRec(){
  chunks=[];
  var stream=backStream;
  if(landscape){
    var vw=mainVid.videoWidth||1280,vh=mainVid.videoHeight||720;
    vidCanvas.width=vh;vidCanvas.height=vw;
    var ctx=vidCanvas.getContext('2d');
    var draw=function(){
      ctx.save();ctx.translate(vidCanvas.width/2,vidCanvas.height/2);
      ctx.rotate(-Math.PI/2);ctx.drawImage(mainVid,-vw/2,-vh/2,vw,vh);
      ctx.restore();animFrame=requestAnimationFrame(draw);
    };draw();
    canvasStream=vidCanvas.captureStream(30);
    var at=backStream.getAudioTracks()[0];
    if(at) canvasStream.addTrack(at);
    stream=canvasStream;
  }
  var mime='video/webm;codecs=vp9';
  if(!MediaRecorder.isTypeSupported(mime)) mime='video/webm';
  try{mediaRec=new MediaRecorder(stream,{mimeType:mime});}
  catch(e){mediaRec=new MediaRecorder(stream);}
  mediaRec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
  mediaRec.onstop=function(){
    var blob=new Blob(chunks,{type:'video/webm'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='video_'+Date.now()+'.webm';a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    showToast('🎬 영상 저장됨');
  };
  mediaRec.start(100);
  recording=true;
  document.getElementById('shutter').classList.add('rec');
  recSec=0;
  document.getElementById('recPill').classList.add('show');
  updateRecTime();
  recTimer=setInterval(function(){recSec++;updateRecTime();},1000);
}

function stopRec(){
  if(mediaRec&&mediaRec.state!=='inactive') mediaRec.stop();
  recording=false;
  document.getElementById('shutter').classList.remove('rec');
  document.getElementById('recPill').classList.remove('show');
  clearInterval(recTimer);
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
}

function updateRecTime(){
  var m=String(Math.floor(recSec/60)).padStart(2,'0');
  var s=String(recSec%60).padStart(2,'0');
  document.getElementById('recTime').textContent=m+':'+s;
}

function toggleBereal(){
  bereal=!bereal;
  document.getElementById('berealBtn').classList.toggle('on',bereal);
  document.getElementById('berealTag').classList.toggle('show',bereal);
  pip.classList.toggle('show',bereal);
  showToast(bereal?'👁️ BeReal 켜짐':'👁️ BeReal 꺼짐');
}

function toggleFlash(){
  flashOn=!flashOn;
  document.getElementById('flashBtn').classList.toggle('on',flashOn);
}

function toggleLandscape(){
  landscape=!landscape;
  document.getElementById('landBtn').classList.toggle('on',landscape);
  document.getElementById('landPill').classList.toggle('show',landscape);
  showToast(landscape?'↔️ 가로 모드 켜짐':'↕️ 세로 모드');
}

function setZoom(z){
  currentZoom=z;
  mainVid.style.transform=(facing==='front'?'scaleX(-1) ':'')+'scale('+z+')';
  document.querySelectorAll('.zbtn').forEach(function(b){
    b.classList.toggle('on', parseFloat(b.textContent)===z);
  });
}

function flipCamera(){
  var btn=document.getElementById('flipBtn');
  btn.style.transform='rotate(180deg)';
  setTimeout(function(){btn.style.transform='';},400);
  if(facing==='back'&&frontStream){
    mainVid.srcObject=frontStream;
    frontVid.srcObject=backStream;
    facing='front';
    mainVid.classList.add('mirror');
  }else if(backStream){
    mainVid.srcObject=backStream;
    frontVid.srcObject=frontStream;
    facing='back';
    mainVid.classList.remove('mirror');
  }
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}
</script>

</body>
