<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera</title>

<!-- iOS 앱 느낌 -->
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root {
  --ios-blue:#007aff;
  --ios-yellow:#ffd60a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;color:#fff;font-family:-apple-system;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;}

/* top */
#topBar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:20px;
}
.top-btn{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  border:none;color:#fff;
  padding:10px 16px;border-radius:20px;
  font-weight:700;
}

/* camera */
#vfWrapper{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
#vf{
  width:90%;
  aspect-ratio:3/4;
  border-radius:36px;
  overflow:hidden;
  background:#111;
}
#mainVid{width:100%;height:100%;object-fit:cover;}
#mainVid.mirror{transform:scaleX(-1);}

/* bottom */
#cameraBottom{
  height:160px;
  display:flex;
  justify-content:center;
  align-items:center;
}
#shutter{
  width:80px;height:80px;
  border-radius:50%;
  border:5px solid #fff;
  display:flex;align-items:center;justify-content:center;
}
#shutterInner{
  width:60px;height:60px;
  border-radius:50%;
  background:linear-gradient(145deg,#fff,#ddd);
}
#shutter:active{transform:scale(.92);}

/* toast */
#toast{
  position:fixed;
  top:120px;left:50%;
  transform:translateX(-50%);
  background:#fff;color:#000;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<div class="screen">
  <div id="topBar">
    <button class="top-btn" onclick="toggleBoth()" id="bothBtn">BOTH OFF</button>
  </div>

  <div id="vfWrapper">
    <div id="vf">
      <video id="mainVid" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="cameraBottom">
    <div id="shutter" onclick="handleShutter()">
      <div id="shutterInner"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
let stream,facing='back',bothMode=false,isProcessing=false,db;

const mainVid=document.getElementById('mainVid');
const canvas=document.getElementById('canvas');

/* DB */
const req=indexedDB.open("camDB",1);
req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("media",{keyPath:"id"});
};
req.onsuccess=e=>{
  db=e.target.result;
  startCam();
};

/* camera */
async function startCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing==='back'?'environment':'user'}
  });
  mainVid.srcObject=stream;
  mainVid.className = facing==='front'?'mirror':'';
}

/* capture */
function grab(){
  const ctx=canvas.getContext('2d');
  canvas.width=1080;
  canvas.height=1440;
  ctx.drawImage(mainVid,0,0,canvas.width,canvas.height);
  return canvas.toDataURL('image/jpeg',0.7);
}

/* save */
function saveItem(it){
  it.id=Date.now();
  db.transaction("media","readwrite").objectStore("media").add(it);
}

/* UI */
function toggleBoth(){
  bothMode=!bothMode;
  document.getElementById('bothBtn').textContent = bothMode?"BOTH ON":"BOTH OFF";
}

async function handleShutter(){
  if(isProcessing) return;
  isProcessing=true;

  if(bothMode){
    const first=grab();

    facing=facing==='back'?'front':'back';
    await startCam();

    setTimeout(()=>{
      const second=grab();
      saveItem({main:first,sub:second});
      msg("BOTH SAVED");
      isProcessing=false;
    },500);
  } else {
    const data=grab();
    saveItem({main:data});
    msg("SAVED");
    isProcessing=false;
  }
}

/* toast */
function msg(m){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}
</script>

</body>
</html>
