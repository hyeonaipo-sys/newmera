<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera Pro BeReal</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-red: #ff3b30;
  --ios-yellow: #ffd60a;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }

.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* TOP BAR */
#topBar { 
  height: 60px;
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 0 20px; 
  margin-top: max(var(--safe-top), 10px);
  z-index: 100;
  position: absolute;
  top: 0; left: 0; right: 0;
}
.top-btn { 
  background: rgba(0,0,0,0.5); 
  border: none;
  color: #fff; 
  height: 40px; 
  border-radius: 20px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 14px; 
  backdrop-filter: blur(10px); 
  padding: 0 15px;
  font-weight: 700;
}
.top-btn.active { background: #fff; color: #000; }

/* VIEWPORT CONTAINER - Needs to fit between top and bottom bar */
#vfWrapper {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  margin-top: 60px; /* Below Top Bar */
}
#vf { 
  position: relative; 
  width: 100%; 
  height: 100%;
  max-height: calc(100vh - 280px); /* Leave space for bottom UI */
  overflow: hidden; 
  background: #111;
  border-radius: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#mainVid { width: 100%; height: 100%; object-fit: cover; }
#mainVid.mirror { transform: scaleX(-1); }

/* OVERLAYS */
#overlayMsg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: 900;
  color: #fff;
  z-index: 150;
  display: none;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
}
#flashEffect {
  position: absolute; inset: 0; background: #fff; z-index: 200; display: none;
}

/* BOTTOM CONTROLS - Fixed at bottom */
#cameraBottom { 
  height: 200px;
  background: #000; 
  padding-bottom: var(--safe-bottom);
  display: flex;
  flex-direction: column;
  justify-content: center;
  z-index: 100;
}
#modesWrapper { 
  display: flex; 
  justify-content: center;
  gap: 30px; 
  margin-bottom: 20px;
}
.mode { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.4); }
.mode.active { color: var(--ios-yellow); }

#shutterRow { 
  width: 100%;
  display: flex; 
  align-items: center; 
  justify-content: space-evenly; 
}
#thumb { 
  width: 54px; height: 54px; border-radius: 50%; background: #1a1a1a; overflow: hidden; border: 2px solid rgba(255,255,255,0.2); 
}
#thumb img { width: 100%; height: 100%; object-fit: cover; }
#shutter { 
  width: 76px; height: 76px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; 
}
#shutterInner { 
  width: 60px; height: 60px; border-radius: 50%; background: #fff; transition: transform 0.1s;
}
#shutter:active #shutterInner { transform: scale(0.9); }

/* GALLERY & VIEWER */
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
.gItem { width: 100%; aspect-ratio: 1; position: relative; background: #111; }
.gItem img.main { width: 100%; height: 100%; object-fit: cover; }
.gItem img.sub { position: absolute; top: 4px; left: 4px; width: 30%; border: 1px solid #fff; border-radius: 4px; }

#photoViewer { position: fixed; inset: 0; background: #000; display: none; z-index: 500; flex-direction: column; }
#photoViewer.active { display: flex; }
#pvContainer { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
#pvMainImg { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 20px; }
#pvSubImg { position: absolute; top: 40px; left: 40px; width: 30%; border: 2px solid #fff; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

#toast { position: fixed; top: 130px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 25px; border-radius: 25px; font-size: 14px; font-weight: 800; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="screen active" id="cameraScreen">
  <div id="topBar">
    <button class="top-btn" onclick="toggleFlash()" id="flashBtn">⚡️ OFF</button>
    <button class="top-btn" onclick="toggleBoth()" id="bothBtn">BOTH OFF</button>
  </div>

  <div id="vfWrapper">
    <div id="vf">
      <video id="mainVid" autoplay playsinline muted></video>
      <div id="overlayMsg"></div>
      <div id="flashEffect"></div>
    </div>
  </div>

  <div id="cameraBottom">
    <div id="modesWrapper">
      <div class="mode">VIDEO</div>
      <div class="mode active">PHOTO</div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLib()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCam()" style="font-size:26px">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header style="padding: 50px 20px 20px; background: #000;">
    <h1 style="font-size:32px; font-weight:800;">Gallery</h1>
  </header>
  <div id="galleryGrid"></div>
  <button onclick="closeLib()" style="position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:15px 40px; border-radius:30px; font-weight:800; border:none; z-index:250;">Close</button>
</div>

<div id="photoViewer">
  <header style="padding: max(var(--safe-top), 20px) 20px 10px; display:flex; justify-content:space-between;">
    <button onclick="closeViewer()" style="color:var(--ios-blue); font-size:18px; background:none; border:none">Done</button>
    <button onclick="deleteItem()" style="color:var(--ios-red); font-size:18px; background:none; border:none">Delete</button>
  </header>
  <div id="pvContainer">
    <img id="pvMainImg">
    <img id="pvSubImg">
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, facing='back', items=[], db=null;
  let flashEnabled=false, bothMode=false, isProcessing=false;
  
  const mainVid = document.getElementById('mainVid');
  const canvas = document.getElementById('canvas');
  const overlayMsg = document.getElementById('overlayMsg');
  const flashEffect = document.getElementById('flashEffect');
  const thumbImg = document.getElementById('thumbImg');

  const req = indexedDB.open("BeReal_Camera_App_v4", 1);
  req.onupgradeneeded = e => { 
    db = e.target.result; 
    db.createObjectStore("media", {keyPath:"id"}); 
  };
  req.onsuccess = e => { db = e.target.result; loadItems(); startCam(); };

  async function startCam() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: facing==='back'?'environment':'user', width:{ideal:1920}, height:{ideal:1080} } 
      });
      mainVid.srcObject = stream;
      mainVid.className = facing=='front'?'mirror':'';
    } catch(e) { msg('Camera Error'); }
  }

  window.toggleFlash = () => {
    flashEnabled = !flashEnabled;
    const btn = document.getElementById('flashBtn');
    btn.textContent = flashEnabled ? '⚡️ ON' : '⚡️ OFF';
    btn.classList.toggle('active', flashEnabled);
  };

  window.toggleBoth = () => {
    bothMode = !bothMode;
    const btn = document.getElementById('bothBtn');
    btn.textContent = bothMode ? 'BOTH ON' : 'BOTH OFF';
    btn.classList.toggle('active', bothMode);
  };

  window.handleShutter = async () => {
    if(isProcessing) return;
    isProcessing = true;

    if(bothMode) {
      // 1. First Shot
      await triggerFlash();
      const firstShot = grab();
      
      // 2. Change!
      overlayMsg.textContent = "CHANGE!";
      overlayMsg.style.display = "block";
      facing = facing === 'back' ? 'front' : 'back';
      await startCam();
      
      setTimeout(() => {
        // 3. Countdown
        let count = 3;
        overlayMsg.textContent = count;
        const cdInt = setInterval(async () => {
          count--;
          if(count > 0) {
            overlayMsg.textContent = count;
          } else {
            clearInterval(cdInt);
            overlayMsg.style.display = 'none';
            // 4. Second Shot
            await triggerFlash();
            const secondShot = grab();
            saveItem({ type:'photo', main: firstShot, sub: secondShot });
            msg('SAVED');
            isProcessing = false;
          }
        }, 1000);
      }, 1000);
    } else {
      await triggerFlash();
      const data = grab();
      saveItem({ type:'photo', main: data });
      msg('SAVED');
      isProcessing = false;
    }
  };

  async function triggerFlash() {
    if(!flashEnabled) return;
    flashEffect.style.display = 'block';
    const track = stream.getVideoTracks()[0];
    try {
      if(track.getCapabilities().torch) {
        await track.applyConstraints({ advanced: [{ torch: true }] });
        setTimeout(async () => {
          await track.applyConstraints({ advanced: [{ torch: false }] });
          flashEffect.style.display = 'none';
        }, 150);
      } else {
        setTimeout(() => flashEffect.style.display = 'none', 150);
      }
    } catch(e) {
      setTimeout(() => flashEffect.style.display = 'none', 150);
    }
  }

  function grab() {
    const ctx = canvas.getContext('2d');
    const vW = mainVid.videoWidth, vH = mainVid.videoHeight;
    canvas.width = 1080; canvas.height = 1440; 
    
    const vAspect = vW / vH, tAspect = canvas.width / canvas.height;
    let sW, sH, sX, sY;
    if (vAspect > tAspect) { sH = vH; sW = vH * tAspect; sX = (vW - sW) / 2; sY = 0; } 
    else { sW = vW; sH = vW / tAspect; sX = 0; sY = (vH - sH) / 2; }

    ctx.save();
    if(facing==='front') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(mainVid, sX, sY, sW, sH, 0, 0, canvas.width, canvas.height);
    ctx.restore();
    return canvas.toDataURL('image/jpeg', 0.9);
  }

  function saveItem(item) {
    item.id = Date.now();
    const tx = db.transaction("media", "readwrite");
    tx.objectStore("media").add(item).onsuccess = () => loadItems();
  }

  function loadItems() {
    db.transaction("media", "readonly").objectStore("media").getAll().onsuccess = e => {
      items = e.target.result.sort((a,b)=>b.id-a.id);
      if(items.length>0) { thumbImg.src = items[0].main; }
      renderGrid();
    };
  }

  window.openLib = () => { document.getElementById('libraryScreen').classList.add('active'); renderGrid(); };
  window.closeLib = () => document.getElementById('libraryScreen').classList.remove('active');

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    items.forEach((it, i) => {
      const div = document.createElement('div');
      div.className = 'gItem';
      div.innerHTML = `<img src="${it.main}" class="main">${it.sub ? `<img src="${it.sub}" class="sub">` : ''}`;
      div.onclick = () => openViewer(i);
      grid.appendChild(div);
    });
  }

  let vIdx = 0;
  window.openViewer = i => {
    vIdx = i; const it = items[i];
    document.getElementById('photoViewer').classList.add('active');
    document.getElementById('pvMainImg').src = it.main;
    const sub = document.getElementById('pvSubImg');
    if(it.sub) { sub.src = it.sub; sub.style.display = 'block'; } else { sub.style.display = 'none'; }
  };
  window.closeViewer = () => document.getElementById('photoViewer').classList.remove('active');
  window.deleteItem = () => {
    db.transaction("media", "readwrite").objectStore("media").delete(items[vIdx].id).oncomplete = () => {
      loadItems(); closeViewer();
    };
  };
  window.flipCam = () => { facing=facing==='back'?'front':'back'; startCam(); };
  function msg(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
})();
</script>
</body>
</html>
