<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera Pro BeReal</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-red: #ff3b30;
  --ios-yellow: #ffd60a;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }

/* LAYOUT */
.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* TOP BAR */
#topBar { 
  height: 60px;
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 0 20px; 
  margin-top: max(var(--safe-top), 10px);
  z-index: 100;
  position: relative;
}
.top-btn { 
  background: rgba(40,40,40,0.8); 
  border: 1px solid rgba(255,255,255,0.1); 
  color: #fff; 
  width: 44px; 
  height: 44px; 
  border-radius: 50%; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 18px; 
  backdrop-filter: blur(10px); 
}
.top-btn.active { background: #fff; color: #000; border-color: #fff; }

#ratioWrapper { position: relative; }
#ratioBtn { width: auto; padding: 0 15px; border-radius: 22px; font-size: 13px; font-weight: 800; min-width: 60px; }
#bothBtn { width: auto; padding: 0 15px; border-radius: 22px; font-size: 13px; font-weight: 800; }

/* RATIO MENU - Positioned exactly under Ratio Button */
#ratioMenu {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30,30,30,0.95);
  border-radius: 12px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 200;
  border: 1px solid rgba(255,255,255,0.1);
}
#ratioMenu.show { display: flex; }
.ratio-opt {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  border-bottom: 0.5px solid rgba(255,255,255,0.1);
  text-align: center;
}
.ratio-opt:last-child { border-bottom: none; }
.ratio-opt.selected { color: var(--ios-yellow); }

/* VIEWPORT */
#vfContainer { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
#vf { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 40px; transition: all 0.3s ease; background: #111; display: flex; align-items: center; justify-content: center; }
#mainVid { width: 100%; height: 100%; object-fit: cover; background: #000; }
#mainVid.mirror { transform: scaleX(-1); }

/* BOTH OVERLAY (Front Camera Preview in Both mode) */
#bothOverlay {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 30%;
  aspect-ratio: 3/4;
  background: #000;
  border-radius: 15px;
  border: 2px solid #fff;
  overflow: hidden;
  z-index: 50;
  display: none;
}
#bothOverlay video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

/* REC UI */
#recUI { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(255, 59, 48, 0.9); padding: 5px 15px; border-radius: 20px; display: none; align-items: center; gap: 8px; z-index: 110; }
#recUI.active { display: flex; }
#recDot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

/* BOTTOM UI */
#cameraBottom { background: #000; padding: 10px 0 calc(var(--safe-bottom) + 10px); flex-shrink: 0; }
#modesWrapper { position: relative; width: 100%; height: 44px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#modesTrack { display: flex; position: absolute; gap: 40px; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); }
.mode { font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.3); padding: 10px; transition: 0.3s; }
.mode.active { color: var(--ios-yellow); }

#shutterRow { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; margin-top: 5px; }
#thumb { width: 54px; height: 54px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: #111; overflow: hidden; }
#thumb img { width: 100%; height: 100%; object-fit: cover; }
#shutter { width: 72px; height: 72px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
#shutterInner { width: 56px; height: 56px; border-radius: 50%; background: #fff; transition: 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); }
#shutter.recording #shutterInner { background: var(--ios-red); border-radius: 12px; transform: scale(0.5); }

/* GALLERY & VIEWER */
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; background: #000; }
.gItem { width: 100%; aspect-ratio: 1; background: #1c1c1e; position: relative; overflow: hidden; }
.gItem img { width: 100%; height: 100%; object-fit: cover; }

#toast { position: fixed; top: 130px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 25px; border-radius: 25px; font-size: 14px; font-weight: 800; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
#toast.show { opacity: 1; }

#photoViewer { background: #000; display: none; position: fixed; inset: 0; z-index: 300; flex-direction: column; }
#photoViewer.active { display: flex; }
</style>
</head>
<body>

<div class="screen active" id="cameraScreen" data-mode="PHOTO">
  <div id="topBar">
    <button class="top-btn" onclick="toggleFlash()" id="flashBtn">⚡️</button>
    <div id="ratioWrapper">
      <button class="top-btn" onclick="toggleRatioMenu()" id="ratioBtn">3:4</button>
      <div id="ratioMenu">
        <div class="ratio-opt" onclick="selectRatio('1:1')">1:1</div>
        <div class="ratio-opt" onclick="selectRatio('9:16')">9:16</div>
        <div class="ratio-opt selected" onclick="selectRatio('3:4')">3:4</div>
      </div>
    </div>
    <button class="top-btn" onclick="toggleBoth()" id="bothBtn">BOTH OFF</button>
  </div>
  
  <div id="vfContainer">
    <div id="vf" ontouchstart="handleSwipeStart(event)" ontouchend="handleSwipeEnd(event)">
      <video id="mainVid" autoplay playsinline muted></video>
      <div id="bothOverlay"><video id="subVid" autoplay playsinline muted></video></div>
      <div id="recUI"><div id="recDot"></div><div id="recTimer">00:00</div></div>
    </div>
  </div>

  <div id="cameraBottom">
    <div id="modesWrapper" ontouchstart="handleSwipeStart(event)" ontouchend="handleSwipeEnd(event)">
      <div id="modesTrack">
        <div class="mode" onclick="setMode(0)">VIDEO</div>
        <div class="mode active" onclick="setMode(1)">PHOTO</div>
      </div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLib()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCam()" style="font-size:26px">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header style="padding: 40px 20px 20px; border-bottom: 0.5px solid #222;">
    <h1 style="font-size:32px; font-weight:800;">Library</h1>
  </header>
  <div id="galleryGrid"></div>
  <button onclick="closeLib()" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:15px 30px; border-radius:30px; font-weight:800; border:none; z-index:250;">Back</button>
</div>

<div id="photoViewer">
  <header style="padding: 20px; display:flex; justify-content:space-between">
    <button onclick="closeViewer()" style="color:var(--ios-blue); font-size:17px; background:none; border:none">Close</button>
    <button onclick="deleteItem()" style="color:var(--ios-red); font-size:17px; background:none; border:none">Delete</button>
  </header>
  <div style="flex:1; display:flex; align-items:center; justify-content:center; background:#000;">
    <div id="pvMainContainer" style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
        <img id="pvMainImg" style="max-width:100%; max-height:100%; display:none; object-fit:contain">
        <img id="pvSubImg" style="position:absolute; top:20px; left:20px; width:25%; border:2px solid #fff; border-radius:10px; display:none; z-index:10;">
        <video id="pvMainVid" controls style="max-width:100%; max-height:100%; display:none; object-fit:contain"></video>
    </div>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, subStream=null, facing='back', currentMode='PHOTO', items=[];
  let isRec=false, recStart=0, recInt=null, drawInt=null, mediaRec=null, chunks=[];
  let db=null, flash=false, bothMode=false, isProcessing=false;
  let ratioMode = '3:4'; 

  const mainVid = document.getElementById('mainVid');
  const subVid = document.getElementById('subVid');
  const canvas = document.getElementById('canvas');
  const thumbImg = document.getElementById('thumbImg');
  const cameraScreen = document.getElementById('cameraScreen');
  const vf = document.getElementById('vf');
  const ratioBtn = document.getElementById('ratioBtn');
  const ratioMenu = document.getElementById('ratioMenu');
  const bothBtn = document.getElementById('bothBtn');
  const bothOverlay = document.getElementById('bothOverlay');

  const req = indexedDB.open("NewmeraPro_Perfect_V5", 1);
  req.onupgradeneeded = e => { 
    db = e.target.result; 
    if(!db.objectStoreNames.contains("media")) db.createObjectStore("media", {keyPath:"id"}); 
  };
  req.onsuccess = e => { db = e.target.result; loadItems(); startCam(); };

  async function startCam() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: facing==='back'?'environment':'user', width:{ideal:1920}, height:{ideal:1080} } 
      });
      mainVid.srcObject = stream;
      mainVid.className = facing=='front'?'mirror':'';
    } catch(e) { msg('Camera Error'); }
  }

  async function startSubCam() {
    try {
        subStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width:{ideal:640}, height:{ideal:480} } 
        });
        subVid.srcObject = subStream;
        bothOverlay.style.display = 'block';
    } catch(e) { bothOverlay.style.display = 'none'; }
  }

  function stopSubCam() {
    if(subStream) subStream.getTracks().forEach(t=>t.stop());
    subStream = null;
    bothOverlay.style.display = 'none';
  }

  window.toggleFlash = () => {
    flash = !flash;
    document.getElementById('flashBtn').classList.toggle('active', flash);
    const track = stream.getVideoTracks()[0];
    try { track.applyConstraints({advanced:[{torch:flash}]}); } catch(e){}
  };

  window.toggleRatioMenu = () => ratioMenu.classList.toggle('show');

  window.selectRatio = (r) => {
    ratioMode = r;
    ratioBtn.textContent = r;
    ratioMenu.classList.remove('show');
    document.querySelectorAll('.ratio-opt').forEach(opt => {
        opt.classList.toggle('selected', opt.textContent === r);
    });
    updateVFRatio();
  };

  function updateVFRatio() {
    if (currentMode === 'VIDEO') {
      vf.style.width = '100vw';
      vf.style.aspectRatio = '16/9';
      vf.style.height = 'auto';
    } else {
      vf.style.width = '100vw';
      if (ratioMode === '1:1') vf.style.aspectRatio = '1/1';
      else if (ratioMode === '9:16') vf.style.aspectRatio = '9/16';
      else vf.style.aspectRatio = '3/4';
      vf.style.height = 'auto';
    }
  }

  window.toggleBoth = () => {
    bothMode = !bothMode;
    bothBtn.textContent = bothMode ? 'BOTH ON' : 'BOTH OFF';
    bothBtn.classList.toggle('active', bothMode);
    if(bothMode) startSubCam(); else stopSubCam();
  };

  let startX=0, cIdx=1;
  window.handleSwipeStart = e => { startX = e.touches[0].clientX; ratioMenu.classList.remove('show'); };
  window.handleSwipeEnd = e => {
    if(isRec || isProcessing) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff)>50) {
      if(diff>0 && cIdx<1) setMode(cIdx+1);
      else if(diff<0 && cIdx>0) setMode(cIdx-1);
    }
  };

  window.setMode = idx => {
    cIdx=idx; currentMode = idx===0?'VIDEO':'PHOTO';
    cameraScreen.setAttribute('data-mode', currentMode);
    document.getElementById('modesTrack').style.transform = `translateX(${idx===0?40:-40}px)`;
    document.querySelectorAll('.mode').forEach((m,i)=>m.classList.toggle('active', i===idx));
    
    bothBtn.style.display = (currentMode === 'VIDEO') ? 'none' : 'flex';
    ratioBtn.style.display = (currentMode === 'VIDEO') ? 'none' : 'flex';
    document.getElementById('shutterInner').style.background = (currentMode === 'VIDEO') ? 'var(--ios-red)' : '#fff';
    
    if(currentMode === 'VIDEO') stopSubCam();
    else if(bothMode) startSubCam();

    updateVFRatio();
  };

  window.handleShutter = async () => { 
    if(isProcessing) return;
    if(currentMode === 'PHOTO') {
        isProcessing = true;
        const mainData = grab(mainVid, facing==='front', 0.9);
        let subData = null;
        if(bothMode) {
            subData = grab(subVid, true, 0.9);
        }
        saveItem({ type:'photo', thumb: mainData, main: mainData, sub: subData });
        msg(bothMode ? 'BOTH SAVED' : 'PHOTO SAVED');
        isProcessing = false;
    } else {
        handleVideo();
    }
  };

  function handleVideo() { if(!isRec) startRec(); else stopRec(); }

  function startRec() {
    isRec=true; chunks=[];
    document.getElementById('shutter').classList.add('recording');
    document.getElementById('recUI').classList.add('active');
    recStart = Date.now();
    recInt = setInterval(() => {
      const d = Math.floor((Date.now()-recStart)/1000);
      document.getElementById('recTimer').textContent = `${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
    }, 1000);

    const cStream = canvas.captureStream(30);
    mediaRec = new MediaRecorder(cStream, { mimeType:'video/webm;codecs=vp8', videoBitsPerSecond:5000000 });
    mediaRec.ondataavailable = e => chunks.push(e.data);
    mediaRec.onstop = () => {
      const blob = new Blob(chunks, {type:'video/webm'});
      const thumb = canvas.toDataURL('image/jpeg', 0.5);
      const reader = new FileReader();
      reader.onloadend = () => { saveItem({ type:'video', thumb, main: reader.result }); msg('VIDEO SAVED'); };
      reader.readAsDataURL(blob);
    };
    mediaRec.start();
    drawInt = setInterval(() => grab(mainVid, facing==='front', 0, true), 1000/30);
  }

  function stopRec() { 
    isRec=false; clearInterval(recInt); clearInterval(drawInt); 
    document.getElementById('shutter').classList.remove('recording'); 
    document.getElementById('recUI').classList.remove('active'); 
    mediaRec.stop(); 
  }

  // Improved Grab Logic for 100% Aspect Match
  function grab(vidObj, isMirror, q, drawOnly=false) {
    const ctx = canvas.getContext('2d');
    const vW = vidObj.videoWidth;
    const vH = vidObj.videoHeight;
    if(!vW || !vH) return null;

    let outW, outH;
    if (currentMode === 'VIDEO') { outW = 1280; outH = 720; } 
    else {
        if (ratioMode === '1:1') { outW = 1080; outH = 1080; }
        else if (ratioMode === '3:4') { outW = 1080; outH = 1440; }
        else { outW = 1080; outH = 1920; }
    }
    
    canvas.width = outW; canvas.height = outH;
    
    const vAspect = vW / vH;
    const tAspect = outW / outH;
    let sW, sH, sX, sY;

    if (vAspect > tAspect) {
        sH = vH; sW = vH * tAspect; sX = (vW - sW) / 2; sY = 0;
    } else {
        sW = vW; sH = vW / tAspect; sX = 0; sY = (vH - sH) / 2;
    }

    ctx.save();
    if(isMirror) { ctx.translate(outW, 0); ctx.scale(-1, 1); }
    ctx.drawImage(vidObj, sX, sY, sW, sH, 0, 0, outW, outH);
    ctx.restore();

    return drawOnly ? null : canvas.toDataURL('image/jpeg', q);
  }

  function saveItem(item) {
    item.id = Date.now();
    const tx = db.transaction("media", "readwrite");
    tx.objectStore("media").add(item);
    tx.oncomplete = () => loadItems();
  }

  function loadItems() {
    const tx = db.transaction("media", "readonly");
    tx.objectStore("media").getAll().onsuccess = e => {
      items = e.target.result.sort((a,b)=>b.id-a.id);
      if(items.length>0) { thumbImg.src = items[0].thumb; thumbImg.style.display='block'; }
      renderGrid();
    };
  }

  window.openLib = () => { document.getElementById('libraryScreen').classList.add('active'); renderGrid(); };
  window.closeLib = () => document.getElementById('libraryScreen').classList.remove('active');

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    if(!grid) return;
    grid.innerHTML = '';
    items.forEach((it, i) => {
      const div = document.createElement('div');
      div.className = 'gItem';
      div.innerHTML = `<img src="${it.thumb}">${it.sub?'<div style="position:absolute; top:5px; left:5px; width:20%; border:1px solid #fff; border-radius:3px; overflow:hidden;"><img src="'+it.sub+'"></div>':''}`;
      div.onclick = () => openViewer(i);
      grid.appendChild(div);
    });
  }

  let vIdx=0;
  window.openViewer = i => { vIdx=i; document.getElementById('photoViewer').classList.add('active'); updateViewer(); };
  function updateViewer() {
    const it = items[vIdx], img=document.getElementById('pvMainImg'), sub=document.getElementById('pvSubImg'), vid=document.getElementById('pvMainVid');
    if(it.type==='video') { 
        img.style.display='none'; sub.style.display='none'; vid.style.display='block'; 
        vid.src=it.main; vid.play(); 
    } else { 
        vid.style.display='none'; img.style.display='block'; img.src=it.main; 
        if(it.sub) { sub.style.display='block'; sub.src=it.sub; } else { sub.style.display='none'; }
    }
  }
  window.closeViewer = () => { document.getElementById('photoViewer').classList.remove('active'); document.getElementById('pvMainVid').pause(); };
  window.deleteItem = () => {
    const tx = db.transaction("media", "readwrite");
    tx.objectStore("media").delete(items[vIdx].id);
    tx.oncomplete = () => { loadItems(); closeViewer(); };
  };
  window.flipCam = () => { facing=facing==='back'?'front':'back'; startCam(); };
  function msg(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
  
  window.addEventListener('resize', updateVFRatio);
})();
</script>
</body>
</html>
