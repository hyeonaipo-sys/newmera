<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; object-src 'none';">
<title>Newmera Pro</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-yellow: #ffd60a;
  --ios-red: #ff3b30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff; }

.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* CAMERA VIEWPORT */
#vf { position: relative; flex: 1; background: #111; overflow: hidden; border-radius: 0 0 40px 40px; }
#mainVid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
#mainVid.mirror { transform: scaleX(-1); }

/* Cinematic Guide Line (Only for Video Mode) */
#guide { position: absolute; top: 50%; left: 0; width: 100%; height: 56.25vw; transform: translateY(-50%); border: 1.5px solid rgba(255,255,255,0.4); pointer-events: none; z-index: 50; display: none; }
#guide.active { display: block; }

#topbar { position: absolute; top: max(env(safe-area-inset-top), 20px); left: 0; right: 0; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.tbtn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); color: #fff; font-size: 20px; }
#bothBtn { width: auto; padding: 0 16px; border-radius: 22px; font-weight: 800; font-size: 13px; letter-spacing: 0.5px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.2); }
#bothBtn.on { background: var(--ios-blue); border-color: var(--ios-blue); }

/* BOTTOM UI */
#cameraBottom { background: #000; padding: 10px 0 calc(env(safe-area-inset-bottom) + 10px); flex-shrink: 0; }
#modesContainer { overflow: hidden; margin-bottom: 15px; }
#modes { display: flex; justify-content: center; gap: 30px; transition: 0.3s; }
.mode { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.8px; cursor: pointer; transition: 0.2s; }
.mode.active { color: var(--ios-yellow); }

#shutterRow { display: flex; align-items: center; justify-content: space-between; padding: 0 35px; }
#thumb { width: 54px; height: 54px; border-radius: 12px; border: 2.5px solid #fff; background: #1a1a1a; overflow: hidden; }
#thumb img { width: 100%; height: 100%; object-fit: cover; display: none; }
#shutter { width: 76px; height: 76px; border-radius: 50%; border: 4.5px solid #fff; display: flex; align-items: center; justify-content: center; }
#shutterInner { width: 60px; height: 60px; border-radius: 50%; background: #fff; transition: 0.1s; }
#shutter.recording #shutterInner { background: var(--ios-red); border-radius: 8px; transform: scale(0.6); }
#flipBtn { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 26px; }

/* LIBRARY GRID */
#libraryScreen { z-index: 200; display: none; flex-direction: column; background: #000; }
#libraryScreen.active { display: flex; }
#libHeader { padding: max(env(safe-area-inset-top), 40px) 20px 10px; flex-shrink: 0; }
#libTitleRow { display: flex; justify-content: space-between; align-items: center; }
#libTitle { font-size: 34px; font-weight: 800; }
#libCount { font-size: 16px; color: #8e8e93; margin-top: 5px; }
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px 2px 100px; }
.gItem { aspect-ratio: 1; background: #1c1c1e; position: relative; overflow: hidden; }
.gItem img { width: 100%; height: 100%; object-fit: cover; }
.video-badge { position: absolute; bottom: 5px; right: 5px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; }

#backToCam { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 28px; border-radius: 30px; font-weight: 800; z-index: 250; }

/* PHOTO VIEWER */
#photoViewer { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 300; }
#photoViewer.show { display: flex; }
#pvHeader { padding: max(env(safe-area-inset-top), 20px) 20px; display: flex; justify-content: space-between; }
#pvContainer { flex: 1; display: flex; align-items: center; justify-content: center; }
#pvMainImg, #pvMainVid { max-width: 100%; max-height: 100%; }

#toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 1000; opacity: 0; transition: 0.3s; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="screen active" id="cameraScreen">
  <div id="vf">
    <video id="mainVid" autoplay playsinline muted></video>
    <div id="guide"></div>
    <div id="topbar">
      <div class="tbtn">⚡</div>
      <div class="tbtn" id="bothBtn" onclick="toggleBoth()">Both</div>
    </div>
  </div>
  <div id="cameraBottom">
    <div id="modesContainer">
      <div id="modes">
        <div class="mode active" id="modePhoto" onclick="setMode('PHOTO')">PHOTO</div>
        <div class="mode" id="modeVideo" onclick="setMode('VIDEO')">VIDEO</div>
      </div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLibrary()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleAction()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCamera()">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header id="libHeader">
    <div id="libTitleRow"><h1 id="libTitle">Library</h1></div>
    <div id="libCount">0 Items</div>
  </header>
  <div id="galleryGrid"></div>
  <button id="backToCam" onclick="closeLibrary()">카메라로 돌아가기</button>
</div>

<div id="photoViewer">
  <div id="pvHeader">
    <button onclick="closeViewer()" style="background:none;border:none;color:var(--ios-blue);font-size:18px;font-weight:700">Done</button>
    <button onclick="deleteCurrent()" style="background:none;border:none;color:var(--ios-red);font-size:18px">🗑️</button>
  </div>
  <div id="pvContainer" ontouchstart="handleViewerTouch(event)">
    <img id="pvMainImg" style="display:none">
    <video id="pvMainVid" controls style="display:none"></video>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, facing='back', bothMode=false, currentMode='PHOTO', photos=[];
  let viewerIdx=0, isSwapped=false, lastTap=0;
  let mediaRecorder=null, recordedChunks=[], isRecording=false;

  const mainVid = document.getElementById('mainVid');
  const canvas = document.getElementById('canvas');

  window.onload = () => {
    photos = JSON.parse(localStorage.getItem('newmera_v_pro') || '[]');
    startCamera();
    updateThumb();
  };

  async function startCamera() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      const constraints = { 
        video: { facingMode: facing==='back'?'environment':'user', width: { ideal: 3840 }, height: { ideal: 2160 } }
      };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      mainVid.srcObject = stream;
      mainVid.className = facing==='front'?'mirror':'';
    } catch(e) { showToast('카메라를 시작할 수 없어.'); }
  }

  window.setMode = function(m) {
    if(isRecording) return;
    currentMode = m;
    document.querySelectorAll('.mode').forEach(el => el.classList.remove('active'));
    document.getElementById('mode' + m.charAt(0) + m.slice(1).toLowerCase()).classList.add('active');
    document.getElementById('guide').classList.toggle('active', m === 'VIDEO');
    showToast(m + ' 모드');
  }

  window.handleAction = function() {
    if(currentMode === 'PHOTO') takePhoto();
    else handleVideo();
  }

  function takePhoto() {
    if(bothMode) {
      const f1 = grabCinematic(false);
      facing = (facing==='back')?'front':'back';
      startCamera();
      showToast('📸 Switching...');
      setTimeout(() => {
        saveItem({ type:'photo', main: f1, sub: grabCinematic(false), isBoth: true });
        showToast('📸 Both 사진 저장!');
      }, 1200);
    } else {
      saveItem({ type:'photo', main: grabCinematic(false), isBoth: false });
      showToast('📸 사진 저장!');
    }
  }

  function handleVideo() {
    if(!isRecording) {
      startRecording();
    } else {
      stopRecording();
    }
  }

  async function startRecording() {
    isRecording = true;
    recordedChunks = [];
    document.getElementById('shutter').classList.add('recording');
    
    // 가로 영상 캡처용 캔버스 스트림 생성
    const canvasStream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp8' });
    
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        saveItem({ type:'video', data: reader.result });
        showToast('🎥 가로 영상 저장 완료!');
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start();
    requestAnimationFrame(drawVideoFrame);
  }

  function stopRecording() {
    isRecording = false;
    document.getElementById('shutter').classList.remove('recording');
    mediaRecorder.stop();
  }

  function drawVideoFrame() {
    if(!isRecording) return;
    grabCinematic(true); // 캔버스에 그리기만 함
    requestAnimationFrame(drawVideoFrame);
  }

  // 가로 16:9 크롭 캡처 (가로 영상 모드의 핵심)
  function grabCinematic(drawOnly) {
    const vw = mainVid.videoWidth, vh = mainVid.videoHeight;
    const targetAspect = 16/9;
    let dW, dH;
    if (vw / vh > targetAspect) { dH = vh; dW = vh * targetAspect; }
    else { dW = vw; dH = vw / targetAspect; }

    canvas.width = dW; canvas.height = dH;
    const ctx = canvas.getContext('2d', { alpha: false });
    if(facing==='front') { ctx.translate(dW, 0); ctx.scale(-1, 1); }
    ctx.drawImage(mainVid, (vw - dW)/2, (vh - dH)/2, dW, dH, 0, 0, dW, dH);
    
    return drawOnly ? null : canvas.toDataURL('image/jpeg', 0.92);
  }

  function saveItem(item) {
    photos.unshift({ id: Date.now(), ...item });
    localStorage.setItem('newmera_v_pro', JSON.stringify(photos));
    updateThumb();
  }

  function updateThumb() {
    const thumb = document.getElementById('thumbImg');
    if(photos.length>0) {
      const p = photos[0];
      if(p.type==='video') thumb.src = p.data; // 영상은 첫 프레임 데이터 (실제론 썸네일 처리 필요하지만 간소화)
      else compose(p, false, url => thumb.src = url);
      thumb.style.display='block';
    } else thumb.style.display='none';
  }

  window.openLibrary = function() {
    document.getElementById('libraryScreen').classList.add('active');
    renderGrid();
  }

  window.closeLibrary = function() { document.getElementById('libraryScreen').classList.remove('active'); updateThumb(); }

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    document.getElementById('libCount').textContent = photos.length + ' Items';
    
    photos.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'gItem';
      const img = document.createElement('img');
      if(p.type === 'video') {
        img.src = p.data;
        const badge = document.createElement('div');
        badge.className = 'video-badge'; badge.textContent = 'VIDEO';
        div.appendChild(badge);
      } else {
        compose(p, false, url => img.src = url);
      }
      div.onclick = () => openViewer(i);
      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function compose(p, swapped, cb) {
    if(!p.isBoth) { cb(p.main); return; }
    const m=new Image(), s=new Image();
    m.onload=()=>{ s.onload=()=>{
      canvas.width=m.width; canvas.height=m.height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(swapped?s:m, 0, 0);
      const sub = swapped?m:s;
      const pw=canvas.width*0.3, ph=pw*(9/16), marg=canvas.width*0.03;
      ctx.save(); ctx.beginPath(); ctx.roundRect(canvas.width-pw-marg, marg, pw, ph, 15); ctx.clip();
      ctx.drawImage(sub, canvas.width-pw-marg, marg, pw, ph); ctx.restore();
      ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
      cb(canvas.toDataURL('image/jpeg', 0.85));
    }; s.src=p.sub; }; m.src=p.main;
  }

  window.openViewer = function(idx) {
    viewerIdx = idx; const p = photos[idx];
    document.getElementById('photoViewer').classList.add('show');
    const imgEl = document.getElementById('pvMainImg');
    const vidEl = document.getElementById('pvMainVid');
    if(p.type === 'video') {
      imgEl.style.display='none'; vidEl.style.display='block'; vidEl.src = p.data;
    } else {
      vidEl.style.display='none'; imgEl.style.display='block'; updateViewer();
    }
  }

  function updateViewer() { 
    compose(photos[viewerIdx], isSwapped, url => document.getElementById('pvMainImg').src = url); 
  }

  window.handleViewerTouch = function() {
    const now = Date.now();
    if(now - lastTap < 300 && photos[viewerIdx].isBoth) { isSwapped = !isSwapped; updateViewer(); }
    lastTap = now;
  }

  window.closeViewer = function() { document.getElementById('photoViewer').classList.remove('show'); document.getElementById('pvMainVid').pause(); }
  window.deleteCurrent = function() { if(confirm('삭제할까?')) { photos.splice(viewerIdx,1); localStorage.setItem('newmera_v_pro',JSON.stringify(photos)); closeViewer(); renderGrid(); } }
  window.toggleBoth = function() { bothMode=!bothMode; document.getElementById('bothBtn').classList.toggle('on', bothMode); }
  window.flipCamera = function() { facing=(facing==='back')?'front':'back'; startCamera(); }
  function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
})();
</script>
</body>
</html>
