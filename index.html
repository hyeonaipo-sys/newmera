<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Newmera</title>

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --yellow:#ffd60a;
  --white:rgba(255,255,255,.96);
  --dim:rgba(255,255,255,.52);
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
button{
  border:none;
  outline:none;
  background:none;
  color:inherit;
  font:inherit;
}
.screen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  background:#000;
}
.screen.active{
  display:flex;
}

/* CAMERA */
#camScreen{
  overflow:hidden;
}
#topBar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:30;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:max(var(--safe-top), 8px) 20px 0;
  pointer-events:none;
}
.topBtn{
  pointer-events:auto;
  min-width:58px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--white);
  font-size:13px;
  font-weight:500;
  letter-spacing:.2px;
  opacity:.95;
}
.topBtn.active{
  color:var(--yellow);
}
#ratioWrap{
  position:relative;
}
#ratioMenu{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  flex-direction:column;
  overflow:hidden;
  border-radius:12px;
  background:rgba(28,28,30,.96);
  border:1px solid rgba(255,255,255,.08);
  min-width:82px;
}
#ratioMenu.show{
  display:flex;
}
.ratioOpt{
  padding:11px 12px;
  text-align:center;
  font-size:13px;
  font-weight:700;
  color:#fff;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.ratioOpt:last-child{
  border-bottom:none;
}
.ratioOpt.selected{
  color:var(--yellow);
}

#vfWrap{
  flex:1;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:54px 18px 0;
}
#vf{
  position:relative;
  width:100%;
  max-width:430px;
  aspect-ratio:3/4;
  overflow:hidden;
  border-radius:34px;
  background:#111;
}
#mainVid{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#111;
  pointer-events:none;
}
#mainVid::-webkit-media-controls,
#mainVid::-webkit-media-controls-panel,
#mainVid::-webkit-media-controls-play-button,
#mainVid::-webkit-media-controls-start-playback-button{
  display:none !important;
  -webkit-appearance:none;
}
#touchShield{
  position:absolute;
  inset:0;
  z-index:5;
  background:transparent;
  touch-action:none;
}
#centerOverlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:15;
}
#countdownBubble{
  width:104px;
  height:104px;
  border-radius:50%;
  background:rgba(72,72,72,.7);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
  font-size:44px;
  font-weight:900;
  color:#fff;
}
#screenFlash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:200;
}

#bottomUI{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  z-index:30;
  background:linear-gradient(to top,#000 72%,rgba(0,0,0,0));
  padding:24px 18px max(var(--safe-bottom), 26px);
}
#modeRail{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:34px;
  margin-bottom:22px;
  overflow:hidden;
}
.mode{
  font-size:17px;
  font-weight:300;
  color:rgba(255,255,255,.85);
  letter-spacing:1px;
  white-space:nowrap;
}
.mode.inactive{
  color:rgba(255,255,255,.36);
}
.mode.active{
  color:var(--yellow);
  font-weight:400;
}
#controlsRow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}
.sideCtl{
  display:flex;
  align-items:center;
}
.sideCtl.left{ justify-content:flex-start; }
.sideCtl.right{ justify-content:flex-end; }

#thumbBtn{
  width:54px;
  height:54px;
  border-radius:12px;
  overflow:hidden;
  background:#111;
  border:1px solid rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
}
#thumbBtn img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
#thumbPlaceholder{
  font-size:24px;
}
#flipBtn{
  width:54px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  line-height:1;
}

#shutter{
  width:92px;
  height:92px;
  border-radius:50%;
  border:5px solid #fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
#shutterInner{
  width:72px;
  height:72px;
  border-radius:50%;
  background:#fff;
}
#shutter:active{
  transform:scale(.97);
}

/* GALLERY */
#galleryScreen{
  z-index:60;
}
#galleryHeader{
  padding:max(var(--safe-top), 10px) 14px 12px;
  background:#000;
}
#galleryClose{
  width:100%;
  height:40px;
  border-radius:20px;
  background:#e9e9eb;
  color:#111;
  font-size:16px;
  font-weight:700;
}
#galleryGrid{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  background:#000;
}
.gItem{
  position:relative;
  aspect-ratio:1;
  background:#111;
  overflow:hidden;
}
.gItem>img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.gPip{
  position:absolute;
  top:6px;
  left:6px;
  width:30%;
  aspect-ratio:3/4;
  border-radius:7px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.9);
}
.gPip img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;
  z-index:80;
  background:#000;
  display:none;
  flex-direction:column;
}
#viewer.active{
  display:flex;
}
#viewerHeader{
  padding:max(var(--safe-top), 10px) 16px 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.viewerBtn{
  color:#fff;
  font-size:17px;
  font-weight:700;
}
#viewerBody{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
#viewerBox{
  position:relative;
  width:100%;
  max-width:430px;
  aspect-ratio:3/4;
  border-radius:26px;
  overflow:hidden;
  background:#111;
}
#viewerMain{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
#viewerSubWrap{
  position:absolute;
  top:12px;
  left:12px;
  width:30%;
  aspect-ratio:3/4;
  border-radius:12px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.95);
  background:#111;
}
#viewerSub{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* TOAST */
#toast{
  position:fixed;
  top:88px;
  left:50%;
  transform:translateX(-50%);
  z-index:150;
  background:#fff;
  color:#111;
  padding:11px 20px;
  border-radius:999px;
  font-size:14px;
  font-weight:800;
  opacity:0;
  transition:.25s;
  pointer-events:none;
  white-space:nowrap;
}
#toast.show{
  opacity:1;
}
</style>
</head>
<body>

<div class="screen active" id="camScreen">
  <div id="topBar">
    <button class="topBtn" id="flashBtn" type="button">⚡ OFF</button>

    <div id="ratioWrap">
      <button class="topBtn" id="ratioBtn" type="button">3:4</button>
      <div id="ratioMenu">
        <button class="ratioOpt" type="button" data-ratio="1:1">1:1</button>
        <button class="ratioOpt selected" type="button" data-ratio="3:4">3:4</button>
        <button class="ratioOpt" type="button" data-ratio="9:16">9:16</button>
      </div>
    </div>

    <button class="topBtn" id="bothBtn" type="button">BOTH OFF</button>
  </div>

  <div id="vfWrap">
    <div id="vf">
      <video
        id="mainVid"
        autoplay
        playsinline
        webkit-playsinline
        muted
        preload="none"
        disablepictureinpicture
        disableremoteplayback
        x-webkit-airplay="deny"
        controlslist="nodownload nofullscreen noremoteplayback"
      ></video>

      <div id="touchShield"></div>

      <div id="centerOverlay">
        <div id="countdownBubble"></div>
      </div>
    </div>
  </div>

  <div id="bottomUI">
    <div id="modeRail">
      <div class="mode inactive">SLO-MO</div>
      <div class="mode inactive" id="videoMode">VIDEO</div>
      <div class="mode active" id="photoMode">PHOTO</div>
      <div class="mode inactive">SQUARE</div>
      <div class="mode inactive">PANO</div>
    </div>

    <div id="controlsRow">
      <div class="sideCtl left">
        <button id="thumbBtn" type="button" aria-label="gallery">
          <img id="thumbImg" alt="thumbnail">
          <div id="thumbPlaceholder">🖼️</div>
        </button>
      </div>

      <button id="shutter" type="button" aria-label="shutter">
        <div id="shutterInner"></div>
      </button>

      <div class="sideCtl right">
        <button id="flipBtn" type="button" aria-label="flip">🔄</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="galleryScreen">
  <div id="galleryHeader">
    <button id="galleryClose" type="button">닫기</button>
  </div>
  <div id="galleryGrid"></div>
</div>

<div id="viewer">
  <div id="viewerHeader">
    <button class="viewerBtn" id="viewerDone" type="button">Done</button>
    <button class="viewerBtn" id="viewerDelete" type="button">Delete</button>
  </div>
  <div id="viewerBody">
    <div id="viewerBox">
      <img id="viewerMain" alt="photo">
      <div id="viewerSubWrap" style="display:none;">
        <img id="viewerSub" alt="sub photo">
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="screenFlash"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(() => {
  let stream = null;
  let facing = 'back';
  let bothMode = false;
  let mode = 'photo';
  let db = null;
  let items = [];
  let isProcessing = false;
  let currentRatio = '3:4';
  let viewerIndex = -1;
  let flashMode = 'off'; // off, on

  const camScreen = document.getElementById('camScreen');
  const galleryScreen = document.getElementById('galleryScreen');
  const mainVid = document.getElementById('mainVid');
  const vf = document.getElementById('vf');
  const ratioBtn = document.getElementById('ratioBtn');
  const ratioMenu = document.getElementById('ratioMenu');
  const bothBtn = document.getElementById('bothBtn');
  const flashBtn = document.getElementById('flashBtn');
  const shutter = document.getElementById('shutter');
  const thumbBtn = document.getElementById('thumbBtn');
  const thumbImg = document.getElementById('thumbImg');
  const thumbPlaceholder = document.getElementById('thumbPlaceholder');
  const flipBtn = document.getElementById('flipBtn');
  const galleryClose = document.getElementById('galleryClose');
  const galleryGrid = document.getElementById('galleryGrid');
  const canvas = document.getElementById('canvas');
  const toast = document.getElementById('toast');
  const countdownBubble = document.getElementById('countdownBubble');
  const touchShield = document.getElementById('touchShield');
  const videoMode = document.getElementById('videoMode');
  const photoMode = document.getElementById('photoMode');
  const screenFlash = document.getElementById('screenFlash');

  const viewer = document.getElementById('viewer');
  const viewerMain = document.getElementById('viewerMain');
  const viewerSub = document.getElementById('viewerSub');
  const viewerSubWrap = document.getElementById('viewerSubWrap');
  const viewerDone = document.getElementById('viewerDone');
  const viewerDelete = document.getElementById('viewerDelete');
  const viewerBox = document.getElementById('viewerBox');

  mainVid.controls = false;
  mainVid.removeAttribute('controls');

  ['touchstart','touchend','click'].forEach(type => {
    touchShield.addEventListener(type, (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive:false });
  });

  const req = indexedDB.open('newmera_local_db_v5', 1);

  req.onupgradeneeded = (e) => {
    db = e.target.result;
    if (!db.objectStoreNames.contains('photos')) {
      db.createObjectStore('photos', { keyPath: 'id' });
    }
  };

  req.onsuccess = (e) => {
    db = e.target.result;
    loadItems();
    startCam();
  };

  req.onerror = () => showToast('DB ERROR');

  async function startCam() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());

      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: facing === 'back' ? 'environment' : 'user',
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });

      mainVid.srcObject = stream;
      mainVid.setAttribute('playsinline', 'true');
      mainVid.setAttribute('webkit-playsinline', 'true');
      mainVid.muted = true;
      mainVid.playsInline = true;
      mainVid.disablePictureInPicture = true;
      mainVid.style.transform = facing === 'front' ? 'scaleX(-1)' : 'scaleX(1)';

      await applyTorchIfNeeded();

      const p = mainVid.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    } catch (err) {
      showToast('CAMERA ERROR');
    }
  }

  function getAspectValue(ratio) {
    if (ratio === '1:1') return '1 / 1';
    if (ratio === '9:16') return '9 / 16';
    return '3 / 4';
  }

  function setRatio(ratio) {
    currentRatio = ratio;
    ratioBtn.textContent = ratio;
    ratioMenu.classList.remove('show');
    vf.style.aspectRatio = getAspectValue(ratio);

    document.querySelectorAll('.ratioOpt').forEach(el => {
      el.classList.toggle('selected', el.dataset.ratio === ratio);
    });
  }

  function showToast(text, duration = 1100) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), duration);
  }

  function showCenterText(text) {
    countdownBubble.textContent = text;
    countdownBubble.style.display = 'flex';
  }

  function hideCenterText() {
    countdownBubble.style.display = 'none';
  }

  async function applyTorchIfNeeded() {
    try {
      if (!stream) return false;
      const track = stream.getVideoTracks()[0];
      if (!track) return false;

      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (!caps.torch || facing !== 'back') return false;

      await track.applyConstraints({
        advanced: [{ torch: flashMode === 'on' }]
      });
      return true;
    } catch {
      return false;
    }
  }

  async function triggerFlashEffect() {
    let usedTorch = false;

    if (flashMode === 'on' && facing === 'back') {
      usedTorch = await applyTorchIfNeeded();
    }

    if (!usedTorch && flashMode === 'on') {
      screenFlash.style.opacity = '1';
      setTimeout(() => {
        screenFlash.style.opacity = '0';
      }, 120);
    }
  }

  function updateFlashUI() {
    flashBtn.textContent = flashMode === 'on' ? '⚡ ON' : '⚡ OFF';
    flashBtn.classList.toggle('active', flashMode === 'on');
  }

  function grab() {
    const ctx = canvas.getContext('2d');

    if (currentRatio === '1:1') {
      canvas.width = 1080;
      canvas.height = 1080;
    } else if (currentRatio === '9:16') {
      canvas.width = 1080;
      canvas.height = 1920;
    } else {
      canvas.width = 1080;
      canvas.height = 1440;
    }

    const vW = mainVid.videoWidth || 1080;
    const vH = mainVid.videoHeight || 1440;
    const vAspect = vW / vH;
    const tAspect = canvas.width / canvas.height;

    let sW, sH, sX, sY;
    if (vAspect > tAspect) {
      sH = vH;
      sW = vH * tAspect;
      sX = (vW - sW) / 2;
      sY = 0;
    } else {
      sW = vW;
      sH = vW / tAspect;
      sX = 0;
      sY = (vH - sH) / 2;
    }

    ctx.save();

    if (facing === 'front') {
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
    }

    ctx.drawImage(mainVid, sX, sY, sW, sH, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    return canvas.toDataURL('image/jpeg', 0.82);
  }

  function saveItem(item) {
    item.id = Date.now() + Math.floor(Math.random() * 1000);

    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').add(item);
    tx.oncomplete = loadItems;
    tx.onerror = () => showToast('SAVE ERROR');
  }

  function loadItems() {
    if (!db) return;
    const tx = db.transaction('photos', 'readonly');
    tx.objectStore('photos').getAll().onsuccess = (e) => {
      items = e.target.result.sort((a, b) => b.id - a.id);
      renderThumb();
      renderGallery();
    };
  }

  function renderThumb() {
    if (items.length > 0 && items[0].main) {
      thumbImg.src = items[0].main;
      thumbImg.style.display = 'block';
      thumbPlaceholder.style.display = 'none';
    } else {
      thumbImg.removeAttribute('src');
      thumbImg.style.display = 'none';
      thumbPlaceholder.style.display = 'block';
    }
  }

  function renderGallery() {
    galleryGrid.innerHTML = '';

    items.forEach((item, index) => {
      const div = document.createElement('button');
      div.className = 'gItem';
      div.type = 'button';

      const main = document.createElement('img');
      main.src = item.main;
      div.appendChild(main);

      if (item.sub) {
        const pip = document.createElement('div');
        pip.className = 'gPip';
        const sub = document.createElement('img');
        sub.src = item.sub;
        pip.appendChild(sub);
        div.appendChild(pip);
      }

      div.addEventListener('click', () => openViewer(index));
      galleryGrid.appendChild(div);
    });
  }

  function openGallery() {
    camScreen.classList.remove('active');
    galleryScreen.classList.add('active');
  }

  function closeGallery() {
    galleryScreen.classList.remove('active');
    camScreen.classList.add('active');
  }

  function openViewer(index) {
    viewerIndex = index;
    const item = items[index];
    if (!item) return;

    viewerMain.src = item.main;
    viewerBox.style.aspectRatio = getAspectValue(item.ratio || '3:4');

    if (item.sub) {
      viewerSub.src = item.sub;
      viewerSubWrap.style.display = 'block';
    } else {
      viewerSubWrap.style.display = 'none';
      viewerSub.removeAttribute('src');
    }

    viewer.classList.add('active');
  }

  function closeViewer() {
    viewer.classList.remove('active');
  }

  function deleteViewerItem() {
    const item = items[viewerIndex];
    if (!item) return;

    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').delete(item.id);
    tx.oncomplete = () => {
      closeViewer();
      loadItems();
      showToast('DELETED');
    };
  }

  function setMode(nextMode) {
    mode = nextMode;
    videoMode.classList.toggle('active', mode === 'video');
    videoMode.classList.toggle('inactive', mode !== 'video');
    photoMode.classList.toggle('active', mode === 'photo');
    photoMode.classList.toggle('inactive', mode !== 'photo');
    showToast(mode === 'video' ? 'VIDEO' : 'PHOTO', 650);
  }

  async function handleBothShot() {
    await triggerFlashEffect();
    const first = grab();

    showToast('CHANGE');
    facing = facing === 'back' ? 'front' : 'back';
    await startCam();

    let count = 3;
    showCenterText(count);

    await new Promise(resolve => {
      const timer = setInterval(() => {
        count -= 1;
        if (count > 0) showCenterText(count);
        else {
          clearInterval(timer);
          hideCenterText();
          resolve();
        }
      }, 1000);
    });

    await triggerFlashEffect();
    const second = grab();

    saveItem({
      type: 'photo',
      main: first,
      sub: second,
      ratio: currentRatio
    });

    showToast('DONE ✓', 1400);
  }

  async function handlePhotoShot() {
    if (isProcessing || mode !== 'photo') return;
    isProcessing = true;

    if (bothMode) {
      await handleBothShot();
    } else {
      await triggerFlashEffect();
      const shot = grab();
      saveItem({
        type: 'photo',
        main: shot,
        ratio: currentRatio
      });
      showToast('DONE ✓', 1400);
    }

    setTimeout(() => {
      isProcessing = false;
    }, 300);
  }

  flashBtn.addEventListener('click', async () => {
    flashMode = flashMode === 'off' ? 'on' : 'off';
    updateFlashUI();
    await applyTorchIfNeeded();
    if (flashMode === 'on' && facing !== 'back') {
      showToast('SCREEN FLASH');
    }
  });

  ratioBtn.addEventListener('click', () => {
    ratioMenu.classList.toggle('show');
  });

  document.querySelectorAll('.ratioOpt').forEach(btn => {
    btn.addEventListener('click', () => setRatio(btn.dataset.ratio));
  });

  bothBtn.addEventListener('click', () => {
    bothMode = !bothMode;
    bothBtn.textContent = bothMode ? 'BOTH ON' : 'BOTH OFF';
    bothBtn.classList.toggle('active', bothMode);
  });

  shutter.addEventListener('click', handlePhotoShot);
  thumbBtn.addEventListener('click', openGallery);
  galleryClose.addEventListener('click', closeGallery);

  flipBtn.addEventListener('click', async () => {
    facing = facing === 'back' ? 'front' : 'back';
    await startCam();
    if (flashMode === 'on' && facing === 'front') {
      showToast('SCREEN FLASH');
    }
  });

  viewerDone.addEventListener('click', closeViewer);
  viewerDelete.addEventListener('click', deleteViewerItem);

  document.addEventListener('click', (e) => {
    const insideRatio = ratioBtn.contains(e.target) || ratioMenu.contains(e.target);
    if (!insideRatio) ratioMenu.classList.remove('show');
  });

  let touchStartX = 0;
  let touchStartY = 0;

  camScreen.addEventListener('touchstart', (e) => {
    if (viewer.classList.contains('active') || galleryScreen.classList.contains('active')) return;
    const t = e.changedTouches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  camScreen.addEventListener('touchend', (e) => {
    if (viewer.classList.contains('active') || galleryScreen.classList.contains('active')) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;

    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) setMode('video');
      else setMode('photo');
    }
  }, { passive: true });

  updateFlashUI();
  setRatio('3:4');
})();
</script>
</body>
</html>
