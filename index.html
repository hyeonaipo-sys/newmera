<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; object-src 'none';">
<title>Newmera Swipe Ultra</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-yellow: #ffd60a;
  --ios-red: #ff3b30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff; }

.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* CAMERA VIEWPORT */
#vf { position: relative; flex: 1; background: #111; overflow: hidden; border-radius: 0 0 40px 40px; touch-action: none; }
#mainVid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
#mainVid.mirror { transform: scaleX(-1); }

/* Cinematic Guide Line */
#guide { position: absolute; top: 50%; left: 0; width: 100%; height: 56.25vw; transform: translateY(-50%); border: 1.5px solid rgba(255,255,255,0.4); pointer-events: none; z-index: 50; display: none; }
#guide.active { display: block; }

#topbar { position: absolute; top: max(env(safe-area-inset-top), 20px); left: 0; right: 0; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none; }
.tbtn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); color: #fff; font-size: 20px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
#bothBtn { width: auto; padding: 0 16px; border-radius: 22px; font-weight: 800; font-size: 13px; transition: 0.2s; }
#bothBtn.on { background: var(--ios-blue); }

/* BOTTOM UI & SWIPE MODES */
#cameraBottom { background: #000; padding: 10px 0 calc(env(safe-area-inset-bottom) + 10px); flex-shrink: 0; z-index: 150; }
#modesWrapper { position: relative; width: 100%; height: 40px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#modesTrack { display: flex; position: absolute; gap: 40px; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform; }
.mode { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; transition: 0.3s; white-space: nowrap; cursor: pointer; padding: 10px; }
.mode.active { color: var(--ios-yellow); transform: scale(1.15); }

#shutterRow { display: flex; align-items: center; justify-content: space-between; padding: 0 35px; }
#thumb { width: 54px; height: 54px; border-radius: 12px; border: 2px solid #fff; background: #1a1a1a; overflow: hidden; }
#thumb img { width: 100%; height: 100%; object-fit: cover; display: none; }
#shutter { width: 76px; height: 76px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
#shutterInner { width: 60px; height: 60px; border-radius: 50%; background: #fff; transition: 0.2s; }
#shutter.recording #shutterInner { background: var(--ios-red); border-radius: 8px; transform: scale(0.6); }

#flipBtn { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 24px; }

/* LIBRARY GRID */
#libraryScreen { z-index: 200; display: none; flex-direction: column; background: #000; }
#libraryScreen.active { display: flex; }
#libHeader { padding: max(env(safe-area-inset-top), 40px) 20px 10px; }
#libTitle { font-size: 34px; font-weight: 800; }
#libCount { font-size: 15px; color: #8e8e93; margin-top: 4px; }
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; padding-bottom: 120px; }
.gItem { aspect-ratio: 1; background: #1c1c1e; position: relative; overflow: hidden; }
.gItem img { width: 100%; height: 100%; object-fit: cover; }
.badge { position: absolute; bottom: 4px; right: 4px; font-size: 9px; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px; }

#backToCam { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 28px; border-radius: 30px; font-weight: 800; border: none; z-index: 250; }

/* VIEWER */
#photoViewer { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 300; }
#photoViewer.show { display: flex; }
#pvHeader { padding: max(env(safe-area-inset-top), 20px) 20px; display: flex; justify-content: space-between; }
#pvContainer { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
#pvMainImg, #pvMainVid { max-width: 100%; max-height: 100%; }

#toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="screen active" id="cameraScreen">
  <div id="vf" ontouchstart="handleSwipeStart(event)" ontouchend="handleSwipeEnd(event)">
    <video id="mainVid" autoplay playsinline muted></video>
    <div id="guide"></div>
    <div id="topbar">
      <div class="tbtn">⚡</div>
      <div class="tbtn" id="bothBtn" onclick="toggleBoth()">Both</div>
    </div>
  </div>
  <div id="cameraBottom">
    <div id="modesWrapper" ontouchstart="handleSwipeStart(event)" ontouchend="handleSwipeEnd(event)">
      <div id="modesTrack">
        <div class="mode" id="m-0" onclick="setModeByIndex(0)">VIDEO</div>
        <div class="mode active" id="m-1" onclick="setModeByIndex(1)">PHOTO</div>
      </div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLibrary()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleAction()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCamera()">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header id="libHeader">
    <h1 id="libTitle">Library</h1>
    <div id="libCount">0 Items</div>
  </header>
  <div id="galleryGrid"></div>
  <button id="backToCam" onclick="closeLibrary()">카메라로 돌아가기</button>
</div>

<div id="photoViewer">
  <div id="pvHeader">
    <button onclick="closeViewer()" style="background:none;border:none;color:var(--ios-blue);font-size:17px;font-weight:700">Done</button>
    <button onclick="deleteCurrent()" style="background:none;border:none;color:var(--ios-red);font-size:17px">🗑️</button>
  </div>
  <div id="pvContainer" ontouchstart="handleViewerTouch(event)">
    <img id="pvMainImg" style="display:none">
    <video id="pvMainVid" controls style="display:none"></video>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, facing='back', bothMode=false, currentMode='PHOTO', photos=[];
  let viewerIdx=0, isSwapped=false, lastTap=0;
  let mediaRecorder=null, recordedChunks=[], isRecording=false;
  
  // Swipe State
  let startX = 0;
  let currentIdx = 1; // 0: Video, 1: Photo
  const modes = ['VIDEO', 'PHOTO'];

  const mainVid = document.getElementById('mainVid');
  const canvas = document.getElementById('canvas');
  const track = document.getElementById('modesTrack');

  window.onload = () => {
    photos = JSON.parse(localStorage.getItem('newmera_swipe_v3') || '[]');
    startCamera();
    updateThumb();
    updateModeUI();
  };

  async function startCamera() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: facing==='back'?'environment':'user', width: { ideal: 3840 }, height: { ideal: 2160 } } 
      });
      mainVid.srcObject = stream;
      mainVid.className = facing==='front'?'mirror':'';
    } catch(e) { showToast('카메라 권한을 허용해줘.'); }
  }

  // Swipe Handling
  window.handleSwipeStart = (e) => {
    startX = e.touches[0].clientX;
  };

  window.handleSwipeEnd = (e) => {
    if(isRecording) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 40) {
      if(diff > 0 && currentIdx < 1) setModeByIndex(currentIdx + 1);
      else if(diff < 0 && currentIdx > 0) setModeByIndex(currentIdx - 1);
    }
  };

  window.setModeByIndex = (idx) => {
    if(isRecording) return;
    currentIdx = idx;
    currentMode = modes[idx];
    updateModeUI();
  }

  function updateModeUI() {
    // Offset calculation for the center alignment
    const offset = currentIdx === 0 ? 48 : -48; 
    track.style.transform = `translateX(${offset}px)`;
    
    document.querySelectorAll('.mode').forEach((el, i) => {
      el.classList.toggle('active', i === currentIdx);
    });
    
    document.getElementById('guide').classList.toggle('active', currentMode === 'VIDEO');
    document.getElementById('shutterInner').style.background = currentMode === 'VIDEO' ? 'var(--ios-red)' : '#fff';
    showToast(currentMode + ' MODE');
  }

  window.handleAction = function() {
    if(currentMode === 'PHOTO') takePhoto();
    else handleVideo();
  }

  function takePhoto() {
    if(bothMode) {
      const f1 = grabCinematic(false);
      facing = (facing==='back')?'front':'back';
      startCamera();
      showToast('📸 Switching for Both...');
      setTimeout(() => {
        saveItem({ type:'photo', main: f1, sub: grabCinematic(false), isBoth: true });
        showToast('📸 Both 사진 완료!');
      }, 1200);
    } else {
      saveItem({ type:'photo', main: grabCinematic(false), isBoth: false });
      showToast('📸 사진 저장!');
    }
  }

  function handleVideo() {
    if(!isRecording) startRecording();
    else stopRecording();
  }

  async function startRecording() {
    isRecording = true;
    recordedChunks = [];
    document.getElementById('shutter').classList.add('recording');
    const canvasStream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp8' });
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        saveItem({ type:'video', data: reader.result });
        showToast('🎥 가로 영상 저장 완료!');
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    requestAnimationFrame(drawLoop);
  }

  function stopRecording() {
    isRecording = false;
    document.getElementById('shutter').classList.remove('recording');
    mediaRecorder.stop();
  }

  function drawLoop() {
    if(!isRecording) return;
    grabCinematic(true);
    requestAnimationFrame(drawLoop);
  }

  function grabCinematic(drawOnly) {
    const vw = mainVid.videoWidth, vh = mainVid.videoHeight;
    const aspect = 16/9;
    let dW, dH;
    if (vw / vh > aspect) { dH = vh; dW = vh * aspect; }
    else { dW = vw; dH = vw / aspect; }

    canvas.width = dW; canvas.height = dH;
    const ctx = canvas.getContext('2d', { alpha: false });
    if(facing==='front') { ctx.translate(dW, 0); ctx.scale(-1, 1); }
    ctx.drawImage(mainVid, (vw - dW)/2, (vh - dH)/2, dW, dH, 0, 0, dW, dH);
    return drawOnly ? null : canvas.toDataURL('image/jpeg', 0.95);
  }

  function saveItem(item) {
    photos.unshift({ id: Date.now(), ...item });
    localStorage.setItem('newmera_swipe_v3', JSON.stringify(photos));
    updateThumb();
  }

  function updateThumb() {
    const thumb = document.getElementById('thumbImg');
    if(photos.length > 0) {
      const p = photos[0];
      if(p.type === 'video') thumb.src = p.data;
      else compose(p, false, url => thumb.src = url);
      thumb.style.display = 'block';
    } else thumb.style.display = 'none';
  }

  window.openLibrary = function() {
    document.getElementById('libraryScreen').classList.add('active');
    renderGrid();
  }

  window.closeLibrary = function() { document.getElementById('libraryScreen').classList.remove('active'); updateThumb(); }

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    document.getElementById('libCount').textContent = photos.length + ' Items';
    photos.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'gItem';
      const img = document.createElement('img');
      if(p.type === 'video') {
        img.src = p.data;
        const b = document.createElement('div'); b.className = 'badge'; b.textContent = 'VIDEO';
        div.appendChild(b);
      } else { compose(p, false, url => img.src = url); }
      div.onclick = () => openViewer(i);
      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function compose(p, swapped, cb) {
    if(!p.isBoth) { cb(p.main); return; }
    const m=new Image(), s=new Image();
    m.onload=()=>{ s.onload=()=>{
      canvas.width=m.width; canvas.height=m.height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(swapped?s:m, 0, 0);
      const sub = swapped?m:s;
      const pw=canvas.width*0.3, ph=pw*(9/16), marg=canvas.width*0.03;
      ctx.save(); ctx.beginPath(); ctx.roundRect(canvas.width-pw-marg, marg, pw, ph, 15); ctx.clip();
      ctx.drawImage(sub, canvas.width-pw-marg, marg, pw, ph); ctx.restore();
      ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
      cb(canvas.toDataURL('image/jpeg', 0.9));
    }; s.src=p.sub; }; m.src=p.main;
  }

  window.openViewer = function(idx) {
    viewerIdx = idx; const p = photos[idx];
    document.getElementById('photoViewer').classList.add('show');
    const imgEl = document.getElementById('pvMainImg'), vidEl = document.getElementById('pvMainVid');
    if(p.type === 'video') {
      imgEl.style.display='none'; vidEl.style.display='block'; vidEl.src = p.data;
    } else {
      vidEl.style.display='none'; imgEl.style.display='block'; updateViewer();
    }
  }

  function updateViewer() { compose(photos[viewerIdx], isSwapped, url => document.getElementById('pvMainImg').src = url); }

  window.handleViewerTouch = function() {
    const now = Date.now();
    if(now - lastTap < 300 && photos[viewerIdx].isBoth) { isSwapped = !isSwapped; updateViewer(); }
    lastTap = now;
  }

  window.closeViewer = function() { document.getElementById('photoViewer').classList.remove('show'); document.getElementById('pvMainVid').pause(); }
  window.deleteCurrent = function() { if(confirm('삭제할까?')) { photos.splice(viewerIdx,1); localStorage.setItem('newmera_swipe_v3',JSON.stringify(photos)); closeViewer(); renderGrid(); } }
  window.toggleBoth = function() { bothMode=!bothMode; document.getElementById('bothBtn').classList.toggle('on', bothMode); }
  window.flipCamera = function() { facing=(facing==='back')?'front':'back'; startCamera(); }
  function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
})();
</script>
</body>
</html>
