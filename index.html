<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-bg: #000;
  --ios-secondary: #8e8e93;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{width:100%;height:100%;background:#000;font-family:-apple-system, system-ui, sans-serif;overflow:hidden;color:#fff}

/* Screen Management */
.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:10}
.screen.active{display:flex}

/* ══════════════════════════════
   CAMERA HOME (Original UI)
   ══════════════════════════════ */
#vf{position:relative;flex:1;background:#111;overflow:hidden}
#mainVid{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#mainVid.mirror{transform:scaleX(-1)}

#topbar{position:absolute;top:max(env(safe-area-inset-top), 20px);left:0;right:0;padding:0 20px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.tbtn{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(15px);border:0.5px solid rgba(255,255,255,0.1)}
#bothBtn.on{background:var(--ios-blue);border-color:var(--ios-blue)}

#capturePreview{position:absolute;top:80px;right:20px;width:90px;height:120px;border-radius:12px;overflow:hidden;border:2px solid #fff;display:none;z-index:150;box-shadow:0 8px 25px rgba(0,0,0,0.5)}
#capturePreview img{width:100%;height:100%;object-fit:cover}

#cameraBottom{background:#000;padding:20px 0 calc(env(safe-area-inset-bottom) + 20px);flex-shrink:0}
#modes{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.mode{font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.5px}
.mode.on{color:#ffd60a}

#shutterRow{display:flex;align-items:center;justify-content:space-between;padding:0 40px}
#thumb{width:52px;height:52px;border-radius:12px;border:2px solid #fff;background:#1a1a1a;overflow:hidden;cursor:pointer;position:relative}
#thumb img{width:100%;height:100%;object-fit:cover;display:none}
#shutter{width:76px;height:76px;border-radius:50%;border:4px solid #fff;display:flex;align-items:center;justify-content:center}
#shutterInner{width:62px;height:62px;border-radius:50%;background:#fff;transition:transform 0.1s}
#shutter:active #shutterInner{transform:scale(0.9)}
#flipBtn{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:24px}

/* ══════════════════════════════
   LIBRARY GRID (Photos App Style)
   ══════════════════════════════ */
#libraryScreen{background:#000;z-index:200}
#libHeader{padding:max(env(safe-area-inset-top), 40px) 20px 15px; flex-shrink:0}
#libTitleRow{display:flex;justify-content:space-between;align-items:center}
#libTitle{font-size:34px;font-weight:800;letter-spacing:-1.5px}
#libSelectBtn{color:var(--ios-blue);font-size:17px;font-weight:500;background:none;border:none;cursor:pointer}
#libCount{color:var(--ios-secondary);font-size:15px;margin-top:2px;font-weight:500}

#galleryGrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3, 1fr);gap:2px;padding:2px}
.gItem{aspect-ratio:1;background:#1c1c1e;position:relative;cursor:pointer}
.gItem img{width:100%;height:100%;object-fit:cover}
.gItem.selected::after{content:'✓';position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--ios-blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #fff}

/* iPhone Style Tab Bar */
#libTabBar{height:84px;background:rgba(20,20,20,0.94);backdrop-filter:blur(25px);display:flex;justify-content:space-around;padding-top:10px;border-top:0.3px solid rgba(255,255,255,0.2);padding-bottom:env(safe-area-inset-bottom)}
.tab{display:flex;flex-direction:column;align-items:center;color:var(--ios-secondary);font-size:10px;font-weight:600;gap:4px;width:25%}
.tab.active{color:var(--ios-blue)}
.tab-icon{font-size:22px}

/* ══════════════════════════════
   DETAIL VIEWER
   ══════════════════════════════ */
#photoViewer{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:300}
#photoViewer.show{display:flex}
#pvHeader{padding:max(env(safe-area-inset-top), 20px) 20px 10px; display:flex; justify-content:space-between; align-items:center; z-index:10}
#pvContainer{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
#pvMainImg{width:100%;height:100%;object-fit:contain}

/* Utilities */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);color:#000;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:1000;opacity:0;transition:0.3s;pointer-events:none}
#toast.show{opacity:1}
#countdownOverlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:none;align-items:center;justify-content:center;z-index:200}
#countdownOverlay.show{display:flex}
#countdownNum{font-size:120px;font-weight:800;text-shadow:0 4px 20px rgba(0,0,0,0.5)}

@keyframes pop{0%{transform:scale(1.4)}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- Camera Screen -->
<div class="screen active" id="cameraScreen">
  <div id="vf">
    <video id="mainVid" autoplay playsinline muted></video>
    <div id="capturePreview"><img id="capturePreviewImg"></div>
    <div id="countdownOverlay"><div id="countdownNum">3</div></div>
    <div id="topbar">
      <div class="tbtn">⚡</div>
      <div class="tbtn" id="bothBtn" onclick="toggleBoth()" style="width:auto;padding:0 14px;border-radius:20px;font-weight:800;font-size:12px;color:#fff">Both</div>
      <div style="width:40px"></div>
    </div>
  </div>
  <div id="cameraBottom">
    <div id="modes"><div class="mode on">PHOTO</div></div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLibrary()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleShutter()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCamera()">🔄</div>
    </div>
  </div>
</div>

<!-- Library Grid Screen -->
<div class="screen" id="libraryScreen">
  <header id="libHeader">
    <div id="libTitleRow">
      <h1 id="libTitle">Library</h1>
      <button id="libSelectBtn" onclick="toggleSelectMode()">Select</button>
    </div>
    <div id="libCount">0 Items</div>
  </header>
  
  <div id="galleryGrid"></div>

  <nav id="libTabBar">
    <div class="tab active">
      <span class="tab-icon">🖼️</span><span>Library</span>
    </div>
    <div class="tab"><span class="tab-icon">📂</span><span>Albums</span></div>
    <div class="tab"><span class="tab-icon">🔍</span><span>Search</span></div>
    <div class="tab" onclick="closeLibrary()"><span class="tab-icon">📷</span><span>Camera</span></div>
  </nav>
</div>

<!-- Photo Detail Viewer -->
<div id="photoViewer">
  <div id="pvHeader">
    <button onclick="closeViewer()" style="background:none;border:none;color:var(--ios-blue);font-size:18px;font-weight:500">Done</button>
    <button onclick="deleteCurrent()" style="background:none;border:none;color:#ff3b30;font-size:18px">🗑️</button>
  </div>
  <div id="pvContainer" ontouchstart="handleViewerTouch(event)">
    <img id="pvMainImg">
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
let stream=null, facing='back', bothMode=false, bothPhase=0, photos=[];
let viewerIdx=0, isSwapped=false, lastTap=0, isSelectMode=false, selectedIds=new Set();

const mainVid = document.getElementById('mainVid');
const canvas = document.getElementById('canvas');

window.onload = () => {
  photos = JSON.parse(localStorage.getItem('newmera_vfinal') || '[]');
  startCamera();
  updateThumb();
};

async function startCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing==='back'?'environment':'user' } });
    mainVid.srcObject = stream;
    mainVid.className = facing==='front'?'mirror':'';
  } catch(e) { showToast('Camera permission needed!'); }
}

function handleShutter() {
  if(bothMode) {
    if(bothPhase !== 0) return;
    bothPhase=1;
    const firstURL = grabFrame();
    document.getElementById('capturePreviewImg').src = firstURL;
    document.getElementById('capturePreview').style.display = 'block';
    
    let cnt=3;
    const overlay = document.getElementById('countdownOverlay');
    const num = document.getElementById('countdownNum');
    overlay.classList.add('show'); num.textContent=cnt;
    
    facing = facing==='back'?'front':'back';
    startCamera();

    const iv = setInterval(() => {
      cnt--;
      if(cnt>0) num.textContent=cnt;
      else {
        clearInterval(iv);
        overlay.classList.remove('show');
        document.getElementById('capturePreview').style.display = 'none';
        setTimeout(() => {
          savePhoto({ main: firstURL, sub: grabFrame(), isBoth: true });
          bothPhase=0;
          showToast('📸 Both Captured!');
        }, 300);
      }
    }, 1000);
  } else {
    savePhoto({ main: grabFrame(), isBoth: false });
    showToast('📸 Saved');
  }
}

function grabFrame() {
  canvas.width = mainVid.videoWidth; canvas.height = mainVid.videoHeight;
  const ctx = canvas.getContext('2d');
  if(facing==='front') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(mainVid, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.85);
}

function savePhoto(data) {
  photos.unshift({ id: Date.now(), ...data });
  localStorage.setItem('newmera_vfinal', JSON.stringify(photos));
  updateThumb();
}

function updateThumb() {
  const thumb = document.getElementById('thumbImg');
  if(photos.length>0) {
    compose(photos[0], false, (url) => { thumb.src=url; thumb.style.display='block'; });
  } else { thumb.style.display='none'; }
}

function openLibrary() {
  isSelectMode = false; selectedIds.clear();
  document.getElementById('libraryScreen').classList.add('active');
  renderGrid();
}

function closeLibrary() { document.getElementById('libraryScreen').classList.remove('active'); updateThumb(); }

function renderGrid() {
  const grid = document.getElementById('galleryGrid');
  const countLabel = document.getElementById('libCount');
  grid.innerHTML = '';
  countLabel.textContent = photos.length.toLocaleString() + ' Items';
  
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'gItem' + (selectedIds.has(p.id) ? ' selected' : '');
    const img = document.createElement('img');
    compose(p, false, (url) => img.src = url);
    div.onclick = () => {
      if(isSelectMode) {
        if(selectedIds.has(p.id)) selectedIds.delete(p.id);
        else selectedIds.add(p.id);
        renderGrid();
      } else { openViewer(i); }
    };
    div.appendChild(img);
    grid.appendChild(div);
  });
}

function compose(p, swapped, cb) {
  if(!p.isBoth) { cb(p.main); return; }
  const m=new Image(), s=new Image();
  m.onload=()=>{ s.onload=()=>{
    canvas.width=m.width; canvas.height=m.height;
    const ctx=canvas.getContext('2d'); ctx.drawImage(m,0,0);
    const pw=canvas.width*0.3, ph=pw*(s.height/s.width), margin=canvas.width*0.04;
    const rx=canvas.width-pw-margin, ry=margin;
    ctx.save(); ctx.beginPath(); ctx.roundRect(rx,ry,pw,ph,15); ctx.clip(); ctx.drawImage(s,rx,ry,pw,ph); ctx.restore();
    ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.beginPath(); ctx.roundRect(rx,ry,pw,ph,15); ctx.stroke();
    cb(canvas.toDataURL('image/jpeg',0.8));
  }; s.src=swapped?p.main:p.sub; }; m.src=swapped?p.sub:p.main;
}

function openViewer(idx) {
  viewerIdx=idx; isSwapped=false;
  document.getElementById('photoViewer').classList.add('show');
  updateViewer();
}

function updateViewer() { compose(photos[viewerIdx], isSwapped, (url) => { document.getElementById('pvMainImg').src = url; }); }

function handleViewerTouch(e) {
  const now = Date.now();
  if(now - lastTap < 300) { if(photos[viewerIdx].isBoth) { isSwapped=!isSwapped; updateViewer(); } }
  lastTap = now;
}

function closeViewer() { document.getElementById('photoViewer').classList.remove('show'); }
function deleteCurrent() { if(confirm('Delete this photo?')) { photos.splice(viewerIdx,1); localStorage.setItem('newmera_vfinal',JSON.stringify(photos)); closeViewer(); renderGrid(); } }
function toggleSelectMode() { isSelectMode=!isSelectMode; document.getElementById('libSelectBtn').textContent=isSelectMode?'Cancel':'Select'; if(!isSelectMode) selectedIds.clear(); renderGrid(); }
function toggleBoth() { bothMode=!bothMode; document.getElementById('bothBtn').classList.toggle('on', bothMode); showToast(bothMode?'Both ON':'Both OFF'); }
function flipCamera() { facing=facing==='back'?'front':'back'; startCamera(); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
</script>
</body>
</html>
