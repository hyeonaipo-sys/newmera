<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newmera Pro - Classic</title>
<style>
:root {
  --ios-blue: #007aff;
  --ios-red: #ff3b30;
  --ios-yellow: #ffd60a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }

.screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: #000; }
.screen.active { display: flex; }

/* CAMERA VIEWPORT - FULL SCREEN BACK */
#vf { position: relative; flex: 1; background: #000; overflow: hidden; border-radius: 0 0 44px 44px; touch-action: none; }
#mainVid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
#mainVid.mirror { transform: scaleX(-1); }

/* Recording UI */
#recUI { position: absolute; top: max(env(safe-area-inset-top), 20px); left: 50%; transform: translateX(-50%); background: rgba(255, 59, 48, 0.9); padding: 5px 15px; border-radius: 20px; display: none; align-items: center; gap: 8px; z-index: 110; backdrop-filter: blur(15px); }
#recUI.active { display: flex; }
#recDot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
#recTimer { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* BOTTOM UI */
#cameraBottom { background: #000; padding: 20px 0 calc(env(safe-area-inset-bottom) + 10px); flex-shrink: 0; }
#modesWrapper { position: relative; width: 100%; height: 44px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#modesTrack { display: flex; position: absolute; gap: 40px; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); }
.mode { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; transition: 0.3s; padding: 10px; }
.mode.active { color: var(--ios-yellow); transform: scale(1.1); }

#shutterRow { display: flex; align-items: center; justify-content: space-between; padding: 0 45px; margin-top: 10px; }
#thumb { width: 56px; height: 56px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.3); background: #111; overflow: hidden; }
#thumb img { width: 100%; height: 100%; object-fit: cover; }
#shutter { width: 76px; height: 76px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
#shutterInner { width: 60px; height: 60px; border-radius: 50%; background: #fff; transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
#shutter.recording #shutterInner { background: var(--ios-red); border-radius: 12px; transform: scale(0.5); }
#flipBtn { font-size: 24px; opacity: 0.8; }

/* LIBRARY SCREEN */
#libHeader { padding: max(env(safe-area-inset-top), 40px) 20px 15px; }
#libActions { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 10px; }
.action-btn { color: var(--ios-blue); font-size: 17px; font-weight: 600; background: none; border: none; }
#libTitle { font-size: 34px; font-weight: 800; }
#libCount { font-size: 15px; color: #8e8e93; margin-top: 5px; }
#galleryGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; padding-bottom: 120px; }
.gItem { aspect-ratio: 1; background: #1c1c1e; position: relative; }
.gItem img { width: 100%; height: 100%; object-fit: cover; }
.vBadge { position: absolute; bottom: 6px; right: 6px; font-size: 10px; font-weight: 800; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; }

#backToCam { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 30px; border-radius: 30px; font-weight: 800; border: none; z-index: 250; }

/* VIEWER */
#photoViewer { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 300; }
#pvHeader { padding: max(env(safe-area-inset-top), 20px) 20px; display: flex; justify-content: space-between; align-items: center; }
#pvContainer { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.viewer-slide { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); }
#pvMainImg, #pvMainVid { max-width: 100%; max-height: 100%; }

#toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 25px; font-size: 14px; font-weight: 700; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="screen active" id="cameraScreen">
  <div id="vf" ontouchstart="handleCameraSwipeStart(event)" ontouchend="handleCameraSwipeEnd(event)">
    <video id="mainVid" autoplay playsinline muted></video>
    <div id="recUI"><div id="recDot"></div><div id="recTimer">00:00</div></div>
  </div>
  <div id="cameraBottom">
    <div id="modesWrapper" ontouchstart="handleCameraSwipeStart(event)" ontouchend="handleCameraSwipeEnd(event)">
      <div id="modesTrack">
        <div class="mode" onclick="setModeByIndex(0)">VIDEO</div>
        <div class="mode active" onclick="setModeByIndex(1)">PHOTO</div>
      </div>
    </div>
    <div id="shutterRow">
      <div id="thumb" onclick="openLibrary()"><img id="thumbImg"></div>
      <div id="shutter" onclick="handleAction()"><div id="shutterInner"></div></div>
      <div id="flipBtn" onclick="flipCamera()">🔄</div>
    </div>
  </div>
</div>

<div class="screen" id="libraryScreen">
  <header id="libHeader">
    <div id="libActions">
        <button class="action-btn">Play</button>
        <button class="action-btn">Select</button>
    </div>
    <h1 id="libTitle">Library</h1>
    <div id="libCount">0 Items</div>
  </header>
  <div id="galleryGrid"></div>
  <button id="backToCam" onclick="closeLibrary()">카메라로 돌아가기</button>
</div>

<div id="photoViewer">
  <div id="pvHeader">
    <button onclick="closeViewer()" style="background:none; border:none; color:var(--ios-blue); font-size:17px; font-weight:700">Done</button>
    <button onclick="deleteCurrent()" style="background:none; border:none; color:var(--ios-red); font-size:17px">Delete</button>
  </div>
  <div id="pvContainer" ontouchstart="handleViewerSwipeStart(event)" ontouchend="handleViewerSwipeEnd(event)">
    <div class="viewer-slide" id="viewerSlide">
        <img id="pvMainImg" style="display:none">
        <video id="pvMainVid" controls style="display:none"></video>
    </div>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
(function() {
  let stream=null, facing='back', currentMode='PHOTO', items=[];
  let isRecording=false, recStartTime=0, recInterval=null, drawTimer=null;
  let mediaRecorder=null, recordedChunks=[];
  let db=null;

  const mainVid = document.getElementById('mainVid');
  const canvas = document.getElementById('canvas');
  const track = document.getElementById('modesTrack');
  const recUI = document.getElementById('recUI');
  const recTimer = document.getElementById('recTimer');
  const thumbImg = document.getElementById('thumbImg');

  // IndexedDB for large media storage
  const request = indexedDB.open("NewmeraV8", 1);
  request.onupgradeneeded = e => {
    db = e.target.result;
    if(!db.objectStoreNames.contains("media")) db.createObjectStore("media", { keyPath: "id" });
  };
  request.onsuccess = e => {
    db = e.target.result;
    loadItems();
    startCamera();
  };

  async function startCamera() {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: facing==='back'?'environment':'user', width: {ideal: 1920}, height: {ideal: 1080}, frameRate: 30 } 
      });
      mainVid.srcObject = stream;
      mainVid.className = facing==='front'?'mirror':'';
    } catch(e) { showToast('카메라 로드 실패'); }
  }

  // Swipe logic
  let startX = 0, currentIdx = 1;
  const modes = ['VIDEO', 'PHOTO'];
  window.handleCameraSwipeStart = e => startX = e.touches[0].clientX;
  window.handleCameraSwipeEnd = e => {
    if(isRecording) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 50) {
      if(diff > 0 && currentIdx < 1) setModeByIndex(currentIdx + 1);
      else if(diff < 0 && currentIdx > 0) setModeByIndex(currentIdx - 1);
    }
  };
  window.setModeByIndex = idx => { currentIdx = idx; currentMode = modes[idx]; updateModeUI(); };
  function updateModeUI() {
    track.style.transform = `translateX(${currentIdx === 0 ? 40 : -40}px)`;
    document.querySelectorAll('.mode').forEach((el, i) => el.classList.toggle('active', i === currentIdx));
    document.getElementById('shutterInner').style.background = currentMode==='VIDEO'?'var(--ios-red)':'#fff';
  }

  window.handleAction = () => currentMode==='PHOTO' ? takePhoto() : handleVideo();

  function takePhoto() {
    const data = grab(0.92);
    saveItem({ type:'photo', thumb: data, main: data });
    showToast('📸 사진 저장됨');
  }

  function handleVideo() { if(!isRecording) startRec(); else stopRec(); }

  async function startRec() {
    isRecording = true; recordedChunks = [];
    document.getElementById('shutter').classList.add('recording');
    recUI.classList.add('active');
    recStartTime = Date.now();
    recInterval = setInterval(() => {
        const d = Math.floor((Date.now()-recStartTime)/1000);
        recTimer.textContent = `${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
    }, 1000);

    const cStream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(cStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 6000000 });
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const thumb = canvas.toDataURL('image/jpeg', 0.5);
      const reader = new FileReader();
      reader.onloadend = () => {
        saveItem({ type:'video', thumb: thumb, main: reader.result });
        showToast('🎥 영상 저장됨');
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    drawTimer = setInterval(() => grab(0, true), 1000/30);
  }

  function stopRec() {
    isRecording = false;
    document.getElementById('shutter').classList.remove('recording');
    recUI.classList.remove('active');
    clearInterval(recInterval); clearInterval(drawTimer);
    mediaRecorder.stop();
  }

  function grab(q, drawOnly=false) {
    const vw = mainVid.videoWidth, vh = mainVid.videoHeight;
    canvas.width = vw; canvas.height = vh;
    const ctx = canvas.getContext('2d');
    if(facing==='front') { ctx.translate(vw, 0); ctx.scale(-1, 1); }
    ctx.drawImage(mainVid, 0, 0);
    return drawOnly ? null : canvas.toDataURL('image/jpeg', q);
  }

  function saveItem(item) {
    item.id = Date.now();
    const tx = db.transaction("media", "readwrite");
    tx.objectStore("media").add(item);
    tx.oncomplete = () => loadItems();
  }

  function loadItems() {
    const tx = db.transaction("media", "readonly");
    const req = tx.objectStore("media").getAll();
    req.onsuccess = () => {
      items = req.result.sort((a,b) => b.id - a.id);
      if(items.length > 0) { thumbImg.src = items[0].thumb; thumbImg.style.display='block'; }
      else thumbImg.style.display='none';
    };
  }

  window.openLibrary = () => { document.getElementById('libraryScreen').classList.add('active'); renderGrid(); };
  window.closeLibrary = () => document.getElementById('libraryScreen').classList.remove('active');

  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    document.getElementById('libCount').textContent = items.length + ' Items';
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'gItem';
      div.innerHTML = `<img src="${item.thumb}">${item.type==='video'?'<div class="vBadge">▶</div>':''}`;
      div.onclick = () => openViewer(i);
      grid.appendChild(div);
    });
  }

  // Viewer Swipe
  let viewerIdx=0, vStartX=0;
  window.handleViewerSwipeStart = e => vStartX = e.touches[0].clientX;
  window.handleViewerSwipeEnd = e => {
    const diff = vStartX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 60) {
      if(diff > 0 && viewerIdx < items.length-1) slide(1);
      else if(diff < 0 && viewerIdx > 0) slide(-1);
    }
  };
  function slide(dir) {
    const s = document.getElementById('viewerSlide');
    s.style.transform = `translateX(${-dir*100}%)`;
    setTimeout(() => {
        viewerIdx += dir;
        updateViewer();
        s.style.transition='none'; s.style.transform='translateX(0)';
        setTimeout(()=> s.style.transition='transform 0.4s cubic-bezier(0.2, 1, 0.2, 1)', 10);
    }, 350);
  }

  window.openViewer = idx => { viewerIdx=idx; document.getElementById('photoViewer').classList.add('show'); updateViewer(); };
  function updateViewer() {
    const item = items[viewerIdx];
    const img = document.getElementById('pvMainImg'), vid = document.getElementById('pvMainVid');
    if(item.type==='video') { img.style.display='none'; vid.style.display='block'; vid.src=item.main; }
    else { vid.style.display='none'; img.style.display='block'; img.src=item.main; }
  }

  window.closeViewer = () => { document.getElementById('photoViewer').classList.remove('show'); document.getElementById('pvMainVid').pause(); };
  window.deleteCurrent = () => {
    if(confirm('정말 삭제할까?')) {
      const id = items[viewerIdx].id;
      const tx = db.transaction("media", "readwrite");
      tx.objectStore("media").delete(id);
      tx.oncomplete = () => { loadItems(); renderGrid(); if(items.length===0) closeViewer(); else { if(viewerIdx >= items.length) viewerIdx--; updateViewer(); } };
    }
  };

  window.flipCamera = () => { facing=facing==='back'?'front':'back'; startCamera(); };
  function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
})();
</script>
</body>
</html>
